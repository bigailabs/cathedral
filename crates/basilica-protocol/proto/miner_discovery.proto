// Miner Registration Protocol - Miner to Validator communication
syntax = "proto3";

package basilca.miner.v1;

import "common.proto";

// MinerRegistration service for miner→validator registration flow
service MinerRegistration {
  // One-time registration of nodes with SSH details + pricing (called on miner startup)
  rpc RegisterBid(RegisterBidRequest) returns (RegisterBidResponse);

  // Update bid price for an existing registered node
  rpc UpdateBid(UpdateBidRequest) returns (UpdateBidResponse);

  // Explicitly remove node(s) from availability
  rpc RemoveBid(RemoveBidRequest) returns (RemoveBidResponse);

  // Lightweight periodic heartbeat to keep registrations active
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ============================================================================
// MinerRegistration service messages (miner→validator flow)
// ============================================================================

// Node registration details including SSH access info
message NodeRegistration {
  reserved 1;                       // Previously node_id (now computed server-side from host)
  string host = 2;                  // SSH host (IP or hostname)
  uint32 port = 3;                  // SSH port (typically 22)
  string username = 4;              // SSH username
  string gpu_category = 5;          // GPU type: "H100", "A100", "B200", etc.
  uint32 gpu_count = 6;             // Number of GPUs on this node
  uint32 hourly_rate_cents = 7;     // Price in cents per GPU per hour
  bytes attestation = 8;            // Optional hardware attestation
}

// RegisterBid: One-time registration when miner comes online
message RegisterBidRequest {
  string miner_hotkey = 1;          // Miner's hotkey for identification
  repeated NodeRegistration nodes = 2;  // Nodes to register with SSH details
  int64 timestamp = 3;              // Unix timestamp (seconds or millis)
  bytes signature = 4;              // Signature over miner_hotkey|timestamp
}

message RegisterBidResponse {
  bool accepted = 1;                       // Whether registration was accepted
  string registration_id = 2;              // Unique registration ID for tracking
  string validator_ssh_public_key = 3;     // Validator's SSH public key to deploy
  uint32 health_check_interval_secs = 4;   // How often to send health checks
  string error_message = 5;                // Error details if not accepted
  reserved 6;                              // Previously collateral_status (removed)
}

// UpdateBid: Update price for existing registered node
message UpdateBidRequest {
  string miner_hotkey = 1;          // Miner's hotkey for identification
  reserved 2;                       // Previously node_id (now computed server-side from host)
  uint32 hourly_rate_cents = 3;     // New price in cents per GPU per hour
  int64 timestamp = 4;              // Unix timestamp
  bytes signature = 5;              // Signature over miner_hotkey|host|hourly_rate_cents|timestamp
  string host = 6;                  // SSH host (IP or hostname) identifying the node
}

message UpdateBidResponse {
  bool accepted = 1;
  string error_message = 2;
}

// RemoveBid: Explicitly remove node(s) from availability
message RemoveBidRequest {
  string miner_hotkey = 1;          // Miner's hotkey for identification
  reserved 2;                       // Previously node_ids (now using hosts)
  int64 timestamp = 3;              // Unix timestamp
  bytes signature = 4;              // Signature over miner_hotkey|hosts|timestamp
  repeated string hosts = 5;        // Hosts to remove (empty = remove all)
}

message RemoveBidResponse {
  bool accepted = 1;
  uint32 nodes_removed = 2;         // Number of nodes removed
  string error_message = 3;
}

// HealthCheck: Lightweight periodic heartbeat
message HealthCheckRequest {
  string miner_hotkey = 1;          // Miner's hotkey for identification
  reserved 2;                       // Previously node_ids (now using hosts)
  int64 timestamp = 3;              // Unix timestamp
  bytes signature = 4;              // Signature over miner_hotkey|hosts|timestamp
  repeated string hosts = 5;        // Optional: specific hosts to check (empty = all)
}

message HealthCheckResponse {
  bool accepted = 1;
  uint32 nodes_active = 2;          // Number of nodes marked active
  string error_message = 3;
}
