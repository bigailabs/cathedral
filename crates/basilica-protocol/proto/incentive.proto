syntax = "proto3";

package basilica.incentive.v1;

import "google/protobuf/timestamp.proto";

service IncentiveService {
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc GetCus(GetCusRequest) returns (GetCusResponse);
  rpc GetRus(GetRusRequest) returns (GetRusResponse);
  rpc SubmitCus(SubmitCusRequest) returns (SubmitCusResponse);
  rpc SlashNode(SlashNodeRequest) returns (SlashNodeResponse);
}

message GetConfigRequest {}

message GpuCategoryConfig {
  uint32 target_count = 1;
  string price_usd = 2;
}

message GetConfigResponse {
  map<string, GpuCategoryConfig> gpu_categories = 1;
  uint32 window_hours = 2;
  string max_cu_value_usd = 3;
  optional uint32 revenue_share_pct = 4;
  uint32 slash_pct = 5;
}

message GetCusRequest {
  google.protobuf.Timestamp epoch_start = 1;
  google.protobuf.Timestamp epoch_end = 2;
}

message CuLedgerRow {
  string id = 1;
  string hotkey = 2;
  uint32 miner_uid = 3;
  string node_id = 4;
  string cu_amount = 5;
  google.protobuf.Timestamp earned_at = 6;
  bool is_rented = 7;
  string gpu_category = 8;
  uint32 window_hours = 9;
  string price_usd = 10;
  string idempotency_key = 11;
  bool is_slashed = 12;
  optional string slash_audit_id = 13;
  google.protobuf.Timestamp created_at = 14;
}

message GetCusResponse {
  repeated CuLedgerRow rows = 1;
}

message GetRusRequest {
  google.protobuf.Timestamp epoch_start = 1;
  google.protobuf.Timestamp epoch_end = 2;
}

message RuLedgerRow {
  string id = 1;
  string hotkey = 2;
  uint32 miner_uid = 3;
  string node_id = 4;
  string ru_amount = 6;
  google.protobuf.Timestamp earned_at = 7;
  string gpu_category = 8;
  uint32 window_hours = 9;
  uint32 revenue_share_pct = 10;
  bool is_slashed = 11;
  optional string slash_audit_id = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp period_start = 14;
  google.protobuf.Timestamp period_end = 15;
}

message GetRusResponse {
  repeated RuLedgerRow rows = 1;
}

message NewCuLedgerRow {
  string hotkey = 1;
  uint32 miner_uid = 2;
  string node_id = 3;
  string cu_amount = 4;
  google.protobuf.Timestamp earned_at = 5;
  bool is_rented = 6;
  string gpu_category = 7;
  uint32 window_hours = 8;
  string price_usd = 9;
  string idempotency_key = 10;
}

message SubmitCusRequest {
  repeated NewCuLedgerRow cus = 1;
  string requested_by_hotkey = 2;
}

message SubmitCusResponse {
  uint32 inserted = 1;
}

message SlashNodeRequest {
  string node_id = 1;
  uint32 slash_pct = 2;
  string requested_by_hotkey = 3;
  string idempotency_key = 4;
}

message SlashNodeResponse {
  uint32 slashed_cu_count = 1;
  uint32 slashed_ru_count = 2;
}
