---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-envoy
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: security
spec:
  podSelector:
    matchLabels:
      basilica.ai/http-accessible: "true"
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: envoy-gateway-system
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: basilica-system
      podSelector:
        matchLabels:
          app: basilica-envoy
