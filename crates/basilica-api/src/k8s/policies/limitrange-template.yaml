---
apiVersion: v1
kind: LimitRange
metadata:
  name: user-limit-range
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: resource-management
spec:
  limits:
    - type: Container
      max:
        cpu: "128"
        memory: 512Gi
      min:
        cpu: "10m"
        memory: "32Mi"
      default:
        cpu: "4"
        memory: "8Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
    - type: Pod
      max:
        cpu: "256"
        memory: 1Ti
      min:
        cpu: "10m"
        memory: "32Mi"
    - type: PersistentVolumeClaim
      max:
        storage: 10Ti
      min:
        storage: 1Gi
