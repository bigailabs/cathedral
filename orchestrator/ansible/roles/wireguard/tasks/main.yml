---
# WireGuard installation and configuration for K3s server nodes

- name: Skip if WireGuard is disabled
  ansible.builtin.meta: end_play
  when: not wireguard_enabled | default(true)

- name: Install WireGuard packages
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: yes
  tags: ['wireguard', 'install']

- name: Ensure WireGuard directory exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: '0700'
  tags: ['wireguard', 'config']

- name: Check if WireGuard private key exists
  ansible.builtin.stat:
    path: /etc/wireguard/privatekey
  register: wg_privatekey_stat
  tags: ['wireguard', 'keys']

- name: Generate WireGuard private key
  ansible.builtin.shell: |
    set -euo pipefail
    wg genkey > /etc/wireguard/privatekey
    chmod 600 /etc/wireguard/privatekey
  args:
    executable: /bin/bash
  when: not wg_privatekey_stat.stat.exists
  tags: ['wireguard', 'keys']

- name: Generate WireGuard public key from private key
  ansible.builtin.shell: |
    set -euo pipefail
    cat /etc/wireguard/privatekey | wg pubkey > /etc/wireguard/publickey
    chmod 644 /etc/wireguard/publickey
  args:
    executable: /bin/bash
  when: not wg_privatekey_stat.stat.exists
  tags: ['wireguard', 'keys']

- name: Read WireGuard private key
  ansible.builtin.slurp:
    src: /etc/wireguard/privatekey
  register: wg_private_key_content
  tags: ['wireguard', 'keys']

- name: Read WireGuard public key
  ansible.builtin.slurp:
    src: /etc/wireguard/publickey
  register: wg_public_key_content
  tags: ['wireguard', 'keys']

- name: Set WireGuard key facts
  ansible.builtin.set_fact:
    wireguard_private_key: "{{ wg_private_key_content.content | b64decode | trim }}"
    wireguard_public_key: "{{ wg_public_key_content.content | b64decode | trim }}"
  tags: ['wireguard', 'keys']

- name: Display WireGuard public key
  ansible.builtin.debug:
    msg: "WireGuard public key for {{ inventory_hostname }}: {{ wireguard_public_key }}"
  tags: ['wireguard', 'keys']

- name: Get WireGuard IP for this server
  ansible.builtin.set_fact:
    wireguard_server_ip: "{{ wireguard_server_ips[inventory_hostname] }}"
  tags: ['wireguard', 'config']

- name: Fail if no WireGuard IP assigned to this server
  ansible.builtin.fail:
    msg: "No WireGuard IP assigned for {{ inventory_hostname }} in wireguard_server_ips"
  when: wireguard_server_ip is not defined or wireguard_server_ip == ''
  tags: ['wireguard', 'config']

- name: Deploy WireGuard configuration
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
    owner: root
    group: root
    mode: '0600'
  notify: Restart WireGuard
  tags: ['wireguard', 'config']

- name: Enable IP forwarding for WireGuard
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - net.ipv4.ip_forward
    - net.ipv4.conf.all.forwarding
  tags: ['wireguard', 'sysctl']

- name: Enable and start WireGuard service
  ansible.builtin.systemd:
    name: "wg-quick@{{ wireguard_interface }}"
    enabled: yes
    state: started
    daemon_reload: yes
  tags: ['wireguard', 'service']

- name: Wait for WireGuard interface to be up
  ansible.builtin.wait_for:
    path: "/sys/class/net/{{ wireguard_interface }}"
    state: present
    timeout: 30
  tags: ['wireguard', 'service']

- name: Verify WireGuard interface is configured
  ansible.builtin.command: wg show {{ wireguard_interface }}
  register: wg_show_output
  changed_when: false
  tags: ['wireguard', 'verify']

- name: Display WireGuard status
  ansible.builtin.debug:
    msg: "{{ wg_show_output.stdout_lines }}"
  tags: ['wireguard', 'verify']

- name: Save WireGuard public key to a fact file for API consumption
  ansible.builtin.copy:
    content: |
      # WireGuard server configuration for {{ inventory_hostname }}
      # Generated by Ansible on {{ ansible_date_time.iso8601 }}
      WIREGUARD_PUBLIC_KEY={{ wireguard_public_key }}
      WIREGUARD_SERVER_IP={{ wireguard_server_ip }}
      WIREGUARD_ENDPOINT={{ ansible_host }}:{{ wireguard_port }}
    dest: /etc/wireguard/server-info
    owner: root
    group: root
    mode: '0644'
  tags: ['wireguard', 'config']

# MASQUERADE rule for WireGuard traffic to VPC
# Remote GPU nodes send packets with source IP from 10.200.0.0/16 (WireGuard network).
# AWS VPC drops packets with non-VPC source IPs. MASQUERADE rewrites the source IP
# to the server's VPC IP so responses can be routed back properly.
- name: Get primary network interface name
  ansible.builtin.shell: |
    ip route get 1.1.1.1 | awk '{print $5; exit}'
  register: primary_interface
  changed_when: false
  tags: ['wireguard', 'iptables']

- name: Add MASQUERADE rule for WireGuard traffic to VPC
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ wireguard_network }}"
    out_interface: "{{ primary_interface.stdout }}"
    jump: MASQUERADE
    comment: "NAT WireGuard to VPC for remote GPU nodes"
  tags: ['wireguard', 'iptables']

# MASQUERADE VPC traffic going out to WireGuard peers
# This allows k3s-agents (on VPC network) to reach GPU nodes (on WireGuard network)
# via the k3s-servers which act as WireGuard gateways.
- name: Add MASQUERADE rule for VPC traffic to WireGuard
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "10.101.0.0/16"
    out_interface: "{{ wireguard_interface }}"
    jump: MASQUERADE
    comment: "NAT VPC to WireGuard for agent connectivity"
  tags: ['wireguard', 'iptables']

# Security hardening: IP allowlisting and optional rate limiting
# PRODUCTION SAFE CONFIGURATION (2025-11-28):
# - Rate limiting DISABLED by default
# - IP allowlisting MANDATORY
# - Comprehensive cleanup of legacy aggressive rate limits
#
# See /docs/runbooks/WIREGUARD-PRODUCTION-HARDENING.md for full details

- name: Remove ALL WireGuard rate limit rules (comprehensive cleanup)
  ansible.builtin.shell: |
    # Remove hashlimit rules (all variants)
    while iptables -D INPUT -p udp --dport {{ wireguard_port }} -m hashlimit -j DROP 2>/dev/null; do :; done
    # Remove connlimit rules
    while iptables -D INPUT -p udp --dport {{ wireguard_port }} -m connlimit -j DROP 2>/dev/null; do :; done
    # Remove recent rules
    while iptables -D INPUT -p udp --dport {{ wireguard_port }} -m recent -j DROP 2>/dev/null; do :; done
    echo "All WireGuard rate limit rules removed"
  changed_when: false
  tags: ['wireguard', 'security', 'cleanup']

- name: Install iptables hashlimit module dependencies
  ansible.builtin.apt:
    name: xtables-addons-common
    state: present
  when: wireguard_ratelimit_enabled | default(false)
  tags: ['wireguard', 'security']

- name: Check if WireGuard rate limit rule exists
  ansible.builtin.shell: |
    iptables -C INPUT -p udp --dport {{ wireguard_port }} -m hashlimit \
      --hashlimit-name wireguard_handshake --hashlimit-mode srcip \
      --hashlimit-above {{ wireguard_ratelimit_rate }} --hashlimit-burst {{ wireguard_ratelimit_burst }} \
      -m comment --comment "Rate limit WireGuard handshakes" -j DROP 2>/dev/null
  register: wg_ratelimit_check
  failed_when: false
  changed_when: false
  when: wireguard_ratelimit_enabled | default(false)
  tags: ['wireguard', 'security']

- name: Rate limit WireGuard handshakes (DISABLED by default)
  ansible.builtin.shell: |
    iptables -A INPUT -p udp --dport {{ wireguard_port }} -m hashlimit \
      --hashlimit-name wireguard_handshake --hashlimit-mode srcip \
      --hashlimit-above {{ wireguard_ratelimit_rate }} --hashlimit-burst {{ wireguard_ratelimit_burst }} \
      -m comment --comment "Rate limit WireGuard handshakes" -j DROP
  when:
    - wireguard_ratelimit_enabled | default(false)
    - wg_ratelimit_check.rc != 0
  tags: ['wireguard', 'security']

- name: Remove existing WireGuard INPUT ACCEPT rules (for clean IP allowlist)
  ansible.builtin.shell: |
    while iptables -D INPUT -p udp --dport {{ wireguard_port }} -j ACCEPT 2>/dev/null; do :; done
    echo "Existing ACCEPT rules removed"
  changed_when: false
  tags: ['wireguard', 'security', 'allowlist']

- name: Allow WireGuard from authorized sources (IP allowlist)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ wireguard_port }}"
    source: "{{ item }}"
    jump: ACCEPT
    comment: "WireGuard VPN - {{ item }}"
  loop: "{{ wireguard_allowed_sources }}"
  when: wireguard_allowed_sources is defined and wireguard_allowed_sources | length > 0
  tags: ['wireguard', 'security', 'allowlist']

- name: Log unauthorized WireGuard traffic (rate limited)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ wireguard_port }}"
    jump: LOG
    log_prefix: "WireGuard-DENY: "
    log_level: warning
    limit: 10/min
  when: wireguard_allowed_sources is defined and wireguard_allowed_sources | length > 0
  tags: ['wireguard', 'security', 'allowlist']

- name: Drop unauthorized WireGuard traffic (when allowlist active)
  ansible.builtin.iptables:
    chain: INPUT
    protocol: udp
    destination_port: "{{ wireguard_port }}"
    jump: DROP
    comment: "Block unauthorized WireGuard"
  when: wireguard_allowed_sources is defined and wireguard_allowed_sources | length > 0
  tags: ['wireguard', 'security', 'allowlist']

- name: Allow established connections from WireGuard network
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ wireguard_network }}"
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
    comment: "Allow established WireGuard connections"
  tags: ['wireguard', 'security']

- name: Allow WireGuard peers to K3s API server
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ wireguard_network }}"
    protocol: tcp
    destination_port: 6443
    jump: ACCEPT
    comment: "Allow WireGuard to K3s API"
  tags: ['wireguard', 'security']

- name: Allow WireGuard peers to Flannel pod network
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ wireguard_network }}"
    destination: "10.42.0.0/16"
    jump: ACCEPT
    comment: "Allow WireGuard to Flannel pods"
  tags: ['wireguard', 'security']

# Fix for DNS resolution on GPU nodes:
# When GPU node pods send traffic to other cluster pods, packets traverse:
# GPU pod -> wg0 -> k3s-server -> flannel.1 -> destination pod
# Without this rule, Flannel's MASQUERADE changes source IP to server's cni0 IP,
# breaking return traffic. This rule skips MASQUERADE for forwarded pod-to-pod traffic.
- name: Skip MASQUERADE for forwarded pod-to-pod traffic (DNS fix)
  ansible.builtin.shell: |
    # Check if rule already exists
    if iptables -t nat -C FLANNEL-POSTRTG -s 10.42.0.0/16 -d 10.42.0.0/16 -j RETURN -m comment --comment "flannel skip forwarded pod traffic" 2>/dev/null; then
      echo "Rule already exists"
      exit 0
    fi
    # Insert at position 1 (before MASQUERADE rules)
    iptables -t nat -I FLANNEL-POSTRTG 1 -s 10.42.0.0/16 -d 10.42.0.0/16 -j RETURN -m comment --comment "flannel skip forwarded pod traffic"
    echo "Rule added"
  register: flannel_masq_fix
  changed_when: "'Rule added' in flannel_masq_fix.stdout"
  tags: ['wireguard', 'security', 'dns-fix']

- name: Allow WireGuard peers to Flannel VXLAN port
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ wireguard_network }}"
    protocol: udp
    destination_port: 8472
    jump: ACCEPT
    comment: "Allow WireGuard to Flannel VXLAN"
  tags: ['wireguard', 'security']

- name: Allow WireGuard peers to kubelet
  ansible.builtin.iptables:
    chain: FORWARD
    source: "{{ wireguard_network }}"
    protocol: tcp
    destination_port: 10250
    jump: ACCEPT
    comment: "Allow WireGuard to kubelet"
  tags: ['wireguard', 'security']

# Kernel hardening for network security
- name: Enable reverse path filtering (strict mode for general interfaces)
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  tags: ['wireguard', 'security', 'sysctl']

# WireGuard interface uses loose mode (2) for asymmetric routing with Flannel
# Packets arrive on wg0 from GPU nodes but may egress via flannel.1 for VXLAN
# Strict rp_filter would drop these packets; loose mode allows if any route exists
- name: Set loose reverse path filtering on WireGuard interface
  ansible.posix.sysctl:
    name: "net.ipv4.conf.{{ wireguard_interface }}.rp_filter"
    value: '2'
    sysctl_set: yes
    state: present
    reload: yes
  tags: ['wireguard', 'security', 'sysctl']

- name: Disable source routing
  ansible.posix.sysctl:
    name: net.ipv4.conf.all.accept_source_route
    value: '0'
    sysctl_set: yes
    state: present
    reload: yes
  tags: ['wireguard', 'security', 'sysctl']

- name: Enable SYN cookies protection
  ansible.posix.sysctl:
    name: net.ipv4.tcp_syncookies
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  tags: ['wireguard', 'security', 'sysctl']

- name: Disable ICMP redirects
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '0'
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - net.ipv4.conf.all.accept_redirects
    - net.ipv4.conf.default.accept_redirects
    - net.ipv4.conf.all.send_redirects
    - net.ipv4.conf.default.send_redirects
  tags: ['wireguard', 'security', 'sysctl']

# Save and persist iptables rules - must be AFTER all rules are added
- name: Save iptables rules for persistence
  ansible.builtin.shell: |
    iptables-save > /etc/iptables.rules.v4
  changed_when: true
  tags: ['wireguard', 'iptables']

- name: Deploy iptables-restore systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Restore iptables rules
      Before=network-pre.target
      Wants=network-pre.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/iptables-restore /etc/iptables.rules.v4
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/iptables-restore.service
    owner: root
    group: root
    mode: '0644'
  register: iptables_service
  tags: ['wireguard', 'iptables']

- name: Enable iptables-restore service
  ansible.builtin.systemd:
    name: iptables-restore
    enabled: yes
    daemon_reload: "{{ iptables_service.changed }}"
  tags: ['wireguard', 'iptables']

# WireGuard peer reconciliation for GPU nodes
# This script runs periodically to ensure GPU node peers have their pod CIDRs in AllowedIPs
- name: Deploy WireGuard peer reconciliation script
  ansible.builtin.template:
    src: wireguard-peer-reconcile.sh.j2
    dest: /usr/local/bin/wireguard-peer-reconcile.sh
    owner: root
    group: root
    mode: '0755'
  tags: ['wireguard', 'reconcile']

- name: Create WireGuard peer reconciliation systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=WireGuard Peer Reconciliation
      After=wg-quick@{{ wireguard_interface }}.service k3s.service
      # Use Wants instead of Requires - the script checks for wg0 interface itself
      # and will exit gracefully if not available. This prevents failures when
      # wg-quick service shows "failed" but the interface is actually up.
      Wants=wg-quick@{{ wireguard_interface }}.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/wireguard-peer-reconcile.sh
      StandardOutput=journal
      StandardError=journal
    dest: /etc/systemd/system/wireguard-peer-reconcile.service
    owner: root
    group: root
    mode: '0644'
  register: reconcile_service
  tags: ['wireguard', 'reconcile']

- name: Create WireGuard peer reconciliation timer
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=WireGuard Peer Reconciliation Timer

      [Timer]
      OnBootSec=60
      OnUnitActiveSec=60
      RandomizedDelaySec=10

      [Install]
      WantedBy=timers.target
    dest: /etc/systemd/system/wireguard-peer-reconcile.timer
    owner: root
    group: root
    mode: '0644'
  register: reconcile_timer
  tags: ['wireguard', 'reconcile']

- name: Enable and start WireGuard peer reconciliation timer
  ansible.builtin.systemd:
    name: wireguard-peer-reconcile.timer
    enabled: yes
    state: started
    daemon_reload: "{{ reconcile_service.changed or reconcile_timer.changed }}"
  tags: ['wireguard', 'reconcile']

# WireGuard monitoring setup
- name: Setup WireGuard Prometheus monitoring
  ansible.builtin.include_tasks: monitoring.yml
  tags: ['wireguard', 'monitoring']
  when: wireguard_monitoring_enabled | default(true)
