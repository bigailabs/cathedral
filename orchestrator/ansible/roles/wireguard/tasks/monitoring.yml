---
# WireGuard Prometheus monitoring setup
# Uses kbknapp/wireguard_exporter which provides pre-built binaries

- name: Check if wireguard_exporter is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/wireguard_exporter
  register: wg_exporter_stat
  tags: ['wireguard', 'monitoring']

- name: Download and install WireGuard exporter
  ansible.builtin.shell: |
    set -euo pipefail
    cd /tmp
    curl -fsSL -o wireguard_exporter.tar.gz \
      "https://github.com/kbknapp/wireguard_exporter/releases/download/v0.3.0/wireguard_exporter-v0.3.0-x86_64-linux-musl.tar.gz"
    tar -xzf wireguard_exporter.tar.gz
    mv wireguard_exporter /usr/local/bin/wireguard_exporter
    chmod 755 /usr/local/bin/wireguard_exporter
    chown root:root /usr/local/bin/wireguard_exporter
    rm -f wireguard_exporter.tar.gz
  args:
    executable: /bin/bash
  when: not wg_exporter_stat.stat.exists
  tags: ['wireguard', 'monitoring']

- name: Create WireGuard exporter systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Prometheus WireGuard Exporter
      After=network-online.target wg-quick@{{ wireguard_interface }}.service
      Wants=network-online.target

      [Service]
      Type=simple
      User=root
      ExecStart=/usr/local/bin/wireguard_exporter
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/wireguard-exporter.service
    owner: root
    group: root
    mode: '0644'
  register: wg_exporter_service
  tags: ['wireguard', 'monitoring']

- name: Enable and start WireGuard exporter service
  ansible.builtin.systemd:
    name: wireguard-exporter
    enabled: yes
    state: started
    daemon_reload: "{{ wg_exporter_service.changed }}"
  tags: ['wireguard', 'monitoring']

- name: Wait for WireGuard exporter to be ready
  ansible.builtin.wait_for:
    port: 9586
    timeout: 30
  tags: ['wireguard', 'monitoring']

- name: Verify WireGuard exporter is running
  ansible.builtin.uri:
    url: http://127.0.0.1:9586/metrics
    return_content: yes
  register: wg_metrics
  failed_when: "'wireguard' not in wg_metrics.content"
  tags: ['wireguard', 'monitoring']

- name: Display WireGuard exporter status
  ansible.builtin.debug:
    msg: "WireGuard Prometheus exporter running on port 9586"
  tags: ['wireguard', 'monitoring']

- name: Install network debugging tools
  ansible.builtin.apt:
    name:
      - tcpdump
      - conntrack
      - netcat-openbsd
      - mtr-tiny
      - iperf3
    state: present
  tags: ['wireguard', 'monitoring']
