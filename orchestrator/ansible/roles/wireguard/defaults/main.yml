---
# WireGuard defaults

# Enable/disable WireGuard
wireguard_enabled: true

# WireGuard interface name
wireguard_interface: wg0

# UDP port for WireGuard
wireguard_port: 51820

# WireGuard network CIDR
wireguard_network: "10.200.0.0/16"

# Persistent keepalive interval (seconds)
# Keeps NAT mappings alive for nodes behind NAT
# Most NAT gateways timeout after 60-120s, so 25s is safe
wireguard_keepalive: 25

# AllowedIPs for peers (GPU nodes can reach these networks)
wireguard_allowed_ips:
  - "10.200.0.0/16"   # WireGuard overlay network
  - "10.42.0.0/16"    # Flannel pod network

# Server IP assignments (must match inventory hostnames)
# These are statically assigned to control plane nodes
wireguard_server_ips:
  server1: "10.200.0.1"
  server2: "10.200.0.2"
  server3: "10.200.0.3"

# Security: IP allowlisting (DISABLED for now)
# When enabled, only traffic from listed sources is accepted on UDP 51820
# Unauthorized sources are logged and dropped
# To enable: remove 0.0.0.0/0 and add specific provider IP ranges
wireguard_allowed_sources:
  - "0.0.0.0/0"       # Allow all sources (IP allowlisting disabled)

# Rate limiting configuration for WireGuard handshakes
# DISABLED by default - requires 30-day baseline before enabling
# See /docs/runbooks/WIREGUARD-PRODUCTION-HARDENING.md for details
#
# Historical context (DO NOT USE THESE VALUES):
# 2025-11-27: 10/minute burst 5 - CAUSED PRODUCTION OUTAGE
# 2025-11-28: Disabled - CURRENT SAFE CONFIGURATION
#
# Future recommended values (after baseline collection):
# wireguard_ratelimit_rate: "200/minute"
# wireguard_ratelimit_burst: 50
#
# Calculation basis:
# - 10 GPU nodes × 3 servers × 1 handshake/min × 2 safety factor = 60/min
# - With rekeys and network events: 120-150/min realistic
# - Recommended: 200/min with burst 50
wireguard_ratelimit_enabled: false
wireguard_ratelimit_rate: "200/minute"
wireguard_ratelimit_burst: 50

# MTU for WireGuard interface
# Standard internet MTU (1500) minus WireGuard overhead (~80 bytes) = 1420
wireguard_mtu: 1420

# Monitoring configuration
wireguard_monitoring_enabled: true
wireguard_exporter_port: 9586
