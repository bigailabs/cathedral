---
# WireGuard agent routes defaults

# WireGuard network that needs routing back through K3s servers
wireguard_network: "10.200.0.0/16"

# VPC subnets and their respective K3s server gateways
# Agents route WireGuard traffic through their subnet's K3s server
wireguard_vpc_subnets:
  "10.101.0.0/24":
    gateway: "10.101.0.27"    # server1 VPC IP
    server: "server1"
  "10.101.1.0/24":
    gateway: "10.101.1.101"   # server2 VPC IP
    server: "server2"
  "10.101.2.0/24":
    gateway: "10.101.2.35"    # server3 VPC IP
    server: "server3"
