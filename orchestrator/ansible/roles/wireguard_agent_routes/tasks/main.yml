---
# WireGuard routing for K3s agent nodes
#
# Remote GPU nodes join the cluster via WireGuard and use IPs from 10.200.0.0/16.
# K3s agents need to route traffic destined to 10.200.0.0/16 back through
# their respective K3s server (which has WireGuard interface) to ensure
# bi-directional connectivity.

- name: Skip if WireGuard is disabled
  ansible.builtin.meta: end_play
  when: not wireguard_enabled | default(true)

- name: Get agent private IP
  ansible.builtin.set_fact:
    agent_vpc_ip: "{{ agent_private_ip | default(ansible_default_ipv4.address) }}"
  tags: ['wireguard', 'routes']

- name: Determine which VPC subnet the agent belongs to
  ansible.builtin.set_fact:
    agent_subnet: "{{ item.key }}"
    agent_gateway: "{{ item.value.gateway }}"
    agent_gateway_server: "{{ item.value.server }}"
  when: agent_vpc_ip | ansible.utils.ipaddr(item.key)
  loop: "{{ wireguard_vpc_subnets | dict2items }}"
  tags: ['wireguard', 'routes']

- name: Fail if agent subnet could not be determined
  ansible.builtin.fail:
    msg: |
      Could not determine VPC subnet for agent {{ inventory_hostname }}.
      Agent IP: {{ agent_vpc_ip }}
      Configure wireguard_vpc_subnets in role defaults or group_vars.
  when: agent_subnet is not defined
  tags: ['wireguard', 'routes']

- name: Display routing configuration
  ansible.builtin.debug:
    msg: |
      Agent: {{ inventory_hostname }}
      VPC IP: {{ agent_vpc_ip }}
      Subnet: {{ agent_subnet }}
      Gateway: {{ agent_gateway }} ({{ agent_gateway_server }})
      Route: {{ wireguard_network }} via {{ agent_gateway }}
  tags: ['wireguard', 'routes']

- name: Check if WireGuard route already exists
  ansible.builtin.shell: |
    ip route show {{ wireguard_network }} | grep -q "via {{ agent_gateway }}"
  register: route_exists
  changed_when: false
  failed_when: false
  tags: ['wireguard', 'routes']

- name: Add runtime route to WireGuard network
  ansible.builtin.command:
    cmd: ip route add {{ wireguard_network }} via {{ agent_gateway }}
  when: route_exists.rc != 0
  tags: ['wireguard', 'routes']

- name: Get primary network interface name
  ansible.builtin.shell: |
    ip route get 1.1.1.1 | awk '{print $5; exit}'
  register: primary_interface
  changed_when: false
  tags: ['wireguard', 'routes']

- name: Deploy netplan configuration for persistent WireGuard routes
  ansible.builtin.template:
    src: 99-wireguard-routes.yaml.j2
    dest: /etc/netplan/99-wireguard-routes.yaml
    owner: root
    group: root
    mode: '0644'
  register: netplan_config
  tags: ['wireguard', 'routes']

- name: Apply netplan configuration
  ansible.builtin.command: netplan apply
  when: netplan_config.changed
  tags: ['wireguard', 'routes']

- name: Verify WireGuard route is active
  ansible.builtin.shell: |
    ip route get {{ wireguard_network | ansible.utils.ipaddr('network') | default('10.200.0.1') }}
  register: route_verify
  changed_when: false
  tags: ['wireguard', 'routes']

- name: Display route verification
  ansible.builtin.debug:
    msg: "Route verification: {{ route_verify.stdout }}"
  tags: ['wireguard', 'routes']
