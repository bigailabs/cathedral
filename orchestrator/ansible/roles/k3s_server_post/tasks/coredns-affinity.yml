---
# Configure CoreDNS DaemonSet for local DNS availability on all nodes.
# With internalTrafficPolicy: Local, each node needs a local CoreDNS pod.
# The DaemonSet ensures one CoreDNS pod runs on every node.

- name: Check if CoreDNS is deployed as DaemonSet
  ansible.builtin.command:
    cmd: kubectl -n kube-system get daemonset coredns -o jsonpath='{.metadata.name}'
  register: coredns_daemonset_check
  changed_when: false
  failed_when: false
  tags: ['k3s', 'post', 'coredns']

- name: Check if CoreDNS is deployed as Deployment
  ansible.builtin.command:
    cmd: kubectl -n kube-system get deployment coredns -o jsonpath='{.metadata.name}'
  register: coredns_deployment_check
  changed_when: false
  failed_when: false
  tags: ['k3s', 'post', 'coredns']

- name: Set CoreDNS deployment type fact
  ansible.builtin.set_fact:
    coredns_is_daemonset: "{{ coredns_daemonset_check.rc == 0 and coredns_daemonset_check.stdout == 'coredns' }}"
    coredns_is_deployment: "{{ coredns_deployment_check.rc == 0 and coredns_deployment_check.stdout == 'coredns' }}"
  tags: ['k3s', 'post', 'coredns']

# DaemonSet path: verify all nodes have CoreDNS pods
- name: Wait for CoreDNS DaemonSet to be ready
  ansible.builtin.command:
    cmd: kubectl -n kube-system get daemonset coredns -o jsonpath='{.status.numberReady}'
  register: coredns_ds_ready
  until: coredns_ds_ready.stdout | int >= 1
  retries: 30
  delay: 10
  changed_when: false
  when: coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

- name: Get DaemonSet desired vs ready count
  ansible.builtin.command:
    cmd: kubectl -n kube-system get daemonset coredns -o jsonpath='{.status.desiredNumberScheduled}/{.status.numberReady}'
  register: coredns_ds_status
  changed_when: false
  when: coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

- name: Display CoreDNS DaemonSet status
  ansible.builtin.debug:
    msg: "CoreDNS DaemonSet: {{ coredns_ds_status.stdout }} (desired/ready)"
  when: coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

# Deployment path (legacy): configure affinity and scaling
- name: Wait for CoreDNS Deployment to be ready
  ansible.builtin.command:
    cmd: kubectl -n kube-system get deployment coredns -o jsonpath='{.status.readyReplicas}'
  register: coredns_deploy_ready
  until: coredns_deploy_ready.stdout | int >= 1
  retries: 30
  delay: 10
  changed_when: false
  when: coredns_is_deployment and not coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

- name: Get current CoreDNS Deployment spec
  ansible.builtin.command:
    cmd: kubectl -n kube-system get deployment coredns -o json
  register: coredns_deployment
  changed_when: false
  when: coredns_is_deployment and not coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

- name: Check if CoreDNS Deployment has WireGuard affinity
  ansible.builtin.set_fact:
    coredns_has_affinity: "{{ (coredns_deployment.stdout | from_json).spec.template.spec.affinity.nodeAffinity is defined }}"
  when: coredns_is_deployment and not coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

- name: Patch CoreDNS Deployment to prefer non-WireGuard nodes
  ansible.builtin.command:
    cmd: >
      kubectl -n kube-system patch deployment coredns --type=strategic -p
      '{"spec":{"template":{"spec":{"affinity":{"nodeAffinity":{"preferredDuringSchedulingIgnoredDuringExecution":[{"weight":100,"preference":{"matchExpressions":[{"key":"basilica.ai/wireguard","operator":"DoesNotExist"}]}}]}}}}}}'
  when: coredns_is_deployment and not coredns_is_daemonset and not coredns_has_affinity
  register: coredns_patch
  changed_when: coredns_patch.rc == 0
  tags: ['k3s', 'post', 'coredns']

- name: Scale CoreDNS Deployment for redundancy
  ansible.builtin.command:
    cmd: kubectl -n kube-system scale deployment coredns --replicas=3
  register: coredns_scale
  changed_when: "'scaled' in coredns_scale.stdout"
  when: coredns_is_deployment and not coredns_is_daemonset
  tags: ['k3s', 'post', 'coredns']

# Common: Set internalTrafficPolicy to Local for all deployment types
# This ensures pods use the CoreDNS instance on their own node,
# avoiding cross-node traffic through WireGuard.
- name: Patch kube-dns service to use local traffic policy
  ansible.builtin.command:
    cmd: kubectl -n kube-system patch svc kube-dns -p '{"spec":{"internalTrafficPolicy":"Local"}}'
  register: dns_svc_patch
  changed_when: "'patched' in dns_svc_patch.stdout"
  tags: ['k3s', 'post', 'coredns']

- name: Verify CoreDNS pods are running
  ansible.builtin.command:
    cmd: kubectl -n kube-system get pods -l k8s-app=kube-dns -o wide
  register: coredns_pods
  changed_when: false
  tags: ['k3s', 'post', 'coredns']

- name: Display CoreDNS pod locations
  ansible.builtin.debug:
    msg: "{{ coredns_pods.stdout_lines }}"
  tags: ['k3s', 'post', 'coredns']
