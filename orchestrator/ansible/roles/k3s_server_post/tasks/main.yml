---
- name: Wait for K3s API server to be ready
  ansible.builtin.command:
    cmd: kubectl get nodes
  register: kubectl_result
  until: kubectl_result.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  tags: ['k3s', 'post']

- name: Display cluster nodes
  ansible.builtin.debug:
    msg: "{{ kubectl_result.stdout_lines }}"
  tags: ['k3s', 'post']

- name: Deploy calico
  ansible.builtin.include_tasks: calico.yml
  tags: calico
  when: calico_iface is defined and cilium_iface is not defined

- name: Deploy cilium
  ansible.builtin.include_tasks: cilium.yml
  tags: cilium
  when: cilium_iface is defined

- name: Deploy metallb pool
  ansible.builtin.include_tasks: metallb.yml
  tags: metallb
  when: metal_lb_mode is defined and kube_vip_lb_ip_range is not defined and (not cilium_bgp or cilium_iface is not defined)

- name: Verify agent node labels
  ansible.builtin.include_tasks: verify-agent-labels.yml
  tags: ['k3s', 'post', 'labels']

- name: Apply control plane taints
  ansible.builtin.include_tasks: taint-control-plane.yml
  tags: ['k3s', 'post', 'taint']

- name: Configure CoreDNS affinity for WireGuard reliability
  ansible.builtin.include_tasks: coredns-affinity.yml
  tags: ['k3s', 'post', 'coredns']
  when: wireguard_enabled | default(false)

- name: Remove tmp directory used for manifests
  ansible.builtin.file:
    path: /tmp/k3s
    state: absent
