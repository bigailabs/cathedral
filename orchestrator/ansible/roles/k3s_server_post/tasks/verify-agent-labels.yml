---
- name: Get list of agent nodes
  ansible.builtin.command:
    cmd: kubectl get nodes -l '!node-role.kubernetes.io/control-plane' -o jsonpath='{.items[*].metadata.name}'
  register: agent_nodes
  changed_when: false
  tags: ['k3s', 'post', 'labels']

- name: Display agent nodes
  ansible.builtin.debug:
    msg: "Agent nodes: {{ agent_nodes.stdout.split() }}"
  tags: ['k3s', 'post', 'labels']

- name: Verify agent nodes have workloads-only label
  ansible.builtin.command:
    cmd: kubectl get node {{ item }} -o jsonpath='{.metadata.labels.basilica\.ai/workloads-only}'
  loop: "{{ agent_nodes.stdout.split() }}"
  register: verify_labels
  changed_when: false
  failed_when: verify_labels.stdout != 'true'
  tags: ['k3s', 'post', 'labels']

- name: Display label verification results
  ansible.builtin.debug:
    msg: "Node {{ item.item }} has basilica.ai/workloads-only={{ item.stdout }}"
  loop: "{{ verify_labels.results }}"
  tags: ['k3s', 'post', 'labels']

- name: Apply workloads-only label if missing
  ansible.builtin.command:
    cmd: kubectl label nodes {{ item.item }} basilica.ai/workloads-only=true --overwrite
  loop: "{{ verify_labels.results }}"
  when: item.stdout != 'true'
  register: label_result
  changed_when: "'labeled' in label_result.stdout or 'modified' in label_result.stdout"
  tags: ['k3s', 'post', 'labels']
