---
- name: Get list of control plane nodes
  ansible.builtin.command:
    cmd: kubectl get nodes -l node-role.kubernetes.io/control-plane=true -o jsonpath='{.items[*].metadata.name}'
  register: control_plane_nodes
  changed_when: false
  tags: ['k3s', 'post', 'taint']

- name: Display control plane nodes
  ansible.builtin.debug:
    msg: "Control plane nodes: {{ control_plane_nodes.stdout.split() }}"
  tags: ['k3s', 'post', 'taint']

- name: Apply custom taint to control plane nodes
  ansible.builtin.command:
    cmd: kubectl taint nodes {{ item }} basilica.ai/control-plane-only=true:NoSchedule --overwrite
  loop: "{{ control_plane_nodes.stdout.split() }}"
  register: taint_result
  changed_when: "'tainted' in taint_result.stdout or 'modified' in taint_result.stdout"
  failed_when: taint_result.rc != 0 and 'already has' not in taint_result.stderr
  tags: ['k3s', 'post', 'taint']

- name: Verify control plane taints
  ansible.builtin.command:
    cmd: kubectl get nodes {{ item }} -o jsonpath='{.spec.taints[*].key}'
  loop: "{{ control_plane_nodes.stdout.split() }}"
  register: verify_taints
  changed_when: false
  failed_when: "'basilica.ai/control-plane-only' not in verify_taints.stdout"
  tags: ['k3s', 'post', 'taint']

- name: Display taint verification results
  ansible.builtin.debug:
    msg: "Node {{ item.item }} has taints: {{ item.stdout }}"
  loop: "{{ verify_taints.results }}"
  tags: ['k3s', 'post', 'taint']
