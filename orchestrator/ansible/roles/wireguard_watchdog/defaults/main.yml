---
# Default variables for wireguard_watchdog role

# Enable/disable watchdog
wireguard_watchdog_enabled: true

# WireGuard interface name
wireguard_interface: wg0

# Servers to ping for connectivity check (space-separated)
watchdog_servers: "10.200.0.1 10.200.0.2 10.200.0.3"

# Number of consecutive failures before restart
watchdog_failure_threshold: 3

# Seconds between connectivity checks
watchdog_check_interval: 30

# Ping timeout in seconds (per server, parallel execution)
watchdog_ping_timeout: 3

# Startup jitter range in seconds (0 to N) to prevent fleet synchronization
watchdog_startup_jitter: 5

# Maximum WireGuard handshake age in seconds before considering tunnel stale
# WireGuard handshake timeout is 120s, we use 150s to allow margin
watchdog_handshake_max_age: 150

# Kubernetes node tainting on connectivity failure
# When enabled, the watchdog will add a taint to prevent pod scheduling
# during WireGuard connectivity issues and remove it on recovery
watchdog_k8s_tainting_enabled: true
watchdog_taint_key: "basilica.ai/wireguard-failure"
watchdog_taint_value: "true"
watchdog_taint_effect: "NoExecute"

# Path to kubectl binary (K3s provides this)
watchdog_kubectl_path: "/usr/local/bin/k3s kubectl"

# Path to kubeconfig for kubectl (K3s agent uses kubelet config)
watchdog_kubeconfig_path: "/var/lib/rancher/k3s/agent/kubelet.kubeconfig"
