---
# Deploy WireGuard connectivity watchdog service

- name: Skip if watchdog is disabled
  ansible.builtin.meta: end_play
  when: not wireguard_watchdog_enabled | default(true)

- name: Deploy WireGuard watchdog script
  ansible.builtin.copy:
    src: wireguard-watchdog.sh
    dest: /usr/local/bin/wireguard-watchdog.sh
    owner: root
    group: root
    mode: '0755'
  tags: ['wireguard', 'watchdog']

- name: Deploy WireGuard watchdog systemd service
  ansible.builtin.template:
    src: wireguard-watchdog.service.j2
    dest: /etc/systemd/system/wireguard-watchdog.service
    owner: root
    group: root
    mode: '0644'
  register: watchdog_service
  notify: Restart wireguard watchdog
  tags: ['wireguard', 'watchdog']

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes
  when: watchdog_service.changed
  tags: ['wireguard', 'watchdog']

- name: Enable and start WireGuard watchdog service
  ansible.builtin.systemd:
    name: wireguard-watchdog
    enabled: yes
    state: started
  tags: ['wireguard', 'watchdog']

- name: Verify watchdog is running
  ansible.builtin.command: systemctl is-active wireguard-watchdog
  register: watchdog_status
  changed_when: false
  failed_when: watchdog_status.rc != 0
  tags: ['wireguard', 'watchdog', 'verify']

- name: Display watchdog status
  ansible.builtin.debug:
    msg: "WireGuard watchdog is {{ watchdog_status.stdout }}"
  tags: ['wireguard', 'watchdog', 'verify']
