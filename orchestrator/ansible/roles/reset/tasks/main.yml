---
- name: Disable K3s services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  failed_when: false
  with_items:
    - k3s
    - k3s-agent
    - k3s-init
  tags: ['reset', 'k3s']

- name: Kill K3s processes
  ansible.builtin.command: pkill -9 -f "k3s/data/[^/]+/bin/containerd-shim-runc"
  register: pkill_containerd_shim_runc
  changed_when: pkill_containerd_shim_runc.rc == 0
  failed_when: false
  tags: ['reset', 'k3s']

- name: Unmount K3s filesystems
  ansible.builtin.include_tasks: umount_with_children.yml
  with_items:
    - /run/k3s
    - /var/lib/kubelet
    - /run/netns
    - /var/lib/rancher/k3s
    - /var/lib/kubelet/pods
    - /var/lib/kubelet/plugins
    - /run/netns/cni-
  loop_control:
    loop_var: mounted_fs
  tags: ['reset', 'k3s']

- name: Remove K3s service files, binaries, and data
  ansible.builtin.file:
    name: "{{ item }}"
    state: absent
  with_items:
    - /usr/local/bin/k3s
    - "{{ systemd_dir }}/k3s.service"
    - "{{ systemd_dir }}/k3s-agent.service"
    - "{{ systemd_dir }}/k3s-init.service"
    - /etc/rancher/k3s
    - /run/k3s
    - /run/flannel
    - /etc/rancher/
    - /var/lib/kubelet
    - /var/lib/rancher/k3s
    - /var/lib/rancher/
    - /var/lib/cni/
    - /etc/cni/net.d
  tags: ['reset', 'k3s']

- name: Remove K3s symlinks
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - /usr/local/bin/kubectl
    - /usr/local/bin/crictl
    - /usr/local/bin/ctr
  tags: ['reset', 'k3s']

- name: Remove K3s http_proxy files
  ansible.builtin.file:
    name: "{{ item }}"
    state: absent
  with_items:
    - "{{ systemd_dir }}/k3s.service.d/http_proxy.conf"
    - "{{ systemd_dir }}/k3s.service.d"
    - "{{ systemd_dir }}/k3s-agent.service.d/http_proxy.conf"
    - "{{ systemd_dir }}/k3s-agent.service.d"
  when: proxy_env is defined
  tags: ['reset', 'k3s']

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  tags: ['reset', 'k3s']

- name: Remove temporary manifests directory
  ansible.builtin.file:
    path: /tmp/k3s
    state: absent
  tags: ['reset', 'k3s']
