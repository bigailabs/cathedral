---
- name: Install required packages
  apt:
    name:
      - jq
    state: present
    update_cache: yes

- name: Copy cleanup script
  copy:
    src: cleanup-disk.sh
    dest: /usr/local/bin/cleanup-disk.sh
    mode: '0755'
    owner: root
    group: root

- name: Create log directory
  file:
    path: /var/log
    state: directory
    mode: '0755'

- name: Create cleanup log file
  file:
    path: /var/log/disk-cleanup.log
    state: touch
    mode: '0644'
    owner: root
    group: root
    modification_time: preserve
    access_time: preserve

- name: Configure log rotation
  copy:
    dest: /etc/logrotate.d/disk-cleanup
    content: |
      /var/log/disk-cleanup.log {
        daily
        rotate 7
        compress
        missingok
        notifempty
        create 0644 root root
      }
    mode: '0644'

- name: Install systemd service
  template:
    src: disk-cleanup.service.j2
    dest: /etc/systemd/system/disk-cleanup.service
    mode: '0644'

- name: Install systemd timer
  template:
    src: disk-cleanup.timer.j2
    dest: /etc/systemd/system/disk-cleanup.timer
    mode: '0644'

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start cleanup timer
  systemd:
    name: disk-cleanup.timer
    enabled: yes
    state: started

- name: Verify timer is active
  command: systemctl status disk-cleanup.timer
  register: timer_status
  changed_when: false

- name: Display timer status
  debug:
    var: timer_status.stdout_lines
