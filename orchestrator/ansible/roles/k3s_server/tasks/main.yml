---
- name: Determine first master node
  ansible.builtin.set_fact:
    first_master: "{{ groups['k3s_server'][0] }}"
  run_once: true
  tags: ['k3s', 'server']

- name: Set first master hostname
  ansible.builtin.set_fact:
    first_master_hostname: "{{ hostvars[groups['k3s_server'][0]]['ansible_hostname'] | default(groups['k3s_server'][0]) }}"
  tags: ['k3s', 'server']

- name: Set first master IP
  ansible.builtin.set_fact:
    first_master_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] | default(hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address']) }}"
  tags: ['k3s', 'server']

- name: Check if K3s server is already installed
  ansible.builtin.stat:
    path: /etc/systemd/system/k3s.service
  register: k3s_service
  tags: ['k3s', 'server']

- name: Stop k3s-init if exists
  ansible.builtin.systemd:
    name: k3s-init
    state: stopped
  failed_when: false
  tags: ['k3s', 'server']

- name: Stop k3s service if exists
  ansible.builtin.systemd:
    name: k3s
    state: stopped
  failed_when: false
  tags: ['k3s', 'server']

- name: Clean previous runs of k3s-init
  ansible.builtin.command: systemctl reset-failed k3s-init
  failed_when: false
  changed_when: false
  tags: ['k3s', 'server']

- name: Debug all vars to see what's actually loaded
  ansible.builtin.debug:
    msg: "k3s_token={{ k3s_token | default('UNDEFINED') }}, k3s_version={{ k3s_version | default('UNDEFINED') }}"
  run_once: true
  tags: ['k3s', 'server']

- name: Validate cluster token is provided
  ansible.builtin.fail:
    msg: "k3s_token must be set to a non-empty value in group_vars/all/infrastructure.yml"
  when: k3s_token is not defined or k3s_token == ''
  run_once: true
  tags: ['k3s', 'server']

- name: Determine server initialization arguments
  ansible.builtin.set_fact:
    server_init_args: >-
      {% if groups['k3s_server'] | length > 1 %}
      {% if ansible_hostname == first_master_hostname %}--cluster-init{% else %}--server https://{{ first_master_ip }}:6443{% endif %}
      --token {{ k3s_token }}
      {% endif %}
      {% if wireguard_enabled | default(false) %}
      --flannel-backend=vxlan
      --flannel-external-ip={{ wireguard_server_ips[inventory_hostname] | default('') }}
      {% endif %}
      {{ k3s_server_exec_args }}
  tags: ['k3s', 'server']

- name: Check if etcd database exists
  ansible.builtin.stat:
    path: /var/lib/rancher/k3s/server/db/etcd
  register: k3s_etcd_db
  tags: ['k3s', 'server']

- name: Check if state database exists
  ansible.builtin.stat:
    path: /var/lib/rancher/k3s/server/db/state.db
  register: k3s_state_db
  tags: ['k3s', 'server']

- name: Remove entire etcd database directory for clean bootstrap
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/db
    state: absent
  when:
    - k3s_etcd_db.stat.exists or k3s_state_db.stat.exists
  tags: ['k3s', 'server']

- name: Init cluster inside transient k3s-init service
  ansible.builtin.command:
    cmd: systemd-run -p RestartSec=2 -p Restart=on-failure --unit=k3s-init k3s server {{ server_init_args }}
  register: k3s_init_command
  changed_when: k3s_init_command.rc == 0
  tags: ['k3s', 'server']

- name: Wait for K3s API server to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 180
  when: k3s_init_command is changed
  tags: ['k3s', 'server']

- name: Verify that all server nodes joined
  ansible.builtin.command:
    cmd: k3s kubectl get nodes -l 'node-role.kubernetes.io/control-plane=true' -o=jsonpath='{.items[*].metadata.name}'
  register: nodes
  until: nodes.rc == 0 and (nodes.stdout.split() | length) == (groups['k3s_server'] | length)
  retries: "{{ retry_count | default(20) }}"
  delay: "{{ retry_delay | default(10) }}"
  changed_when: false
  when:
    - not ansible_check_mode
    - groups['k3s_server'] | length > 1
  tags: ['k3s', 'server']

- name: Kill the temporary k3s-init service
  ansible.builtin.systemd:
    name: k3s-init
    state: stopped
  failed_when: false
  tags: ['k3s', 'server']

- name: Copy K3s service file
  ansible.builtin.template:
    src: k3s.service.j2
    dest: "{{ systemd_dir }}/k3s.service"
    owner: root
    group: root
    mode: "0644"
  register: k3s_service_file
  tags: ['k3s', 'server']

- name: Enable and start K3s service
  ansible.builtin.systemd:
    name: k3s
    daemon_reload: true
    state: started
    enabled: true
  tags: ['k3s', 'server']

- name: Wait for node-token file
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60
  tags: ['k3s', 'server']

- name: Read node-token from master
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token
  tags: ['k3s', 'server']

- name: Store master node-token (clean up any trailing whitespace)
  ansible.builtin.set_fact:
    k3s_server_token: "{{ node_token.content | b64decode | trim }}"
  tags: ['k3s', 'server']

- name: Validate node-token format
  ansible.builtin.assert:
    that:
      - k3s_server_token is search('^K[0-9a-f]+::server:')
      - k3s_server_token | length > 20
      - k3s_server_token is not search('--')
    fail_msg: "Invalid node-token format detected: {{ k3s_server_token[:50] }}..."
    success_msg: "Node-token validated successfully"
  tags: ['k3s', 'server']

- name: Create .kube directory for user
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.kube"
    state: directory
    owner: "{{ ansible_user_id }}"
    mode: "0750"
  tags: ['k3s', 'server', 'kubeconfig']

- name: Copy kubeconfig to user home directory
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "{{ ansible_user_dir }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user_id }}"
    mode: "0600"
  tags: ['k3s', 'server', 'kubeconfig']

- name: Replace localhost with actual host in kubeconfig
  ansible.builtin.replace:
    path: "{{ ansible_user_dir }}/.kube/config"
    regexp: 'https://127.0.0.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  tags: ['k3s', 'server', 'kubeconfig']

- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  tags: ['k3s', 'server']

- name: Create crictl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/crictl
    state: link
  tags: ['k3s', 'server']

- name: Verify kubectl is available
  ansible.builtin.command: kubectl version --client
  changed_when: false
  register: kubectl_verify
  tags: ['k3s', 'server']
