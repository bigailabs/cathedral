---
dependencies:
  - role: prereq
  - role: download
  - role: k3s_custom_registries
    when: custom_registries | default(false) | bool

argument_specs:
  main:
    short_description: Setup K3s server nodes with HA support
    options:
      k3s_version:
        description: K3s version to install
        required: true
        type: str
      k3s_server_exec_args:
        description: Extra arguments for K3s server
        default: ""
        type: str
      k3s_token:
        description: Cluster join token for HA
        type: str
        required: false
      custom_registries:
        description: Enable custom registries
        type: bool
        default: false
      install_rust:
        description: Install Rust toolchain for CRD generation
        type: bool
        default: false

galaxy_info:
  author: Basilica Team
  description: Production-grade K3s server installation with HA support
  min_ansible_version: "2.11"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
