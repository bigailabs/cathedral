---
# K3s version and channel
k3s_version: v1.31.1+k3s1
k3s_channel: stable

# Server execution arguments
k3s_server_exec_args: >-
  --write-kubeconfig-mode 644
  --disable traefik

# System paths
systemd_dir: /etc/systemd/system

# Retry and timeout configuration
retry_count: 20
retry_delay: 10
download_timeout: 300

# Feature toggles
install_rust: false
k3s_create_kubectl_symlink: true
k3s_create_crictl_symlink: true
k3s_master_taint: true

# Logging
k3s_log_destination: ""

# Proxy environment (empty by default)
proxy_env: {}
