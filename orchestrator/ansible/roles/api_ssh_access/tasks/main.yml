---
# Setup SSH access for Basilica API service to K3s servers
# This allows the API to create K3s tokens and manage node passwords via SSH

- name: Create API SSH user
  ansible.builtin.user:
    name: "{{ api_ssh_username }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ api_ssh_username }}/.ssh"
    state: directory
    owner: "{{ api_ssh_username }}"
    group: "{{ api_ssh_username }}"
    mode: "0700"

- name: Read public key from control machine
  ansible.builtin.slurp:
    src: "{{ api_ssh_public_key_path | expanduser }}"
  delegate_to: localhost
  become: false
  register: api_public_key

- name: Add public key to authorized_keys
  ansible.builtin.authorized_key:
    user: "{{ api_ssh_username }}"
    key: "{{ api_public_key.content | b64decode }}"
    state: present
    exclusive: false

- name: Configure restricted sudo access for API user
  ansible.builtin.template:
    src: sudoers.j2
    dest: "/etc/sudoers.d/{{ api_ssh_username }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Verify SSH access works
  ansible.builtin.command:
    cmd: "id {{ api_ssh_username }}"
  changed_when: false
  register: user_info

- name: Display user info
  ansible.builtin.debug:
    msg: "API user configured: {{ user_info.stdout }}"
