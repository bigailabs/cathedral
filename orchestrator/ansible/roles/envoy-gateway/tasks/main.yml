---
- name: Check if Envoy Gateway CRDs are installed
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: gatewayclasses.gateway.networking.k8s.io
  register: gateway_crds
  failed_when: false

- name: Download Gateway API CRDs manifest when missing
  ansible.builtin.uri:
    url: "https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml"
    return_content: true
  register: gateway_api_crds_manifest
  when: gateway_crds.resources is not defined or gateway_crds.resources | length == 0

- name: Install Gateway API CRDs if not present
  kubernetes.core.k8s:
    state: present
    definition: "{{ gateway_api_crds_manifest.content | from_yaml_all | list }}"
  when: gateway_crds.resources is not defined or gateway_crds.resources | length == 0

- name: Create Envoy Gateway namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ envoy_gateway_namespace }}"

- name: Create temporary directory for Helm values
  ansible.builtin.tempfile:
    state: directory
    suffix: envoy-gateway
  register: temp_dir

- name: Template Helm values file
  ansible.builtin.template:
    src: values.yaml.j2
    dest: "{{ temp_dir.path }}/values.yaml"
    mode: '0644'

- name: Add Envoy Gateway Helm repository
  kubernetes.core.helm_repository:
    name: envoy-gateway
    repo_url: "https://gateway.envoyproxy.io/charts"
    state: present
  register: helm_repo_result
  retries: 3
  delay: 5
  until: helm_repo_result is succeeded

- name: Deploy Envoy Gateway via Helm
  kubernetes.core.helm:
    name: "{{ envoy_gateway_release_name }}"
    chart_ref: envoy-gateway/gateway-helm
    chart_version: "{{ envoy_gateway_version }}"
    release_namespace: "{{ envoy_gateway_namespace }}"
    create_namespace: true
    values_files:
      - "{{ temp_dir.path }}/values.yaml"
    wait: true
    wait_timeout: "5m"
  register: helm_install_result
  retries: 2
  delay: 10
  until: helm_install_result is succeeded

- name: Wait for Envoy Gateway controller to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: envoy-gateway
    namespace: "{{ envoy_gateway_namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300

- name: Cleanup temporary directory
  ansible.builtin.file:
    path: "{{ temp_dir.path }}"
    state: absent

- name: Display Envoy Gateway installation status
  ansible.builtin.debug:
    msg: "Envoy Gateway {{ envoy_gateway_version }} installed successfully in {{ envoy_gateway_namespace }}"
