---
# x86_64 (amd64) architecture
- name: Check if K3s binary already exists (x86_64)
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  when: ansible_facts.architecture == "x86_64"
  register: k3s_binary_stat
  tags: ['download', 'k3s']

- name: Download K3s binary x86_64
  ansible.builtin.shell: |
    curl -fsSL --connect-timeout 30 --max-time {{ download_timeout }} \
      -o /tmp/k3s-download \
      https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s
  args:
    creates: /usr/local/bin/k3s
  when:
    - ansible_facts.architecture == "x86_64"
    - not k3s_binary_stat.stat.exists | default(false)
  register: k3s_download
  retries: 3
  delay: 10
  until: k3s_download.rc == 0
  tags: ['download', 'k3s']

- name: Download K3s checksum x86_64
  ansible.builtin.shell: |
    curl -fsSL --connect-timeout 30 --max-time 60 \
      -o /tmp/k3s-checksum.txt \
      https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/sha256sum-amd64.txt
  when:
    - ansible_facts.architecture == "x86_64"
    - not k3s_binary_stat.stat.exists | default(false)
  register: k3s_checksum_download
  retries: 3
  delay: 10
  until: k3s_checksum_download.rc == 0
  tags: ['download', 'k3s']

- name: Verify K3s binary checksum (x86_64)
  ansible.builtin.shell: |
    cd /tmp
    sha256sum k3s-download > /tmp/k3s-actual-checksum.txt
    expected_checksum=$(awk '$2 == "k3s" {print $1}' k3s-checksum.txt)
    actual_checksum=$(cat /tmp/k3s-actual-checksum.txt | awk '{print $1}')
    if [ "$expected_checksum" = "$actual_checksum" ]; then
      echo "Checksum verified: $actual_checksum"
      exit 0
    else
      echo "Checksum mismatch! Expected: $expected_checksum, Got: $actual_checksum"
      exit 1
    fi
  when:
    - ansible_facts.architecture == "x86_64"
    - not k3s_binary_stat.stat.exists | default(false)
  changed_when: false
  tags: ['download', 'verify']

- name: Install K3s binary (x86_64)
  ansible.builtin.copy:
    src: /tmp/k3s-download
    dest: /usr/local/bin/k3s
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when:
    - ansible_facts.architecture == "x86_64"
    - not k3s_binary_stat.stat.exists | default(false)
  tags: ['download', 'k3s']

- name: Cleanup temporary files (x86_64)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/k3s-download
    - /tmp/k3s-checksum.txt
  when: ansible_facts.architecture == "x86_64"
  tags: ['download', 'cleanup']

- name: Verify K3s binary is executable (x86_64)
  ansible.builtin.command: /usr/local/bin/k3s --version
  when: ansible_facts.architecture == "x86_64"
  register: k3s_verify
  changed_when: false
  failed_when: k3s_verify.rc != 0
  tags: ['download', 'verify']

# Architecture validation
- name: Validate system architecture is supported
  ansible.builtin.assert:
    that:
      - ansible_facts.architecture in ['x86_64', 'aarch64', 'armv7l']
    fail_msg: "Unsupported architecture: {{ ansible_facts.architecture }}. K3s supports x86_64, aarch64, and armv7l only."
    success_msg: "Architecture {{ ansible_facts.architecture }} is supported."
  tags: ['download', 'validate']

# arm64 (aarch64) architecture
