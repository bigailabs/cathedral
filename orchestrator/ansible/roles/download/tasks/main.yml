- name: Verify K3s binary is executable (arm64)
  ansible.builtin.command: /usr/local/bin/k3s --version
  when:
    - (ansible_facts.architecture is search("arm") and ansible_facts.userspace_bits == "64")
      or ansible_facts.architecture is search("aarch64")
  register: k3s_verify_arm64
  changed_when: false
  failed_when: k3s_verify_arm64.rc != 0
  tags: ['download', 'verify']

