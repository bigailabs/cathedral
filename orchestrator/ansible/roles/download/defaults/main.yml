---
# K3s version
k3s_version: v1.31.1+k3s1

# Download configuration
download_timeout: 300
download_retries: 3
download_delay: 10

# Architecture (auto-detected)
k3s_arch: "{{ ansible_architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }}"

# Checksum validation
k3s_verify_checksum: true

# Binary destination
k3s_install_dir: /usr/local/bin
