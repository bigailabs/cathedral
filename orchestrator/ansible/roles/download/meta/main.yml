---
dependencies: []

argument_specs:
  main:
    short_description: Download and verify K3s binaries
    options:
      k3s_version:
        description: The desired version of K3s
        required: true
        type: str
      download_timeout:
        description: Download timeout in seconds
        default: 300
        type: int

galaxy_info:
  author: Basilica Team
  description: K3s binary download with SHA256 verification
  min_ansible_version: "2.11"
  platforms:
    - name: Ubuntu
      versions:
        - focal
        - jammy
        - noble
