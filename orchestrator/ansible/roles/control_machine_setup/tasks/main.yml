---
- name: Check if cargo is already installed on control machine
  ansible.builtin.shell: |
    set -euo pipefail
    if command -v cargo >/dev/null 2>&1; then
      echo present
    else
      echo absent
    fi
  args:
    executable: /bin/bash
  register: cargo_check
  changed_when: false
  failed_when: false
  delegate_to: localhost
  run_once: true
  when: install_rust_on_control | default(true) | bool
  tags: ['control', 'rust']

- name: Display cargo status
  ansible.builtin.debug:
    msg: "Cargo status on control machine: {{ cargo_check.stdout | default('not checked') }}"
  delegate_to: localhost
  run_once: true
  when: install_rust_on_control | default(true) | bool
  tags: ['control', 'rust']

- name: Install Rust toolchain dependencies (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - build-essential
      - pkg-config
      - libssl-dev
      - protobuf-compiler
      - clang
      - curl
    state: present
    update_cache: true
  delegate_to: localhost
  run_once: true
  become: true
  when:
    - install_rust_on_control | default(true) | bool
    - (cargo_check.stdout | default('absent')) != 'present'
    - ansible_facts['os_family'] == 'Debian'
  tags: ['control', 'rust', 'dependencies']

- name: Check if running on macOS
  ansible.builtin.set_fact:
    is_macos: "{{ ansible_facts['system'] == 'Darwin' }}"
  delegate_to: localhost
  run_once: true
  when: install_rust_on_control | default(true) | bool
  tags: ['control', 'rust']

- name: Install Rust toolchain dependencies (macOS)
  ansible.builtin.command:
    cmd: xcode-select --install
  delegate_to: localhost
  run_once: true
  register: xcode_install
  failed_when: false
  changed_when: xcode_install.rc == 0
  when:
    - install_rust_on_control | default(true) | bool
    - (cargo_check.stdout | default('absent')) != 'present'
    - is_macos | default(false) | bool
  tags: ['control', 'rust', 'dependencies']

- name: Install Rust toolchain via rustup on control machine
  ansible.builtin.shell: |
    set -euo pipefail
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
      sh -s -- -y --profile {{ rust_toolchain_profile }} --default-toolchain {{ rust_default_toolchain }}
  args:
    executable: /bin/bash
  delegate_to: localhost
  run_once: true
  when:
    - install_rust_on_control | default(true) | bool
    - (cargo_check.stdout | default('absent')) != 'present'
  tags: ['control', 'rust', 'install']

- name: Source cargo environment
  ansible.builtin.shell: |
    set -euo pipefail
    if [ -f "$HOME/.cargo/env" ]; then
      source "$HOME/.cargo/env"
    fi
    cargo --version
  args:
    executable: /bin/bash
  delegate_to: localhost
  run_once: true
  register: cargo_version
  changed_when: false
  when: install_rust_on_control | default(true) | bool
  tags: ['control', 'rust', 'verify']

- name: Display Rust toolchain version
  ansible.builtin.debug:
    msg: "Rust toolchain installed: {{ cargo_version.stdout }}"
  delegate_to: localhost
  run_once: true
  when:
    - install_rust_on_control | default(true) | bool
    - cargo_version.stdout is defined
  tags: ['control', 'rust', 'verify']

- name: Verify protobuf compiler is available
  ansible.builtin.command: protoc --version
  delegate_to: localhost
  run_once: true
  register: protoc_version
  changed_when: false
  failed_when: false
  when: install_rust_on_control | default(true) | bool
  tags: ['control', 'verify']

- name: Display protobuf compiler status
  ansible.builtin.debug:
    msg: "Protobuf compiler {{ 'installed: ' + protoc_version.stdout if protoc_version.rc == 0 else 'NOT FOUND - CRD generation may fail' }}"
  delegate_to: localhost
  run_once: true
  when: install_rust_on_control | default(true) | bool
  tags: ['control', 'verify']
