---
- name: Check for PXE-booted system
  ansible.builtin.command:
    cmd: cat /proc/cmdline
  register: boot_cmdline
  changed_when: false
  check_mode: false
  tags: ['k3s', 'agent']

- name: Set fact for PXE-booted system
  ansible.builtin.set_fact:
    is_pxe_booted: "{{ 'root=/dev/nfs' in boot_cmdline.stdout }}"
  when: boot_cmdline.stdout is defined
  tags: ['k3s', 'agent']

- name: Verify K3s server is reachable
  ansible.builtin.wait_for:
    host: "{{ k3s_server_address }}"
    port: 6443
    timeout: 60
    state: started
  tags: ['k3s', 'agent']

- name: Stop existing K3s agent service if running
  ansible.builtin.systemd:
    name: k3s-agent
    state: stopped
  failed_when: false
  tags: ['k3s', 'agent']

- name: Clean up agent node registration state
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/agent/kubelet.kubeconfig
    state: absent
  tags: ['k3s', 'agent']

- name: Configure K3s agent service
  ansible.builtin.template:
    src: k3s-agent.service.j2
    dest: "{{ systemd_dir }}/k3s-agent.service"
    owner: root
    group: root
    mode: "0644"
  register: k3s_agent_service_config
  tags: ['k3s', 'agent']

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  tags: ['k3s', 'agent']

- name: Enable and start K3s agent service
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
  tags: ['k3s', 'agent']

- name: Wait for agent service to stabilize
  ansible.builtin.wait_for:
    timeout: 15
  tags: ['k3s', 'agent']

- name: Check agent service is actually running
  ansible.builtin.systemd:
    name: k3s-agent
  register: agent_service_status
  tags: ['k3s', 'agent']

- name: Verify agent service is active
  ansible.builtin.assert:
    that:
      - agent_service_status.status.ActiveState == 'active'
      - agent_service_status.status.SubState == 'running'
    fail_msg: "K3s agent service failed to start. Check: journalctl -u k3s-agent -n 50"
    success_msg: "K3s agent service is running"
  tags: ['k3s', 'agent']

- name: Create kubectl symlink on agent
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  tags: ['k3s', 'agent']

- name: Create crictl symlink on agent
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/crictl
    state: link
  tags: ['k3s', 'agent']

- name: Verify kubectl is available
  ansible.builtin.command: kubectl version --client
  changed_when: false
  register: kubectl_verify_agent
  tags: ['k3s', 'agent']

- name: Wait for node to register with control plane
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get node {{ ansible_hostname }} -o jsonpath='{.metadata.name}'
  register: node_registered
  until: node_registered.stdout == ansible_hostname
  retries: 60
  delay: 5
  delegate_to: "{{ first_master }}"
  changed_when: false
  failed_when: false
  tags: ['k3s', 'agent']

- name: Get agent service logs if registration failed
  ansible.builtin.command:
    cmd: journalctl -u k3s-agent -n 50 --no-pager
  register: agent_logs
  when: node_registered.stdout != ansible_hostname
  changed_when: false
  tags: ['k3s', 'agent']

- name: Check if node registration failed
  ansible.builtin.fail:
    msg: |
      Agent node {{ ansible_hostname }} failed to register with control plane after 5 minutes.

      Agent service logs (last 50 lines):
      {{ agent_logs.stdout | default('Unable to fetch logs') }}

      Troubleshooting steps:
      1. Check agent service status: systemctl status k3s-agent
      2. Check full agent logs: journalctl -u k3s-agent -n 200
      3. Verify network connectivity to server {{ k3s_server_address }}:6443
      4. Verify token is correct (should start with 'K' and contain '::server:')
      5. Check server node token: cat /var/lib/rancher/k3s/server/node-token
      6. Try manual restart: systemctl restart k3s-agent

      Common issues:
      - Firewall blocking port 6443
      - Invalid or corrupted token
      - Network DNS resolution issues
      - Server API not fully ready
  when: node_registered.stdout != ansible_hostname
  tags: ['k3s', 'agent']

- name: Wait for node to become ready
  ansible.builtin.command:
    cmd: kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready_status
  until: node_ready_status.stdout == 'True'
  retries: 60
  delay: 5
  delegate_to: "{{ first_master }}"
  changed_when: false
  tags: ['k3s', 'agent']

- name: Detect NVIDIA GPU presence
  ansible.builtin.shell: |
    lspci | grep -i nvidia || echo "no-gpu"
  register: gpu_detection
  changed_when: false
  tags: ['k3s', 'agent', 'gpu']

- name: Apply GPU label to node if NVIDIA GPU detected
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      label nodes {{ ansible_hostname }}
      nvidia.com/gpu=present
      --overwrite
  delegate_to: "{{ first_master }}"
  when: "'NVIDIA' in gpu_detection.stdout"
  tags: ['k3s', 'agent', 'gpu']

- name: Apply GPU taint to node if NVIDIA GPU detected
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      taint nodes {{ ansible_hostname }}
      nvidia.com/gpu:NoSchedule
      --overwrite
  delegate_to: "{{ first_master }}"
  when: "'NVIDIA' in gpu_detection.stdout"
  tags: ['k3s', 'agent', 'gpu']

- name: Remove GPU label if no NVIDIA GPU detected
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      label nodes {{ ansible_hostname }}
      nvidia.com/gpu-
  delegate_to: "{{ first_master }}"
  when: "'NVIDIA' not in gpu_detection.stdout"
  failed_when: false
  tags: ['k3s', 'agent', 'gpu']

- name: Remove GPU taint if no NVIDIA GPU detected
  ansible.builtin.command:
    cmd: >
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      taint nodes {{ ansible_hostname }}
      nvidia.com/gpu:NoSchedule-
  delegate_to: "{{ first_master }}"
  when: "'NVIDIA' not in gpu_detection.stdout"
  failed_when: false
  tags: ['k3s', 'agent', 'gpu']

- name: Display node status
  ansible.builtin.debug:
    msg: "Agent node {{ ansible_hostname }} is ready and joined to cluster"
  tags: ['k3s', 'agent']
