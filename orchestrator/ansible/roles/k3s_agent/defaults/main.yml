---
# Agent execution arguments
k3s_agent_exec_args: ""

# System paths
systemd_dir: /etc/systemd/system

# Server connection (auto-detected from first_master)
k3s_server_address: ""
k3s_server_token: ""

# Retry and timeout configuration
retry_count: 30
retry_delay: 10
download_timeout: 300

# Feature toggles
k3s_create_kubectl_symlink: true
k3s_create_crictl_symlink: true

# Proxy environment (empty by default)
proxy_env: {}
