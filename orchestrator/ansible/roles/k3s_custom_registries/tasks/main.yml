---
- name: Create registries config directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"
  tags: ['k3s', 'registries']

- name: Write custom registries configuration
  ansible.builtin.copy:
    dest: /etc/rancher/k3s/registries.yaml
    content: "{{ custom_registries_yaml }}"
    mode: "0644"
  when:
    - custom_registries | default(false) | bool
    - custom_registries_yaml is defined
  notify: restart k3s
  tags: ['k3s', 'registries']

- name: Remove registries configuration when disabled
  ansible.builtin.file:
    path: /etc/rancher/k3s/registries.yaml
    state: absent
  when: not (custom_registries | default(false) | bool)
  notify: restart k3s
  tags: ['k3s', 'registries']
