# WireGuard and Network Performance Tuning for K3s GPU Clusters
# Deployed by Ansible - Do not edit manually
#
# Architecture: WireGuard (MTU 1420) -> Flannel VXLAN (MTU ~1370) -> Pods
# Use case: High-throughput GPU workloads with remote nodes

# =============================================================================
# IP FORWARDING AND ROUTING (Mandatory for K3s/Flannel)
# =============================================================================
# Required for pod-to-pod routing through WireGuard tunnels
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Reverse path filtering - loose mode (2) required for WireGuard asymmetric routing
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# =============================================================================
# BRIDGE NETFILTER (Mandatory for Flannel/kube-proxy)
# =============================================================================
# Required for kube-proxy iptables rules to work with CNI bridges
net.bridge.bridge-nf-call-iptables = 1
net.bridge.bridge-nf-call-ip6tables = 1

# =============================================================================
# SOCKET BUFFER SIZING
# =============================================================================
# Increase socket buffer sizes for high-throughput GPU workloads
# Supports 10Gbps @ 100ms latency (BDP = 125MB, buffers = 64MB reasonable)

# Maximum receive/send buffer sizes (64MB)
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864

# Default receive/send buffer sizes (16MB)
net.core.rmem_default = 16777216
net.core.wmem_default = 16777216

# TCP buffer auto-tuning (min, default, max in bytes)
net.ipv4.tcp_rmem = 4096 1048576 67108864
net.ipv4.tcp_wmem = 4096 1048576 67108864

# UDP buffer minimums for WireGuard
net.ipv4.udp_rmem_min = 16384
net.ipv4.udp_wmem_min = 16384

# =============================================================================
# NETWORK DEVICE TUNING
# =============================================================================
# Increase backlog queue for burst traffic
net.core.netdev_max_backlog = 50000

# NAPI polling budget - increased for 10Gbps line-rate processing
# 3000 packets x 1420 bytes = ~4.26MB per poll cycle
net.core.netdev_budget = 3000

# NAPI time budget (microseconds)
net.core.netdev_budget_usecs = 8000

# Increase listen queue for high connection rate
net.core.somaxconn = 65535

# =============================================================================
# BBR CONGESTION CONTROL
# =============================================================================
# Google's BBR provides better throughput on long-latency WireGuard tunnels
# Does not rely on packet loss as congestion signal (ideal for encrypted tunnels)

# Use Fair Queueing scheduler (required for BBR pacing)
net.core.default_qdisc = fq

# Enable BBR congestion control
net.ipv4.tcp_congestion_control = bbr

# Reduce latency for small writes
net.ipv4.tcp_notsent_lowat = 16384

# =============================================================================
# CONNECTION TRACKING
# =============================================================================
# GPU workloads generate many connections - size table appropriately
# 1M entries ~= 320MB RAM (256MB conntrack + 64MB hash table)

net.netfilter.nf_conntrack_max = 1048576
net.netfilter.nf_conntrack_buckets = 262144

# Timeouts tuned for Kubernetes workload patterns
# TCP established: 2 hours (prevents zombie entries from terminated pods)
net.netfilter.nf_conntrack_tcp_timeout_established = 7200

# TCP time_wait: 30 seconds (fast cleanup)
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# UDP timeouts: 120-180s (aligns with WireGuard keepalive, CoreDNS)
net.netfilter.nf_conntrack_udp_timeout = 120
net.netfilter.nf_conntrack_udp_timeout_stream = 180

# =============================================================================
# TCP OPTIMIZATIONS
# =============================================================================
# Enable TCP Fast Open for reduced latency
net.ipv4.tcp_fastopen = 3

# Increase max orphaned sockets
net.ipv4.tcp_max_orphans = 65536

# Increase max SYN backlog
net.ipv4.tcp_max_syn_backlog = 65536

# Enable window scaling (RFC 1323)
net.ipv4.tcp_window_scaling = 1

# Enable timestamps (RFC 1323)
net.ipv4.tcp_timestamps = 1

# Enable SACK (Selective Acknowledgment)
net.ipv4.tcp_sack = 1

# Disable slow start after idle (GPU jobs have bursty traffic patterns)
net.ipv4.tcp_slow_start_after_idle = 0

# =============================================================================
# PATH MTU DISCOVERY
# =============================================================================
# Critical for WireGuard (MTU 1420) -> Flannel VXLAN (MTU ~1370) nested encapsulation

net.ipv4.ip_no_pmtu_disc = 0
net.ipv4.tcp_mtu_probing = 1

# Base MSS 1280 (IPv6 minimum) - PMTUD discovers larger if available
# Accounts for: WireGuard (80B) + VXLAN (50B) + TCP/IP (40B) overhead
net.ipv4.tcp_base_mss = 1280

# =============================================================================
# ARP CACHE TUNING (for large clusters)
# =============================================================================
# Default ARP cache (1024) insufficient for 50+ node GPU clusters
net.ipv4.neigh.default.gc_thresh1 = 8192
net.ipv4.neigh.default.gc_thresh2 = 32768
net.ipv4.neigh.default.gc_thresh3 = 65536

# =============================================================================
# INOTIFY LIMITS (for kubelet/containerd)
# =============================================================================
# Kubelet and containerd watch many files - increase limits
fs.inotify.max_user_instances = 8192
fs.inotify.max_user_watches = 524288

# =============================================================================
# FILE DESCRIPTOR LIMITS
# =============================================================================
fs.file-max = 2097152

# =============================================================================
# ICMP RATE LIMITING (security + PMTUD compatibility)
# =============================================================================
net.ipv4.icmp_ratelimit = 1000
net.ipv4.icmp_msgs_per_sec = 1000
