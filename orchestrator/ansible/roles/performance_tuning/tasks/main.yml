---
# Performance tuning for WireGuard/K3s infrastructure

- name: Skip if performance tuning is disabled
  ansible.builtin.meta: end_play
  when: not performance_tuning_enabled | default(true)

# =============================================================================
# KERNEL MODULES
# =============================================================================

- name: Check if BBR module is available
  ansible.builtin.shell: |
    modprobe tcp_bbr 2>/dev/null && echo "available" || echo "unavailable"
  register: bbr_check
  changed_when: false
  tags: ['performance', 'bbr']

- name: Load BBR kernel module
  community.general.modprobe:
    name: tcp_bbr
    state: present
  when: bbr_check.stdout == "available"
  tags: ['performance', 'bbr']

- name: Ensure BBR module loads on boot
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/bbr.conf
    line: tcp_bbr
    create: yes
    mode: '0644'
  when: bbr_check.stdout == "available"
  tags: ['performance', 'bbr']

- name: Load nf_conntrack module
  community.general.modprobe:
    name: nf_conntrack
    state: present
  tags: ['performance', 'conntrack']

- name: Ensure nf_conntrack loads on boot
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/conntrack.conf
    line: nf_conntrack
    create: yes
    mode: '0644'
  tags: ['performance', 'conntrack']

- name: Load br_netfilter module (required for bridge-nf-call settings)
  community.general.modprobe:
    name: br_netfilter
    state: present
  tags: ['performance', 'bridge']

- name: Ensure br_netfilter loads on boot
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/br_netfilter.conf
    line: br_netfilter
    create: yes
    mode: '0644'
  tags: ['performance', 'bridge']

# =============================================================================
# SYSCTL CONFIGURATION
# =============================================================================

- name: Deploy performance sysctl configuration
  ansible.builtin.copy:
    src: 99-wireguard-performance.conf
    dest: /etc/sysctl.d/99-wireguard-performance.conf
    owner: root
    group: root
    mode: '0644'
  register: sysctl_config
  tags: ['performance', 'sysctl']

- name: Apply sysctl settings immediately
  ansible.builtin.command: sysctl --system
  when: sysctl_config.changed
  tags: ['performance', 'sysctl']

# =============================================================================
# VERIFICATION
# =============================================================================

- name: Verify BBR is active
  ansible.builtin.command: sysctl net.ipv4.tcp_congestion_control
  register: bbr_status
  changed_when: false
  tags: ['performance', 'verify']

- name: Display BBR status
  ansible.builtin.debug:
    msg: "Congestion control: {{ bbr_status.stdout }}"
  tags: ['performance', 'verify']

- name: Verify critical settings
  ansible.builtin.shell: |
    echo "rmem_max: $(sysctl -n net.core.rmem_max)"
    echo "wmem_max: $(sysctl -n net.core.wmem_max)"
    echo "netdev_budget: $(sysctl -n net.core.netdev_budget)"
    echo "conntrack_max: $(sysctl -n net.netfilter.nf_conntrack_max)"
    echo "tcp_established_timeout: $(sysctl -n net.netfilter.nf_conntrack_tcp_timeout_established)"
    echo "udp_timeout: $(sysctl -n net.netfilter.nf_conntrack_udp_timeout)"
    echo "ip_forward: $(sysctl -n net.ipv4.ip_forward)"
    echo "bridge_nf_call_iptables: $(sysctl -n net.bridge.bridge-nf-call-iptables 2>/dev/null || echo 'N/A')"
  register: settings_status
  changed_when: false
  tags: ['performance', 'verify']

- name: Display critical settings
  ansible.builtin.debug:
    msg: "{{ settings_status.stdout_lines }}"
  tags: ['performance', 'verify']
