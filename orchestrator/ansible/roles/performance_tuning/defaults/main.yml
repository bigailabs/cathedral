---
# Performance tuning defaults for K3s control plane servers

# Enable/disable performance tuning
performance_tuning_enabled: true

# Sysctl configuration file name
performance_tuning_sysctl_file: "99-wireguard-performance.conf"

# Verify BBR is loaded after applying
performance_tuning_verify_bbr: true

# =============================================================================
# CONFIGURABLE NETWORK PARAMETERS
# =============================================================================

# Socket buffer sizes (MB) for high-throughput workloads
# Default 64MB is sufficient for most clusters
# Increase to 128MB for large deployments with 100+ GPU nodes
performance_tuning_buffer_size_mb: 64

# Connection tracking table size
# Default 1M entries sufficient for 50-100 node clusters
# Increase to 2M for larger deployments
performance_tuning_conntrack_max: 1048576

# TCP congestion control algorithm
# bbr: Best for WAN links (WireGuard tunnels)
# cubic: Default Linux algorithm
performance_tuning_tcp_cc: "bbr"

# Netdev budget for high PPS workloads
# 3000 sufficient for 10Gbps, increase to 10000 for 40Gbps+
performance_tuning_netdev_budget: 3000
