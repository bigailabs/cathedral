---
# Add New K3s Agent Nodes Playbook
#
# This playbook safely adds new agent nodes to an existing K3s cluster without
# recreating or disrupting the control plane.
#
# USAGE:
#   1. Add new agent entries to inventories/production.ini:
#      agentN ansible_host=<ip> ansible_user=ubuntu ansible_ssh_private_key_file=<path> \
#             ansible_become=true agent_private_ip=<private_ip>
#
#   2. Run this playbook targeting the new agents:
#      ansible-playbook -i inventories/production.ini playbooks/add-agents.yml \
#        -e "target_agents=agent3,agent4,agent5"
#
#   3. (Optional) Apply labels if not auto-applied:
#      ansible-playbook -i inventories/production.ini playbooks/01-setup/k3s-cluster.yml \
#        --tags post,labels
#
#   4. Verify:
#      kubectl --kubeconfig=/root/.kube/k3s-basilica-config get nodes
#
# WHAT IT DOES:
#   - Fetches K3s server token from control plane (read-only)
#   - Runs prerequisite validation on new agents
#   - Installs and configures K3s agent
#   - Joins agents to existing cluster
#   - Waits for nodes to become Ready
#
# SAFETY:
#   - Zero impact on control plane
#   - Zero impact on existing agents
#   - Zero downtime for running workloads
#

- name: Fetch K3s server token
  hosts: k3s_server[0]
  gather_facts: true
  become: true
  tasks:
    - name: Read K3s server token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Set K3s server token fact
      ansible.builtin.set_fact:
        k3s_server_token: "{{ node_token.content | b64decode | trim }}"

- name: Join new K3s agent nodes
  hosts: "{{ target_agents | default('k3s_agents') }}"
  gather_facts: true
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/all/vault.yml
    - ../group_vars/all/r2.yml
    - ../group_vars/all/loadbalancer.yml
    - ../group_vars/all/cni.yml
    - ../group_vars/all/infrastructure.yml
    - ../group_vars/all/application.yml
  pre_tasks:
    - name: Determine first master node
      ansible.builtin.set_fact:
        first_master: "{{ groups['k3s_server'][0] }}"
      run_once: true

    - name: Set first master IP for agents
      ansible.builtin.set_fact:
        first_master_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] | default(hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address']) }}"

    - name: Set K3s server token
      ansible.builtin.set_fact:
        k3s_server_token: "{{ hostvars[groups['k3s_server'][0]]['k3s_server_token'] }}"
  vars:
    k3s_server_address: "{{ first_master_ip }}"
  roles:
    - role: prereq
    - role: download
    - role: k3s_agent
