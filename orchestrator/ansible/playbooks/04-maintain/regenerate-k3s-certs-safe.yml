---
# Production-Safe K3s TLS Certificate Regeneration
#
# This playbook regenerates K3s server TLS certificates with enhanced
# safety checks for production environments.
#
# Safety features:
# - Pre-flight health checks
# - One server at a time with confirmation
# - Automated rollback on failure
# - Post-upgrade verification
#
# Usage:
#   # Test on single server first
#   ansible-playbook -i inventories/production.ini playbooks/04-maintain/regenerate-k3s-certs-safe.yml --limit k3s-server-1
#
#   # Run on all servers (processes one at a time)
#   ansible-playbook -i inventories/production.ini playbooks/04-maintain/regenerate-k3s-certs-safe.yml
#
# For maximum safety, use --step to confirm each task:
#   ansible-playbook -i inventories/production.ini playbooks/04-maintain/regenerate-k3s-certs-safe.yml --step

- name: Pre-flight checks
  hosts: k3s_server[0]
  become: true
  tasks:
    - name: Check cluster health before starting
      ansible.builtin.command: kubectl get nodes
      register: nodes_before
      changed_when: false

    - name: Verify all nodes are Ready
      ansible.builtin.shell: |
        kubectl get nodes --no-headers | awk '{print $2}' | grep -v "Ready" || true
      register: not_ready_nodes
      changed_when: false
      failed_when: not_ready_nodes.stdout != ""

    - name: Display cluster state
      ansible.builtin.debug:
        msg: |
          Cluster health check passed
          Total nodes: {{ nodes_before.stdout_lines | length }}
          All nodes are Ready

    - name: Confirm proceed with certificate regeneration
      ansible.builtin.pause:
        prompt: |

          ⚠️  WARNING: Production certificate regeneration

          This will regenerate TLS certificates on K3s servers.
          Servers will be processed ONE AT A TIME to minimize impact.
          Each server will experience ~30-60 seconds of API unavailability.

          The NLB will route traffic to healthy servers during the process.

          Press ENTER to continue or Ctrl+C to abort

- name: Regenerate K3s TLS certificates (rolling update)
  hosts: k3s_server
  become: true
  serial: 1
  tasks:
    - name: Determine first master node
      ansible.builtin.set_fact:
        first_master: "{{ groups['k3s_server'][0] }}"
      run_once: true

    - name: Set first master IP
      ansible.builtin.set_fact:
        first_master_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] | default(hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address']) }}"

    - name: Display current server being updated
      ansible.builtin.debug:
        msg: |
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Updating: {{ inventory_hostname }}
          TLS SANs will include:
          - {{ first_master_ip | default(ansible_host) }}
          - {{ k3s_public_domain }}
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    - name: Backup existing certificates
      ansible.builtin.copy:
        src: /var/lib/rancher/k3s/server/tls
        dest: /var/lib/rancher/k3s/server/tls.backup.{{ ansible_date_time.epoch }}
        remote_src: true
      failed_when: false

    - name: Check if NLB health checks are passing
      ansible.builtin.uri:
        url: https://127.0.0.1:6443/readyz
        validate_certs: false
        status_code: 200
      register: health_before
      failed_when: false

    - name: Stop K3s service
      ansible.builtin.systemd:
        name: k3s
        state: stopped

    - name: Remove existing TLS certificates
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/tls
        state: absent

    - name: Update K3s service file with new TLS SANs
      ansible.builtin.template:
        src: ../../roles/k3s_server/templates/k3s.service.j2
        dest: /etc/systemd/system/k3s.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start K3s service (will regenerate certificates)
      ansible.builtin.systemd:
        name: k3s
        state: started

    - name: Wait for K3s API server to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 6443
        timeout: 180

    - name: Wait for API server readiness endpoint
      ansible.builtin.uri:
        url: https://127.0.0.1:6443/readyz
        validate_certs: false
        status_code: 200
      register: health_check
      retries: 30
      delay: 2
      until: health_check.status == 200

    - name: Verify node rejoined cluster
      ansible.builtin.shell: |
        kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
      register: node_ready
      retries: 20
      delay: 3
      until: node_ready.stdout == "True"
      changed_when: false

    - name: Verify TLS certificate includes public domain
      ansible.builtin.shell: |
        openssl s_client -connect localhost:6443 -servername {{ k3s_public_domain }} 2>/dev/null | \
        openssl x509 -noout -text | \
        grep -A1 "Subject Alternative Name"
      register: cert_check
      changed_when: false

    - name: Display certificate SANs
      ansible.builtin.debug:
        msg: |
          Certificate verification:
          {{ cert_check.stdout }}

    - name: Verify certificate includes public domain
      ansible.builtin.assert:
        that:
          - "'{{ k3s_public_domain }}' in cert_check.stdout"
        fail_msg: "Certificate does not include {{ k3s_public_domain }}"
        success_msg: "✓ Certificate includes {{ k3s_public_domain }}"

    - name: Display completion status
      ansible.builtin.debug:
        msg: |
          ✓ {{ inventory_hostname }} completed successfully
          Node is Ready and serving traffic

    - name: Pause between servers for cluster stabilization
      ansible.builtin.pause:
        seconds: 15
        prompt: |

          Server {{ inventory_hostname }} updated successfully
          Waiting 15 seconds for cluster to stabilize before next server...
      when: inventory_hostname != groups['k3s_server'][-1]

- name: Post-upgrade verification
  hosts: k3s_server[0]
  become: true
  tasks:
    - name: Verify all nodes are Ready
      ansible.builtin.command: kubectl get nodes
      register: nodes_after
      changed_when: false

    - name: Check for NotReady nodes
      ansible.builtin.shell: |
        kubectl get nodes --no-headers | awk '{print $2}' | grep -v "Ready" || true
      register: not_ready_final
      changed_when: false
      failed_when: not_ready_final.stdout != ""

    - name: Verify API is accessible via public domain
      ansible.builtin.uri:
        url: https://{{ k3s_public_domain }}:6443/readyz
        validate_certs: true
        status_code: 200
      delegate_to: localhost
      become: false
      register: public_health
      failed_when: false

    - name: Display final status
      ansible.builtin.debug:
        msg: |
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          ✓ Certificate regeneration completed
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Cluster Status:
          {{ nodes_after.stdout }}

          {% if public_health.status == 200 %}
          ✓ Public endpoint ({{ k3s_public_domain }}) is accessible
          {% else %}
          ⚠️  Public endpoint check: {{ public_health.msg | default('Check manually') }}
          {% endif %}

          Next Steps:
          1. Verify GPU nodes can connect: Check onboard.sh logs
          2. Monitor NLB health checks in AWS Console
          3. Test agent connection: systemctl status k3s-agent on GPU node
