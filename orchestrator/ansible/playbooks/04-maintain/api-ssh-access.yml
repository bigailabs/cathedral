---
# Setup SSH access for Basilica API service to K3s servers
# This playbook configures the basilica-api user on K3s server nodes
# to allow the ECS-hosted API to SSH in and create K3s tokens
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/04-maintain/api-ssh-access.yml
#
# Prerequisites:
#   1. Generate SSH keypair: ssh-keygen -t rsa -b 4096 -f ~/.ssh/basilica_k3s_id_rsa -N ""
#   2. Upload private key to AWS Secrets Manager (handled by Terraform)
#   3. Run this playbook to add the public key to K3s servers
#
# Sudo permissions granted (least privilege):
#   - /usr/local/bin/k3s token delete *
#   - /usr/local/bin/k3s kubectl *
#   - /bin/cat /var/lib/rancher/k3s/server/token
#   - WireGuard peer management commands

- name: Configure API SSH access on K3s servers
  hosts: k3s_server
  become: true
  roles:
    - role: api_ssh_access
