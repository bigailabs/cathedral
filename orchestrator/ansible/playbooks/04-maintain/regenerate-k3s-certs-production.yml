---
# Production-Grade K3s TLS Certificate Regeneration
#
# This playbook regenerates K3s server TLS certificates with comprehensive
# safety checks, automated rollback, and production-grade verification.
#
# Expert-reviewed and approved for production use.
#
# Usage:
#   # Progressive rollout (RECOMMENDED): Test on server3 first
#   ansible-playbook -i inventories/production.ini \
#     playbooks/04-maintain/regenerate-k3s-certs-production.yml \
#     --limit k3s-server-3
#
#   # After verification, proceed with remaining servers
#   ansible-playbook -i inventories/production.ini \
#     playbooks/04-maintain/regenerate-k3s-certs-production.yml \
#     --limit k3s-server-1,k3s-server-2
#
#   # Or run all servers (processes one at a time)
#   ansible-playbook -i inventories/production.ini \
#     playbooks/04-maintain/regenerate-k3s-certs-production.yml

- name: Pre-flight health checks and etcd backup
  hosts: k3s_server[0]
  become: true
  tasks:
    - name: Check cluster health before starting
      ansible.builtin.command: kubectl get nodes --no-headers
      register: nodes_before
      changed_when: false

    - name: Verify all nodes are Ready
      ansible.builtin.shell: |
        kubectl get nodes --no-headers | awk '{print $2}' | grep -v "Ready" || echo "ALL_READY"
      register: not_ready_nodes
      changed_when: false
      failed_when: not_ready_nodes.stdout != "ALL_READY"

    - name: Verify etcd cluster health
      ansible.builtin.shell: |
        k3s kubectl get --raw /healthz/etcd 2>&1
      register: etcd_health_check
      changed_when: false
      failed_when: "'ok' not in etcd_health_check.stdout"

    - name: Display pre-flight status
      ansible.builtin.debug:
        msg: |
          Pre-flight checks passed:
          - Total nodes: {{ nodes_before.stdout_lines | length }}
          - All nodes Ready: Yes
          - etcd cluster health: {{ etcd_health_check.stdout }}

    - name: Create etcd snapshot backup
      ansible.builtin.shell: |
        k3s etcd-snapshot save --name etcd-backup-before-cert-regen-{{ ansible_date_time.epoch }}
      register: snapshot_result
      changed_when: true

    - name: List etcd snapshots
      ansible.builtin.shell: |
        k3s etcd-snapshot list 2>&1 | tail -5
      register: snapshot_verify
      changed_when: false

    - name: Display snapshot information
      ansible.builtin.debug:
        msg: |
          etcd snapshot created successfully:
          {{ snapshot_result.stdout }}

          Recent snapshots:
          {{ snapshot_verify.stdout }}

          Rollback command (if needed):
          k3s etcd-snapshot restore --name etcd-backup-before-cert-regen-*

    - name: Confirm proceed with certificate regeneration
      ansible.builtin.pause:
        prompt: |

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Production TLS Certificate Regeneration
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Pre-flight checks: PASSED
          etcd backup: CREATED

          This will regenerate TLS certificates on K3s servers.
          - Servers processed: ONE AT A TIME
          - Expected per-server downtime: 30-60 seconds
          - Cluster-wide downtime: 0 seconds (NLB handles failover)
          - Automatic rollback: ENABLED

          New certificate SANs will include:
          - Server private IPs
          - {{ k3s_public_domain }}

          Press ENTER to continue or Ctrl+C to abort

- name: Regenerate K3s TLS certificates with automated rollback
  hosts: k3s_server
  become: true
  serial: 1
  vars:
    api_ready_retries: 60
    api_ready_delay: 2
    stabilization_pause: 30
  tasks:
    - name: Determine first master node
      ansible.builtin.set_fact:
        first_master: "{{ groups['k3s_server'][0] }}"
      run_once: true

    - name: Set first master IP
      ansible.builtin.set_fact:
        first_master_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] | default(hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address']) }}"

    - name: Display current server being updated
      ansible.builtin.debug:
        msg: |
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Updating: {{ inventory_hostname }}
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          TLS SANs will include:
          - {{ first_master_ip | default(ansible_host) }}
          - {{ k3s_public_domain }}

    - name: Certificate regeneration with automatic rollback
      block:
        - name: Check API server health before update
          ansible.builtin.uri:
            url: https://127.0.0.1:6443/readyz
            validate_certs: false
            status_code: 200
          register: health_before
          failed_when: false

        - name: Backup existing certificates
          ansible.builtin.copy:
            src: /var/lib/rancher/k3s/server/tls
            dest: /var/lib/rancher/k3s/server/tls.backup.{{ ansible_date_time.epoch }}
            remote_src: true
            mode: preserve

        - name: Backup K3s service file
          ansible.builtin.copy:
            src: /etc/systemd/system/k3s.service
            dest: /etc/systemd/system/k3s.service.backup.{{ ansible_date_time.epoch }}
            remote_src: true
            mode: preserve

        - name: Stop K3s service
          ansible.builtin.systemd:
            name: k3s
            state: stopped

        - name: Remove existing TLS certificates
          ansible.builtin.file:
            path: /var/lib/rancher/k3s/server/tls
            state: absent

        - name: Update K3s service file with new TLS SANs
          ansible.builtin.template:
            src: ../../roles/k3s_server/templates/k3s.service.j2
            dest: /etc/systemd/system/k3s.service
            owner: root
            group: root
            mode: "0644"

        - name: Reload systemd daemon
          ansible.builtin.systemd:
            daemon_reload: true

        - name: Start K3s service (certificates will regenerate)
          ansible.builtin.systemd:
            name: k3s
            state: started

        - name: Wait for K3s API server port to open
          ansible.builtin.wait_for:
            host: 127.0.0.1
            port: 6443
            timeout: 180

        - name: Wait for API server readiness endpoint
          ansible.builtin.uri:
            url: https://127.0.0.1:6443/readyz
            validate_certs: false
            status_code: 200
          register: health_check
          retries: "{{ api_ready_retries }}"
          delay: "{{ api_ready_delay }}"
          until: health_check.status == 200

        - name: Verify node rejoined cluster
          ansible.builtin.shell: |
            kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
          register: node_ready
          retries: 20
          delay: 3
          until: node_ready.stdout == "True"
          changed_when: false

        - name: Verify TLS certificate SANs
          ansible.builtin.shell: |
            openssl s_client -connect localhost:6443 -servername {{ k3s_public_domain }} 2>/dev/null | \
            openssl x509 -noout -text | \
            grep -A1 "Subject Alternative Name"
          register: cert_check
          changed_when: false

        - name: Verify certificate includes public domain
          ansible.builtin.assert:
            that:
              - "'{{ k3s_public_domain }}' in cert_check.stdout"
            fail_msg: "Certificate does not include {{ k3s_public_domain }}"
            success_msg: "Certificate includes {{ k3s_public_domain }}"

        - name: Verify etcd cluster health after update
          ansible.builtin.shell: |
            k3s kubectl get --raw /healthz/etcd 2>&1
          register: etcd_health_after
          changed_when: false
          failed_when: "'ok' not in etcd_health_after.stdout"

        - name: Display update success
          ansible.builtin.debug:
            msg: |
              ✓ {{ inventory_hostname }} updated successfully
              - Node status: Ready
              - Certificate SANs: Valid
              - etcd cluster: {{ etcd_health_after.stdout }}

      rescue:
        - name: Rollback - Display failure message
          ansible.builtin.debug:
            msg: |
              ✗ Certificate regeneration failed on {{ inventory_hostname }}
              Initiating automatic rollback...

        - name: Rollback - Stop K3s service
          ansible.builtin.systemd:
            name: k3s
            state: stopped

        - name: Rollback - Remove failed TLS directory
          ansible.builtin.file:
            path: /var/lib/rancher/k3s/server/tls
            state: absent

        - name: Rollback - Find latest certificate backup
          ansible.builtin.shell: |
            ls -t /var/lib/rancher/k3s/server/tls.backup.* | head -1
          register: latest_backup
          changed_when: false

        - name: Rollback - Restore certificate backup
          ansible.builtin.copy:
            src: "{{ latest_backup.stdout }}"
            dest: /var/lib/rancher/k3s/server/tls
            remote_src: true
            mode: preserve

        - name: Rollback - Find latest service file backup
          ansible.builtin.shell: |
            ls -t /etc/systemd/system/k3s.service.backup.* | head -1
          register: latest_service_backup
          changed_when: false

        - name: Rollback - Restore service file
          ansible.builtin.copy:
            src: "{{ latest_service_backup.stdout }}"
            dest: /etc/systemd/system/k3s.service
            remote_src: true
            mode: preserve

        - name: Rollback - Reload systemd daemon
          ansible.builtin.systemd:
            daemon_reload: true

        - name: Rollback - Start K3s service with old certificates
          ansible.builtin.systemd:
            name: k3s
            state: started

        - name: Rollback - Wait for API server recovery
          ansible.builtin.uri:
            url: https://127.0.0.1:6443/readyz
            validate_certs: false
            status_code: 200
          register: rollback_health
          retries: 30
          delay: 2
          until: rollback_health.status == 200

        - name: Rollback - Verify node is Ready
          ansible.builtin.shell: |
            kubectl get node {{ ansible_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
          register: rollback_node_ready
          retries: 15
          delay: 2
          until: rollback_node_ready.stdout == "True"
          changed_when: false

        - name: Rollback - Display rollback success
          ansible.builtin.debug:
            msg: |
              ✓ Rollback completed successfully on {{ inventory_hostname }}
              - Node status: Ready
              - Certificates: Restored from backup
              - Service: Running with previous configuration

        - name: Fail playbook execution after successful rollback
          ansible.builtin.fail:
            msg: |
              Certificate regeneration failed on {{ inventory_hostname }}.
              Automatic rollback completed successfully.
              Server is healthy and running with previous certificates.

              Investigation required before retrying.

    - name: Pause for cluster stabilization
      ansible.builtin.pause:
        seconds: "{{ stabilization_pause }}"
        prompt: |

          Server {{ inventory_hostname }} updated successfully
          Waiting {{ stabilization_pause }} seconds for NLB health checks and cluster stabilization...
      when: inventory_hostname != groups['k3s_server'][-1]

- name: Post-update comprehensive verification
  hosts: k3s_server[0]
  become: true
  tasks:
    - name: Verify all nodes are Ready
      ansible.builtin.command: kubectl get nodes --no-headers
      register: nodes_after
      changed_when: false

    - name: Check for NotReady nodes
      ansible.builtin.shell: |
        kubectl get nodes --no-headers | awk '{print $2}' | grep -v "Ready" || echo "ALL_READY"
      register: not_ready_final
      changed_when: false
      failed_when: not_ready_final.stdout != "ALL_READY"

    - name: Verify etcd cluster health
      ansible.builtin.shell: |
        k3s kubectl get --raw /healthz/etcd 2>&1
      register: etcd_final_health
      changed_when: false
      failed_when: "'ok' not in etcd_final_health.stdout"

    - name: Test external API connectivity
      ansible.builtin.uri:
        url: https://{{ k3s_public_domain }}:6443/readyz
        validate_certs: true
        status_code: 200
        timeout: 10
      delegate_to: localhost
      become: false
      register: external_health
      failed_when: false

    - name: Verify certificates on all servers
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no {{ item }} \
        "openssl s_client -connect localhost:6443 -servername {{ k3s_public_domain }} 2>/dev/null | \
         openssl x509 -noout -text | grep 'DNS:{{ k3s_public_domain }}'"
      loop: "{{ groups['k3s_server'] }}"
      register: cert_verification
      changed_when: false
      failed_when: cert_verification.rc != 0
      delegate_to: localhost
      become: false

    - name: Display final status
      ansible.builtin.debug:
        msg: |
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Certificate Regeneration Completed Successfully
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Cluster Status:
          {{ nodes_after.stdout }}

          etcd Cluster Health:
          {{ etcd_final_health.stdout }}

          External Endpoint Test:
          {% if external_health.status == 200 %}
          ✓ https://{{ k3s_public_domain }}:6443 is accessible
          {% else %}
          ⚠ External endpoint check: {{ external_health.msg | default('Manual verification needed') }}
          {% endif %}

          Certificate Verification:
          {% for result in cert_verification.results %}
          {% if result.rc == 0 %}
          ✓ {{ result.item }}: Certificate includes {{ k3s_public_domain }}
          {% else %}
          ✗ {{ result.item }}: Verification failed
          {% endif %}
          {% endfor %}

          Next Steps:
          1. Test GPU node onboarding: Run onboard.sh on a test node
          2. Verify existing agents reconnected: kubectl get nodes
          3. Monitor NLB health checks in AWS Console
          4. Check agent logs: journalctl -u k3s-agent on GPU nodes

          Operation completed at: {{ ansible_date_time.iso8601 }}

- name: Cleanup old backups (optional)
  hosts: k3s_server
  become: true
  tasks:
    - name: List certificate backups older than 7 days
      ansible.builtin.find:
        paths: /var/lib/rancher/k3s/server
        patterns: "tls.backup.*"
        age: 7d
        file_type: directory
      register: old_backups

    - name: Display cleanup information
      ansible.builtin.debug:
        msg: |
          Found {{ old_backups.matched }} old certificate backups (>7 days)

          To remove old backups, run:
          ansible k3s_server -i inventories/production.ini -m shell \
            -a "find /var/lib/rancher/k3s/server -name 'tls.backup.*' -type d -mtime +7 -exec rm -rf {} \;"
      run_once: true
      when: old_backups.matched > 0
