---
# Regenerate K3s TLS certificates with updated SANs
#
# This playbook regenerates K3s server TLS certificates to include
# the public domain name (connect.basilica.ai) in the certificate SANs.
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/04-maintain/regenerate-k3s-certs.yml
#
# WARNING: This will cause a brief interruption in API server availability
# as certificates are regenerated and services restart.

- name: Regenerate K3s TLS certificates
  hosts: k3s_server
  become: true
  serial: 1
  tasks:
    - name: Determine first master node
      ansible.builtin.set_fact:
        first_master: "{{ groups['k3s_server'][0] }}"
      run_once: true

    - name: Set first master IP
      ansible.builtin.set_fact:
        first_master_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] | default(hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address']) }}"

    - name: Display certificate regeneration info
      ansible.builtin.debug:
        msg: |
          Regenerating certificates with TLS SANs:
          - {{ first_master_ip | default(ansible_host) }}
          - {{ k3s_public_domain }}

    - name: Stop K3s service
      ansible.builtin.systemd:
        name: k3s
        state: stopped

    - name: Remove existing TLS certificates
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/tls
        state: absent

    - name: Update K3s service file with new TLS SANs
      ansible.builtin.template:
        src: ../../roles/k3s_server/templates/k3s.service.j2
        dest: /etc/systemd/system/k3s.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start K3s service (will regenerate certificates)
      ansible.builtin.systemd:
        name: k3s
        state: started

    - name: Wait for K3s API server to be ready
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 6443
        timeout: 180

    - name: Verify TLS certificate includes public domain
      ansible.builtin.shell: |
        openssl s_client -connect localhost:6443 -servername {{ k3s_public_domain }} 2>/dev/null | \
        openssl x509 -noout -text | \
        grep -A1 "Subject Alternative Name" | \
        grep {{ k3s_public_domain }}
      register: cert_check
      changed_when: false
      failed_when: false

    - name: Display certificate verification result
      ansible.builtin.debug:
        msg: |
          {% if cert_check.rc == 0 %}
          ✓ Certificate successfully includes {{ k3s_public_domain }}
          {% else %}
          ✗ Warning: Certificate may not include {{ k3s_public_domain }}
          {% endif %}

    - name: Wait for cluster to stabilize
      ansible.builtin.pause:
        seconds: 10
      when: inventory_hostname != groups['k3s_server'][-1]
