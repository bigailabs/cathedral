---
- name: Fetch K3s kubeconfig for local use
  hosts: k3s_server
  gather_facts: true
  become: false
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  vars:
    _detected_repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    repo_root_final: "{{ repo_root | default(_detected_repo_root, true) }}"
    kubeconfig_destination: "{{ kubeconfig_dest | default('home') }}"
    home_kubeconfig_dir: "{{ lookup('env', 'HOME') }}/.kube"
    home_kubeconfig_path: "{{ home_kubeconfig_dir }}/k3s-basilica-config"
    build_kubeconfig_path: "{{ repo_root_final }}/build/k3s.yaml"
    use_public_ip: "{{ kubeconfig_public_ip | default(true) | bool }}"
  tasks:
    - name: Get server public IP (if needed)
      ansible.builtin.shell: |
        set -euo pipefail
        curl -s ifconfig.me || curl -s icanhazip.com || echo "{{ ansible_host }}"
      args:
        executable: /bin/bash
      register: server_public_ip
      changed_when: false
      when: use_public_ip | bool

    - name: Compute kubeconfig server host
      ansible.builtin.set_fact:
        kubeconfig_server_host: >-
          {{
            (use_public_ip | bool)
            | ternary(
                server_public_ip.stdout | default(ansible_host) | trim,
                hostvars[groups['k3s_server'][0]]['ansible_host'] | default(hostvars[groups['k3s_server'][0]]['inventory_hostname'])
              )
          }}

    - name: Display detected server endpoint
      ansible.builtin.debug:
        msg: "K3s server endpoint: https://{{ kubeconfig_server_host }}:6443"

    - name: Create local home .kube directory
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ home_kubeconfig_dir }}"
        state: directory
        mode: '0700'
      when: kubeconfig_destination == 'home'

    - name: Create local build directory
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ repo_root_final }}/build"
        state: directory
        mode: '0755'
      when: kubeconfig_destination == 'build'

    - name: Set kubeconfig path based on destination
      ansible.builtin.set_fact:
        final_kubeconfig_path: >-
          {{
            (kubeconfig_destination == 'home')
            | ternary(home_kubeconfig_path, build_kubeconfig_path)
          }}

    - name: Fetch kubeconfig from K3s server
      become: true
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ final_kubeconfig_path }}"
        flat: yes

    - name: Update server address in kubeconfig
      delegate_to: localhost
      run_once: true
      ansible.builtin.replace:
        path: "{{ final_kubeconfig_path }}"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ kubeconfig_server_host }}:6443"

    - name: Replace any other localhost references
      delegate_to: localhost
      run_once: true
      ansible.builtin.replace:
        path: "{{ final_kubeconfig_path }}"
        regexp: 'https://[^:]+:6443'
        replace: "https://{{ kubeconfig_server_host }}:6443"

    - name: Set correct permissions on kubeconfig
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ final_kubeconfig_path }}"
        mode: "{{ '0600' if kubeconfig_destination == 'home' else '0644' }}"

    - name: Verify kubeconfig server address
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        grep "server:" {{ final_kubeconfig_path }}
      args:
        executable: /bin/bash
      register: kubeconfig_server
      changed_when: false

    - name: Display kubeconfig server address
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: "{{ kubeconfig_server.stdout }}"

    - name: Test kubectl connectivity
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        export KUBECONFIG={{ final_kubeconfig_path }}
        kubectl cluster-info --request-timeout=10s
      args:
        executable: /bin/bash
      register: kubectl_test
      changed_when: false
      failed_when: false

    - name: Display success message (home destination)
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          Kubeconfig saved to: {{ final_kubeconfig_path }}
          Server endpoint: https://{{ kubeconfig_server_host }}:6443

          Use: export KUBECONFIG={{ final_kubeconfig_path }}
          Test: kubectl get nodes
      when:
        - kubectl_test.rc == 0
        - kubeconfig_destination == 'home'

    - name: Display success message (build destination)
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          Kubeconfig saved to: {{ final_kubeconfig_path }}
          Server endpoint: https://{{ kubeconfig_server_host }}:6443

          Use: export KUBECONFIG={{ final_kubeconfig_path }}
          Test: kubectl get nodes
      when:
        - kubectl_test.rc == 0
        - kubeconfig_destination == 'build'

    - name: Display troubleshooting message if connection failed
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          WARNING: Kubeconfig saved but connection test failed
          Kubeconfig: {{ final_kubeconfig_path }}
          Server: https://{{ kubeconfig_server_host }}:6443

          Check: 1) Port 6443 open in security group, 2) Test: telnet {{ kubeconfig_server_host }} 6443, 3) Verify K3s is running
      when: kubectl_test.rc != 0
