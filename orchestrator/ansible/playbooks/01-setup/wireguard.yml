---
# WireGuard Setup Playbook for K3s Control Plane
#
# This playbook installs and configures WireGuard on all K3s server nodes
# to enable connectivity with remote GPU nodes that join over the internet.
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/01-setup/wireguard.yml
#
# Prerequisites:
#   - K3s servers must be accessible via SSH
#   - UDP port 51820 must be open in AWS security groups
#
# What this playbook does:
#   1. Installs WireGuard packages on all K3s servers
#   2. Generates unique keypairs on each server
#   3. Configures WireGuard interface (wg0) with static IPs
#   4. Enables and starts wg-quick@wg0 service
#   5. Saves server public keys for API configuration

- name: Setup WireGuard on K3s Control Plane
  hosts: k3s_server
  become: yes
  gather_facts: yes

  vars_files:
    - ../../group_vars/all/wireguard.yml

  pre_tasks:
    - name: Verify WireGuard is enabled
      ansible.builtin.debug:
        msg: "WireGuard enabled: {{ wireguard_enabled }}"

    - name: Display target servers
      ansible.builtin.debug:
        msg: "Configuring WireGuard on: {{ inventory_hostname }} ({{ ansible_host }})"

  roles:
    - role: performance_tuning
      tags: ['wireguard', 'performance']
    - role: wireguard
      tags: ['wireguard']

  post_tasks:
    - name: Collect WireGuard public keys from all servers
      ansible.builtin.slurp:
        src: /etc/wireguard/publickey
      register: collected_pubkeys

    - name: Display all server public keys
      ansible.builtin.debug:
        msg: |
          Server: {{ inventory_hostname }}
          Public IP: {{ ansible_host }}
          WireGuard IP: {{ wireguard_server_ips[inventory_hostname] }}
          Public Key: {{ collected_pubkeys.content | b64decode | trim }}
          Endpoint: {{ ansible_host }}:{{ wireguard_port }}
      run_once: false

    - name: Create summary file on first server
      ansible.builtin.copy:
        content: |
          # WireGuard Server Configuration Summary
          # Generated: {{ ansible_date_time.iso8601 }}
          #
          # Use this information to configure the Basilica API
          #
          {% for host in groups['k3s_server'] %}
          # {{ host }}
          #   Public IP: {{ hostvars[host]['ansible_host'] }}
          #   WireGuard IP: {{ wireguard_server_ips[host] }}
          #   Endpoint: {{ hostvars[host]['ansible_host'] }}:{{ wireguard_port }}
          {% endfor %}

          # Primary endpoint for API configuration:
          WIREGUARD_PRIMARY_ENDPOINT={{ hostvars[groups['k3s_server'][0]]['ansible_host'] }}:{{ wireguard_port }}
        dest: /etc/wireguard/cluster-summary
        owner: root
        group: root
        mode: '0644'
      when: inventory_hostname == groups['k3s_server'][0]

    - name: Verify WireGuard is running
      ansible.builtin.command: wg show {{ wireguard_interface }}
      register: final_wg_status
      changed_when: false

    - name: Final status
      ansible.builtin.debug:
        msg: "WireGuard {{ wireguard_interface }} is running on {{ inventory_hostname }}"
      when: final_wg_status.rc == 0
