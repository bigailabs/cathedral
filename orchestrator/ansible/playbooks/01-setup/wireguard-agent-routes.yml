---
# WireGuard Agent Routes Playbook
#
# This playbook configures K3s agent nodes to route WireGuard traffic
# (10.200.0.0/16) back through their respective K3s server. This is
# required for bi-directional connectivity with remote GPU nodes.
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/01-setup/wireguard-agent-routes.yml
#
# What this playbook does:
#   1. Determines which VPC subnet each agent belongs to
#   2. Adds a route to 10.200.0.0/16 via the K3s server in that subnet
#   3. Creates netplan configuration for persistence across reboots
#
# Prerequisites:
#   - WireGuard must be configured on K3s servers (run wireguard.yml first)
#   - K3s cluster must be operational
#
# Network Layout:
#   - 10.101.0.0/24: server1 (10.101.0.27), agent1 (10.101.0.244), agent4 (10.101.0.76)
#   - 10.101.1.0/24: server2 (10.101.1.101), agent2 (10.101.1.136), agent5 (10.101.1.88)
#   - 10.101.2.0/24: server3 (10.101.2.35), agent3 (10.101.2.97)

- name: Configure WireGuard Routes on K3s Agents
  hosts: k3s_agents
  become: yes
  gather_facts: yes

  vars_files:
    - ../../group_vars/all/wireguard.yml

  pre_tasks:
    - name: Verify WireGuard is enabled
      ansible.builtin.debug:
        msg: "WireGuard enabled: {{ wireguard_enabled }}"

    - name: Display target agents
      ansible.builtin.debug:
        msg: "Configuring WireGuard routes on: {{ inventory_hostname }} ({{ ansible_host }})"

  roles:
    - role: wireguard_agent_routes
      tags: ['wireguard', 'routes']

  post_tasks:
    - name: Verify route to WireGuard network
      ansible.builtin.command: ip route get 10.200.0.1
      register: route_test
      changed_when: false

    - name: Display route test result
      ansible.builtin.debug:
        msg: "Route to 10.200.0.0/16: {{ route_test.stdout }}"
