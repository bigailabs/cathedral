---
- name: Prepare K3s nodes (prerequisites and download)
  hosts: k3s_cluster
  gather_facts: true
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml

  roles:
    - role: prereq
    - role: download
    - role: k3s_custom_registries
      when: custom_registries | default(false) | bool
  tags: ['prepare']

- name: Setup K3s server nodes
  hosts: k3s_server
  gather_facts: true
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  roles:
    - role: k3s_server
  tags: ['server']

- name: Setup K3s agent nodes
  hosts: k3s_agents
  gather_facts: false
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  pre_tasks:
    - name: Determine first master node
      ansible.builtin.set_fact:
        first_master: "{{ groups['k3s_server'][0] }}"
      run_once: true

    - name: Set first master IP for agents
      ansible.builtin.set_fact:
        first_master_ip: "{{ hostvars[groups['k3s_server'][0]]['server_private_ip'] | default(hostvars[groups['k3s_server'][0]]['ansible_default_ipv4']['address']) }}"
  vars:
    k3s_server_address: "{{ first_master_ip }}"
    k3s_server_token: "{{ hostvars[first_master]['k3s_server_token'] }}"
  roles:
    - role: k3s_agent
  tags: ['agent']

- name: Configure K3s cluster (post-configuration)
  hosts: k3s_server[0]
  gather_facts: true
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  roles:
    - role: k3s_server_post
  tags: ['post']

- name: Fetch kubeconfig to control machine
  hosts: k3s_server[0]
  gather_facts: true
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  tasks:
    - name: Fetch kubeconfig from first server
      ansible.builtin.fetch:
        src: "{{ ansible_user_dir }}/.kube/config"
        dest: "~/.kube/k3s-basilica-config"
        mode: '0644'
        flat: true
    - name: Display kubeconfig location
      ansible.builtin.debug:
        msg: "Kubeconfig fetched to ~/.kube/k3s-basilica-config"
  tags: ['kubeconfig']
