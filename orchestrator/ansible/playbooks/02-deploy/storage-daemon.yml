---
# Deploy Basilica Storage DaemonSet
#
# This playbook deploys the FUSE storage daemon as a DaemonSet to manage
# namespace-scoped storage mounts for user workloads.
#
# Prerequisites:
# - K3s cluster with kubectl access
# - FUSE kernel module available on nodes
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/02-deploy/storage-daemon.yml
#
- hosts: k3s_server
  gather_facts: false
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
  vars:
    _detected_repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    repo_root_final: "{{ repo_root | default(_detected_repo_root, true) }}"
    storage_manifest_dir: /opt/basilica/k8s/services/storage
  tasks:
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false
      failed_when: kubectl_check.rc != 0

    - name: Ensure base directory exists
      ansible.builtin.file:
        path: "{{ storage_manifest_dir }}"
        state: directory
        mode: '0755'

    - name: Copy storage daemon manifests
      ansible.builtin.copy:
        src: "{{ repo_root_final }}/orchestrator/k8s/services/storage/"
        dest: "{{ storage_manifest_dir }}/"
        mode: '0644'
      register: manifests_copied

    # Step 1: Create namespace with PSS labels
    - name: Apply basilica-storage namespace
      kubernetes.core.k8s:
        state: present
        src: "{{ storage_manifest_dir }}/namespace.yaml"
      tags: ["namespace"]

    # Step 2: Apply RBAC (ServiceAccount, ClusterRole, ClusterRoleBinding)
    - name: Apply FUSE daemon RBAC
      kubernetes.core.k8s:
        state: present
        src: "{{ storage_manifest_dir }}/rbac.yaml"
      tags: ["rbac"]

    # Step 3: Deploy PodDisruptionBudget
    - name: Apply PodDisruptionBudget
      kubernetes.core.k8s:
        state: present
        src: "{{ storage_manifest_dir }}/pdb.yaml"
      tags: ["pdb"]

    # Step 4: Deploy PrometheusRule alerts
    - name: Apply PrometheusRule alerts
      kubernetes.core.k8s:
        state: present
        src: "{{ storage_manifest_dir }}/alerts.yaml"
      tags: ["alerts", "monitoring"]
      ignore_errors: true

    # Step 5: Deploy the DaemonSet
    - name: Apply FUSE daemon DaemonSet
      kubernetes.core.k8s:
        state: present
        src: "{{ storage_manifest_dir }}/daemonset.yaml"
      tags: ["daemonset"]

    # Step 6: Create headless service for DNS discovery
    - name: Apply FUSE daemon service and ServiceMonitor
      kubernetes.core.k8s:
        state: present
        src: "{{ storage_manifest_dir }}/service.yaml"
      tags: ["service"]

    # Step 7: Wait for DaemonSet to be ready
    - name: Wait for FUSE daemon to be ready on all nodes
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n basilica-storage rollout status daemonset/fuse-daemon --timeout=300s
      args:
        executable: /bin/bash
      changed_when: false
      tags: ["verify"]

    # Step 8: Verify daemon pods are running
    - name: Get FUSE daemon pod status
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n basilica-storage get pods -l app.kubernetes.io/component=fuse-daemon -o wide
      args:
        executable: /bin/bash
      register: daemon_pods
      changed_when: false
      tags: ["verify"]

    - name: Display daemon pod status
      ansible.builtin.debug:
        var: daemon_pods.stdout_lines
      tags: ["verify"]

    # Step 9: Verify daemon health endpoints
    - name: Check daemon health on each node
      ansible.builtin.shell: |
        set -euo pipefail
        failed=0
        for pod in $(kubectl -n basilica-storage get pods -l app.kubernetes.io/component=fuse-daemon -o name); do
          echo "Checking $pod..."
          if ! kubectl -n basilica-storage exec $pod -c fuse-daemon -- curl -sf http://localhost:9090/health; then
            echo "FAILED: $pod"
            failed=1
          fi
        done
        exit $failed
      args:
        executable: /bin/bash
      register: health_check
      changed_when: false
      tags: ["verify"]

    - name: Display health check results
      ansible.builtin.debug:
        var: health_check.stdout_lines
      tags: ["verify"]

    # Step 10: Verify PDB is in place
    - name: Verify PodDisruptionBudget
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n basilica-storage get pdb fuse-daemon-pdb -o wide
      args:
        executable: /bin/bash
      register: pdb_status
      changed_when: false
      tags: ["verify"]

    - name: Display PDB status
      ansible.builtin.debug:
        var: pdb_status.stdout_lines
      tags: ["verify"]

    - name: Deployment complete
      ansible.builtin.debug:
        msg: |
          Storage daemon deployment complete!

          The FUSE DaemonSet is now running on all nodes with:
          - Minimal capabilities (SYS_ADMIN only, not privileged)
          - Ephemeral storage limits (50Gi)
          - PodDisruptionBudget (maxUnavailable: 1)
          - Graceful shutdown hook
          - Prometheus alerts

          Mounts will be created automatically when user namespaces (u-*) are detected.

          To view mount status:
            kubectl -n basilica-storage exec -it <pod> -c fuse-daemon -- curl http://localhost:9090/mounts

          To manually create a mount:
            kubectl -n basilica-storage exec -it <pod> -c fuse-daemon -- curl -X POST http://localhost:9090/mounts/<namespace>

          To check alerts:
            kubectl -n basilica-storage get prometheusrule fuse-daemon-alerts -o yaml
