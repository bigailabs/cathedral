- hosts: k3s_server
  gather_facts: false
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  vars:
    # Autodetect repo root on control host if not provided
    # playbook_dir = <repo>/scripts/ansible/playbooks
    # Use dirname three times to reach <repo>
    _detected_repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    repo_root_final: "{{ repo_root | default(_detected_repo_root, true) }}"
  tasks:
    - name: Ensure base directory on server
      ansible.builtin.file:
        path: /opt/basilica
        state: directory
        mode: '0755'

    # Validate kubectl is available (installed during K3s setup phase)
    - name: Verify kubectl is available on K3s server
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false
      failed_when: kubectl_check.rc != 0

    - name: Display kubectl version
      ansible.builtin.debug:
        msg: "kubectl available: {{ kubectl_check.stdout }}"

    # ------------------------------------------------------------------------
    # Optional: Bootstrap cluster networking (Ingress + cert-manager) early
    # ------------------------------------------------------------------------
    - name: Bootstrap public WSS prerequisites (ingress-nginx + cert-manager)
      when: subtensor_public_wss is defined and subtensor_public_wss.enabled | default(false) | bool
      block:
        - name: Install ingress-nginx (cloud provider manifest)
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
          args:
            executable: /bin/bash
          changed_when: true
          tags: ["networking"]

        - name: Wait for ingress-nginx controller
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=300s
          args:
            executable: /bin/bash
          changed_when: false
          tags: ["networking"]

        - name: Install cert-manager CRDs and controller
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.3/cert-manager.yaml
          args:
            executable: /bin/bash
          changed_when: true
          tags: ["networking"]

        - name: Wait for cert-manager
          ansible.builtin.shell: |
            set -euo pipefail
            kubectl -n cert-manager rollout status deploy/cert-manager --timeout=300s
            kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=300s
            kubectl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=300s
          args:
            executable: /bin/bash
          changed_when: false
          tags: ["networking"]

        - name: Create ClusterIssuer for Let's Encrypt
          ansible.builtin.template:
            src: ../../templates/clusterissuer.yaml.j2
            dest: /opt/basilica/clusterissuer.yaml
            mode: '0644'
          vars:
            issuer_name: "{{ 'letsencrypt-staging' if subtensor_public_wss.use_staging | bool else 'letsencrypt' }}"
            acme_email: "{{ subtensor_public_wss.acme_email }}"
            acme_server: "{{ 'https://acme-staging-v02.api.letsencrypt.org/directory' if subtensor_public_wss.use_staging | bool else 'https://acme-v02.api.letsencrypt.org/directory' }}"
          tags: ["networking"]

        - name: Apply ClusterIssuer
          ansible.builtin.command: kubectl apply -f /opt/basilica/clusterissuer.yaml
          changed_when: true
          tags: ["networking"]

    # CRDs are pre-generated and version-controlled in k8s/crds/basilica-crds.yaml
    # To regenerate: cargo run -p basilica-operator --bin crdgen > k8s/crds/basilica-crds.yaml
    - name: Copy pre-generated CRDs to server
      ansible.builtin.copy:
        src: "{{ repo_root_final }}/k8s/crds/basilica-crds.yaml"
        dest: /opt/basilica/basilica-crds.yaml
        mode: '0644'

    - name: Copy k8s manifests to server
      ansible.builtin.copy:
        src: "{{ repo_root_final }}/k8s"
        dest: /opt/basilica/
        mode: '0644'

    - name: Copy RBAC validation script to server
      ansible.builtin.copy:
        src: "{{ repo_root_final }}/orchestrator/ansible/scripts/validate-rbac-prerequisites.sh"
        dest: /opt/basilica/validate-rbac-prerequisites.sh
        mode: '0755'

    - name: Validate RBAC prerequisites for bootstrap token support
      ansible.builtin.command: /opt/basilica/validate-rbac-prerequisites.sh
      register: rbac_validation
      changed_when: false
      failed_when: rbac_validation.rc != 0

    - name: Display RBAC validation results
      ansible.builtin.debug:
        var: rbac_validation.stdout_lines

    - name: Apply namespaces and RBAC
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -f /opt/basilica/k8s/core/namespaces.yaml
        kubectl apply -f /opt/basilica/k8s/core/rbac/operator-rbac.yaml
        sed "s/TENANT_NAMESPACE/{{ tenant_namespace | default('basilica-system') }}/g" /opt/basilica/k8s/core/rbac/operator-tenant-role.yaml | kubectl apply -f -
      args:
        executable: /bin/bash
      changed_when: true
      run_once: true

    - name: Apply bootstrap token RBAC (requires validated prerequisites)
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/core/rbac/bootstrap-token-rbac.yaml
      changed_when: true
      run_once: true

    - name: Deploy FUSE kernel module loader DaemonSet
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/core/fuse-module-loader.yaml
      changed_when: true
      run_once: true
      tags: ["fuse", "core"]

    - name: Wait for FUSE module loader to be ready
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl rollout status daemonset/fuse-module-loader -n kube-system --timeout=120s
      args:
        executable: /bin/bash
      changed_when: false
      run_once: true
      tags: ["fuse", "core"]

    - name: Apply CRDs
      ansible.builtin.command: kubectl apply -f /opt/basilica/basilica-crds.yaml
      changed_when: true
      run_once: true

    # Deploy R2 credentials if variables are defined
    # Role validates required variables (basilica_r2_access_key_id, basilica_r2_secret_access_key, basilica_r2_bucket)
    - name: Deploy R2 credentials for persistent storage
      import_role:
        name: basilica-storage
      when:
        - basilica_r2_access_key_id is defined
        - basilica_r2_bucket is defined
      tags: ["basilica_storage"]

    - name: Taint control plane nodes to prevent workload scheduling
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl taint nodes \
          -l node-role.kubernetes.io/control-plane \
          node-role.kubernetes.io/control-plane=:NoSchedule \
          --overwrite || true
      args:
        executable: /bin/bash
      changed_when: false
      tags: ["control_plane"]

    - name: Sanitize image variables (strip accidental TAG= prefixes)
      ansible.builtin.set_fact:
        operator_image_effective: "{{ (operator_image | default('')) | regex_replace('TAG=','') }}"
      tags: ["deploy_operator"]

    - name: Use templated operator manifest
      ansible.builtin.template:
        src: ../../templates/operator-deployment.yaml.j2
        dest: /opt/basilica/k8s/services/operator/operator-deployment.yaml
        mode: '0644'
      when: use_templates | bool
      tags: ["deploy_operator"]

    - name: Update operator image in deployment manifest (fallback when not templating)
      ansible.builtin.replace:
        path: /opt/basilica/k8s/services/operator/operator-deployment.yaml
        regexp: '^(\\s*)image:\s.*$'
        replace: '\\1image: {{ operator_image }}'
      when: not use_templates | bool

    - name: Deploy Operator
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -f /opt/basilica/k8s/services/operator/operator-deployment.yaml
      args:
        executable: /bin/bash
      changed_when: true
      run_once: true
      tags: ["deploy_operator"]

    - name: Deploy Operator PodDisruptionBudget
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/services/operator/operator-pdb.yaml
      changed_when: true
      run_once: true
      tags: ["deploy_operator"]

    - name: Wait for operator rollout
      ansible.builtin.command: kubectl -n basilica-system rollout status deploy/basilica-operator --timeout=720s
      changed_when: false
      run_once: true
      tags: ["deploy_operator"]

    - name: Deploy Alloy telemetry ConfigMap
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/observability/alloy/alloy-configmap.yaml
      changed_when: true
      run_once: true
      tags: ["telemetry"]

    - name: Deploy Alloy telemetry DaemonSet
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/observability/alloy/alloy-daemonset.yaml
      changed_when: true
      run_once: true
      tags: ["telemetry"]

    - name: Deploy disk cleanup CronJob
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/observability/disk-cleanup-cronjob.yaml
      changed_when: true
      run_once: true
      tags: ["disk_cleanup"]

    - name: Apply disk cleanup role to K3s nodes
      include_role:
        name: disk_cleanup
      tags: ["disk_cleanup"]

    - name: Install long-lived Envoy HTTP port-forward service
      ansible.builtin.template:
        src: ../../templates/basilica-envoy-portforward.service.j2
        dest: /etc/systemd/system/basilica-envoy-portforward.service
        mode: '0644'
      when: envoy_forward.enabled | bool

    - name: Reload systemd for Envoy service
      ansible.builtin.systemd:
        daemon_reload: true
      when: envoy_forward.enabled | bool

    - name: Enable and start Envoy port-forward service
      ansible.builtin.systemd:
        name: basilica-envoy-portforward.service
        enabled: true
        state: started
      when: envoy_forward.enabled | bool

    - name: Install long-lived Envoy Admin port-forward service
      ansible.builtin.template:
        src: ../../templates/basilica-envoy-admin-portforward.service.j2
        dest: /etc/systemd/system/basilica-envoy-admin-portforward.service
        mode: '0644'
      when: envoy_admin_forward.enabled | bool

    - name: Reload systemd for Envoy Admin service
      ansible.builtin.systemd:
        daemon_reload: true
      when: envoy_admin_forward.enabled | bool

    - name: Enable and start Envoy Admin port-forward service
      ansible.builtin.systemd:
        name: basilica-envoy-admin-portforward.service
        enabled: true
        state: started
      when: envoy_admin_forward.enabled | bool

    - name: Optional — install Envoy forward proxy
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -f /opt/basilica/k8s/networking/envoy/envoy-configmap.yaml || true
        kubectl apply -f /opt/basilica/k8s/networking/envoy/envoy-deployment.yaml || true
        kubectl apply -f /opt/basilica/k8s/networking/envoy/envoy-service.yaml || true
        kubectl apply -f /opt/basilica/k8s/networking/envoy/envoy-pdb.yaml || true
      args:
        executable: /bin/bash
      changed_when: true
      when: install_envoy_forward_proxy | bool

    # Gateway API deployment is handled via 06-adhoc/gateway.yml playbook
    # Run separately: ansible-playbook -i inventories/production.ini playbooks/06-adhoc/gateway.yml
    # This includes: Envoy Gateway Helm install, GatewayClass, Gateway, EnvoyProxy config,
    # BackendTrafficPolicy, ReferenceGrant, PDBs, and HPA

