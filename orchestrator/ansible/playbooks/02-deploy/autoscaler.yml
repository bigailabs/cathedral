- hosts: k3s_server
  gather_facts: false
  become: true
  vars_files:
    - ../../group_vars/all.yml
  vars:
    _detected_repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    repo_root_final: "{{ repo_root | default(_detected_repo_root, true) }}"
    autoscaler_image: "{{ autoscaler_image | default('ghcr.io/one-covenant/basilica-autoscaler:latest') }}"
    autoscaler_namespace: "basilica-autoscaler"
  tasks:
    - name: Ensure base directory on server
      ansible.builtin.file:
        path: /opt/basilica
        state: directory
        mode: '0755'

    - name: Copy autoscaler manifests to server
      ansible.builtin.copy:
        src: "{{ repo_root_final }}/k8s/services/autoscaler/"
        dest: /opt/basilica/k8s/services/autoscaler/
        mode: '0644'

    - name: Apply autoscaler CRDs
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -f /opt/basilica/k8s/services/autoscaler/crds.yaml
      args:
        executable: /bin/bash
      changed_when: true
      run_once: true
      tags: ["autoscaler_crds"]

    - name: Wait for CRDs to be established
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl wait --for=condition=Established crd/nodepools.autoscaler.basilica.ai --timeout=60s
        kubectl wait --for=condition=Established crd/scalingpolicies.autoscaler.basilica.ai --timeout=60s
      args:
        executable: /bin/bash
      changed_when: false
      run_once: true
      tags: ["autoscaler_crds"]

    - name: Apply autoscaler RBAC
      ansible.builtin.command: kubectl apply -f /opt/basilica/k8s/services/autoscaler/rbac.yaml
      changed_when: true
      run_once: true
      tags: ["autoscaler_rbac"]

    - name: Update autoscaler image in deployment manifest
      ansible.builtin.replace:
        path: /opt/basilica/k8s/services/autoscaler/deployment.yaml
        regexp: 'image:\s*ghcr\.io/one-covenant/basilica-autoscaler:.*$'
        replace: 'image: {{ autoscaler_image }}'
      tags: ["autoscaler_deploy"]

    - name: Deploy autoscaler (creates namespace automatically)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl apply -f /opt/basilica/k8s/services/autoscaler/deployment.yaml
      args:
        executable: /bin/bash
      changed_when: true
      run_once: true
      tags: ["autoscaler_deploy"]

    - name: Wait for autoscaler rollout
      ansible.builtin.command: kubectl -n {{ autoscaler_namespace }} rollout status deploy/basilica-autoscaler --timeout=300s
      changed_when: false
      run_once: true
      tags: ["autoscaler_deploy"]

    - name: Verify autoscaler is running
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n {{ autoscaler_namespace }} get pods -l app=basilica-autoscaler -o jsonpath='{.items[*].status.phase}'
      args:
        executable: /bin/bash
      register: autoscaler_status
      changed_when: false
      run_once: true
      tags: ["autoscaler_verify"]

    - name: Display autoscaler status
      ansible.builtin.debug:
        msg: "Autoscaler pods status: {{ autoscaler_status.stdout }}"
      tags: ["autoscaler_verify"]
