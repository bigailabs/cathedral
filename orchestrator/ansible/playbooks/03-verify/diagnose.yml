---
- name: K3s Cluster Diagnostics
  hosts: k3s_cluster
  gather_facts: true
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  tasks:
    - name: Gather system information
      ansible.builtin.set_fact:
        diag_timestamp: "{{ ansible_date_time.iso8601 }}"
        diag_hostname: "{{ ansible_hostname }}"
        diag_os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
        diag_kernel: "{{ ansible_kernel }}"
        diag_arch: "{{ ansible_architecture }}"

    - name: Display node information
      ansible.builtin.debug:
        msg:
          - "=== Node: {{ diag_hostname }} ==="
          - "OS: {{ diag_os }}"
          - "Kernel: {{ diag_kernel }}"
          - "Architecture: {{ diag_arch }}"
          - "Timestamp: {{ diag_timestamp }}"

    - name: Check K3s binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary_stat

    - name: Get K3s version
      ansible.builtin.command:
        cmd: /usr/local/bin/k3s --version
      register: k3s_version_output
      when: k3s_binary_stat.stat.exists
      changed_when: false
      failed_when: false

    - name: Display K3s version
      ansible.builtin.debug:
        msg: "{{ k3s_version_output.stdout_lines[0] if k3s_version_output.stdout_lines else 'K3s not installed' }}"
      when: k3s_binary_stat.stat.exists

    - name: Check K3s server service status
      ansible.builtin.systemd:
        name: k3s
      register: k3s_server_status
      when: inventory_hostname in groups['k3s_server']
      failed_when: false

    - name: Display K3s server service status
      ansible.builtin.debug:
        msg:
          - "Service: k3s"
          - "State: {{ k3s_server_status.status.ActiveState }}"
          - "SubState: {{ k3s_server_status.status.SubState }}"
          - "Since: {{ k3s_server_status.status.ActiveEnterTimestamp | default('N/A') }}"
      when:
        - inventory_hostname in groups['k3s_server']
        - k3s_server_status.status is defined

    - name: Check K3s agent service status
      ansible.builtin.systemd:
        name: k3s-agent
      register: k3s_agent_status
      when: inventory_hostname in groups['k3s_agents']
      failed_when: false

    - name: Display K3s agent service status
      ansible.builtin.debug:
        msg:
          - "Service: k3s-agent"
          - "State: {{ k3s_agent_status.status.ActiveState }}"
          - "SubState: {{ k3s_agent_status.status.SubState }}"
          - "Since: {{ k3s_agent_status.status.ActiveEnterTimestamp | default('N/A') }}"
      when:
        - inventory_hostname in groups['k3s_agents']
        - k3s_agent_status.status is defined

    - name: Get recent K3s server logs
      ansible.builtin.command:
        cmd: journalctl -u k3s -n 50 --no-pager
      register: k3s_server_logs
      when: inventory_hostname in groups['k3s_server']
      changed_when: false
      failed_when: false

    - name: Get recent K3s agent logs
      ansible.builtin.command:
        cmd: journalctl -u k3s-agent -n 50 --no-pager
      register: k3s_agent_logs
      when: inventory_hostname in groups['k3s_agents']
      changed_when: false
      failed_when: false

    - name: Check for error messages in logs
      ansible.builtin.shell:
        cmd: journalctl -u {{ item }} --since "1 hour ago" | grep -i "error\|fatal\|failed" | tail -20
      loop:
        - k3s
        - k3s-agent
      register: error_logs
      when: item == 'k3s' and inventory_hostname in groups['k3s_server'] or item == 'k3s-agent' and inventory_hostname in groups['k3s_agents']
      changed_when: false
      failed_when: false

    - name: Display recent errors
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      when:
        - item.stdout_lines is defined
        - item.stdout_lines | length > 0
      loop: "{{ error_logs.results }}"
      loop_control:
        label: "{{ item.item | default('N/A') }}"

    - name: Check disk space
      ansible.builtin.command:
        cmd: df -h /var/lib/rancher/k3s
      register: disk_space
      changed_when: false
      failed_when: false

    - name: Display disk space
      ansible.builtin.debug:
        msg: "{{ disk_space.stdout_lines }}"
      when: disk_space.stdout_lines is defined

    - name: Check memory usage
      ansible.builtin.command:
        cmd: free -h
      register: memory_usage
      changed_when: false

    - name: Display memory usage
      ansible.builtin.debug:
        msg: "{{ memory_usage.stdout_lines }}"

    - name: Check CPU load
      ansible.builtin.command:
        cmd: uptime
      register: cpu_load
      changed_when: false

    - name: Display CPU load
      ansible.builtin.debug:
        msg: "{{ cpu_load.stdout }}"

    - name: Check network connectivity to K3s API
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['k3s_server'][0]]['ansible_host'] | default(groups['k3s_server'][0]) }}"
        port: 6443
        timeout: 5
        state: started
      register: api_connectivity
      failed_when: false
      when: groups['k3s_server'] | length > 0

    - name: Display API connectivity
      ansible.builtin.debug:
        msg: "K3s API (port 6443) is {{ 'reachable' if api_connectivity is succeeded else 'unreachable' }}"
      when: api_connectivity is defined

    - name: Check critical kernel parameters
      ansible.builtin.command:
        cmd: sysctl {{ item }}
      loop:
        - net.ipv4.ip_forward
        - net.bridge.bridge-nf-call-iptables
        - net.bridge.bridge-nf-call-ip6tables
      register: sysctl_output
      changed_when: false
      failed_when: false

    - name: Display kernel parameters
      ansible.builtin.debug:
        msg: "{{ item.stdout }}"
      loop: "{{ sysctl_output.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Check iptables rules
      ansible.builtin.command:
        cmd: iptables -L -n -v
      register: iptables_rules
      changed_when: false
      failed_when: false

    - name: Count iptables rules
      ansible.builtin.debug:
        msg: "Total iptables rules: {{ iptables_rules.stdout_lines | length }}"
      when: iptables_rules.stdout_lines is defined

    - name: Check containerd processes
      ansible.builtin.command:
        cmd: pgrep -a containerd
      register: containerd_processes
      changed_when: false
      failed_when: false

    - name: Display containerd status
      ansible.builtin.debug:
        msg: "containerd processes: {{ containerd_processes.stdout_lines | length }}"
      when: containerd_processes.stdout_lines is defined

- name: Kubernetes Cluster Diagnostics
  hosts: k3s_server[0]
  gather_facts: false
  become: true
  tasks:
    - name: Get cluster nodes
      ansible.builtin.command:
        cmd: kubectl get nodes -o wide
      register: nodes_output
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display cluster nodes
      ansible.builtin.debug:
        msg: "{{ nodes_output.stdout_lines }}"
      when: nodes_output.stdout_lines is defined

    - name: Get node conditions
      ansible.builtin.command:
        cmd: kubectl get nodes -o json
      register: nodes_json
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Parse node conditions
      ansible.builtin.set_fact:
        nodes_data: "{{ nodes_json.stdout | from_json }}"
      when: nodes_json.rc == 0

    - name: Display node conditions
      ansible.builtin.debug:
        msg:
          - "Node: {{ item.metadata.name }}"
          - "Ready: {{ item.status.conditions | selectattr('type', 'equalto', 'Ready') | map(attribute='status') | first }}"
          - "Memory Pressure: {{ item.status.conditions | selectattr('type', 'equalto', 'MemoryPressure') | map(attribute='status') | first }}"
          - "Disk Pressure: {{ item.status.conditions | selectattr('type', 'equalto', 'DiskPressure') | map(attribute='status') | first }}"
          - "PID Pressure: {{ item.status.conditions | selectattr('type', 'equalto', 'PIDPressure') | map(attribute='status') | first }}"
      loop: "{{ nodes_data.items }}"
      loop_control:
        label: "{{ item.metadata.name }}"
      when: nodes_data is defined

    - name: Get all pods status
      ansible.builtin.command:
        cmd: kubectl get pods -A -o wide
      register: pods_output
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display all pods
      ansible.builtin.debug:
        msg: "{{ pods_output.stdout_lines }}"
      when: pods_output.stdout_lines is defined

    - name: Get problematic pods
      ansible.builtin.shell:
        cmd: kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded
      register: problem_pods
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display problematic pods
      ansible.builtin.debug:
        msg: "{{ problem_pods.stdout_lines }}"
      when:
        - problem_pods.stdout_lines is defined
        - problem_pods.stdout_lines | length > 1

    - name: Get etcd snapshot list
      ansible.builtin.command:
        cmd: ls -lh /var/lib/rancher/k3s/server/db/snapshots/
      register: snapshots_list
      changed_when: false
      failed_when: false

    - name: Display etcd snapshots
      ansible.builtin.debug:
        msg: "{{ snapshots_list.stdout_lines }}"
      when: snapshots_list.stdout_lines is defined

    - name: Check K3s API server health
      ansible.builtin.uri:
        url: https://127.0.0.1:6443/healthz
        validate_certs: false
        client_cert: /var/lib/rancher/k3s/server/tls/client-admin.crt
        client_key: /var/lib/rancher/k3s/server/tls/client-admin.key
      register: api_health
      failed_when: false

    - name: Display API health
      ansible.builtin.debug:
        msg: "K3s API health: {{ api_health.status }} - {{ api_health.content }}"
      when: api_health.status is defined

    - name: Get Basilica namespace resources
      ansible.builtin.command:
        cmd: kubectl get all -n {{ item }}
      loop:
        - basilica-system
        - basilica-validators
        - "{{ tenant_namespace | default('basilica-system') }}"
      register: namespace_resources
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display namespace resources
      ansible.builtin.debug:
        msg:
          - "=== Namespace: {{ item.item }} ==="
          - "{{ item.stdout_lines | default(['No resources found']) }}"
      loop: "{{ namespace_resources.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Get recent events
      ansible.builtin.command:
        cmd: kubectl get events -A --sort-by='.lastTimestamp' | tail -50
      register: recent_events
      changed_when: false
      failed_when: false
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display recent events
      ansible.builtin.debug:
        msg: "{{ recent_events.stdout_lines }}"
      when: recent_events.stdout_lines is defined

- name: Diagnostic Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display diagnostic summary
      ansible.builtin.debug:
        msg:
          - "================================================"
          - "K3s Cluster Diagnostics Complete"
          - "================================================"
          - ""
          - "For detailed logs, run:"
          - "  ansible -i inventories/production.ini k3s_server -m shell -a 'journalctl -u k3s -n 200'"
          - "  ansible -i inventories/production.ini k3s_agents -m shell -a 'journalctl -u k3s-agent -n 200'"
          - ""
          - "To check specific node:"
          - "  ansible -i inventories/production.ini NODE_NAME -m shell -a 'systemctl status k3s'"
          - ""
          - "To view kubernetes resources:"
          - "  kubectl get all -A"
          - "  kubectl describe node NODE_NAME"
          - ""
          - "For upgrade procedures, see:"
          - "  UPGRADING.md"
