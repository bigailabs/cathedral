---
- name: Verify K3s workload isolation between control plane and compute nodes
  hosts: k3s_server[0]
  gather_facts: true
  become: false
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml

  tasks:
    - name: Get control plane node names
      ansible.builtin.command:
        cmd: kubectl get nodes -l node-role.kubernetes.io/control-plane=true -o jsonpath='{.items[*].metadata.name}'
      register: control_plane_nodes
      changed_when: false
      tags: ['verify', 'isolation']

    - name: Get agent node names
      ansible.builtin.command:
        cmd: kubectl get nodes -l '!node-role.kubernetes.io/control-plane' -o jsonpath='{.items[*].metadata.name}'
      register: agent_nodes
      changed_when: false
      tags: ['verify', 'isolation']

    - name: Display node topology
      ansible.builtin.debug:
        msg:
          - "Control Plane Nodes: {{ control_plane_nodes.stdout.split() | join(', ') }}"
          - "Agent Nodes: {{ agent_nodes.stdout.split() | join(', ') }}"
      tags: ['verify', 'isolation']

    - name: Verify control plane nodes have required taints
      ansible.builtin.command:
        cmd: kubectl get node {{ item }} -o jsonpath='{.spec.taints[*].key}'
      loop: "{{ control_plane_nodes.stdout.split() }}"
      register: control_plane_taints
      changed_when: false
      failed_when: >
        'node-role.kubernetes.io/control-plane' not in control_plane_taints.stdout
      tags: ['verify', 'isolation']

    - name: Verify control plane nodes have custom basilica taint
      ansible.builtin.command:
        cmd: kubectl get node {{ item }} -o jsonpath='{.spec.taints[?(@.key=="basilica.ai/control-plane-only")].key}'
      loop: "{{ control_plane_nodes.stdout.split() }}"
      register: basilica_taints
      changed_when: false
      tags: ['verify', 'isolation']

    - name: Display control plane taint status
      ansible.builtin.debug:
        msg: "Node {{ item.item }} - Taints: {{ item.stdout }}"
      loop: "{{ control_plane_taints.results }}"
      tags: ['verify', 'isolation']

    - name: Verify agent nodes have workloads-only label
      ansible.builtin.command:
        cmd: kubectl get node {{ item }} -o jsonpath='{.metadata.labels.basilica\.ai/workloads-only}'
      loop: "{{ agent_nodes.stdout.split() }}"
      register: agent_labels
      changed_when: false
      failed_when: agent_labels.stdout != 'true'
      tags: ['verify', 'isolation']

    - name: Display agent label status
      ansible.builtin.debug:
        msg: "Node {{ item.item }} - basilica.ai/workloads-only={{ item.stdout }}"
      loop: "{{ agent_labels.results }}"
      tags: ['verify', 'isolation']

    - name: Get all user namespace pods
      ansible.builtin.command:
        cmd: kubectl get pods -A -o json --field-selector=metadata.namespace!=kube-system,metadata.namespace!=kube-public,metadata.namespace!=kube-node-lease,metadata.namespace!=basilica-system,metadata.namespace!=basilica-validators
      register: all_pods_json
      changed_when: false
      tags: ['verify', 'isolation']

    - name: Parse user namespace pods
      ansible.builtin.set_fact:
        user_pods: "{{ (all_pods_json.stdout | from_json).items | selectattr('metadata.namespace', 'match', '^u-') | list }}"
      tags: ['verify', 'isolation']

    - name: Count pods on control plane nodes
      ansible.builtin.set_fact:
        control_plane_pod_count: "{{ user_pods | selectattr('spec.nodeName', 'in', control_plane_nodes.stdout.split()) | list | length }}"
      tags: ['verify', 'isolation']

    - name: Count pods on agent nodes
      ansible.builtin.set_fact:
        agent_pod_count: "{{ user_pods | selectattr('spec.nodeName', 'in', agent_nodes.stdout.split()) | list | length }}"
      tags: ['verify', 'isolation']

    - name: Display pod distribution summary
      ansible.builtin.debug:
        msg:
          - "Total user namespace pods (u-*): {{ user_pods | length }}"
          - "Pods on control plane nodes: {{ control_plane_pod_count }}"
          - "Pods on agent nodes: {{ agent_pod_count }}"
      tags: ['verify', 'isolation']

    - name: Get pods running on control plane nodes
      ansible.builtin.set_fact:
        violating_pods: "{{ user_pods | selectattr('spec.nodeName', 'in', control_plane_nodes.stdout.split()) | map(attribute='metadata') | map(attribute='name') | list }}"
      tags: ['verify', 'isolation']

    - name: Display violating pods
      ansible.builtin.debug:
        msg: "Pods violating isolation policy: {{ violating_pods | join(', ') }}"
      when: violating_pods | length > 0
      tags: ['verify', 'isolation']

    - name: Assert no user pods on control plane
      ansible.builtin.assert:
        that:
          - control_plane_pod_count | int == 0
        fail_msg: |
          WORKLOAD ISOLATION VIOLATION DETECTED!
          {{ control_plane_pod_count }} user namespace pod(s) are running on control plane nodes.
          Violating pods: {{ violating_pods | join(', ') }}

          This violates production best practices and poses stability risks.

          Remediation steps:
          1. Ensure operator has node selector: basilica.ai/workloads-only=true
          2. Restart affected deployments: kubectl rollout restart deployment -n <namespace> <deployment>
          3. Verify pods migrate to agent nodes
        success_msg: |
          WORKLOAD ISOLATION VERIFIED!
          All {{ user_pods | length }} user namespace pod(s) are correctly scheduled on agent nodes.
          Control plane nodes are isolated from user workloads.
      tags: ['verify', 'isolation']

    - name: Get detailed pod distribution
      ansible.builtin.command:
        cmd: kubectl get pods -n {{ item }} -o wide
      loop: "{{ user_pods | map(attribute='metadata.namespace') | unique | list }}"
      register: pod_details
      changed_when: false
      when: user_pods | length > 0
      tags: ['verify', 'isolation', 'details']

    - name: Display detailed pod distribution
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ pod_details.results }}"
      when: not item.skipped | default(false)
      tags: ['verify', 'isolation', 'details']

    - name: Verify UserDeployment CRDs have node selector
      ansible.builtin.command:
        cmd: kubectl get userdeployments -A -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.metadata.namespace}{"\t"}{.spec.instance_name}{"\n"}{end}'
      register: user_deployments
      changed_when: false
      failed_when: false
      tags: ['verify', 'isolation', 'crd']

    - name: Display UserDeployment resources
      ansible.builtin.debug:
        msg: "{{ user_deployments.stdout_lines }}"
      when: user_deployments.stdout | length > 0
      tags: ['verify', 'isolation', 'crd']

    - name: Create isolation verification report
      ansible.builtin.copy:
        content: |
          # K3s Workload Isolation Verification Report
          Generated: {{ ansible_date_time.iso8601 }}

          ## Cluster Topology
          - Control Plane Nodes: {{ control_plane_nodes.stdout.split() | join(', ') }}
          - Agent Nodes: {{ agent_nodes.stdout.split() | join(', ') }}

          ## Workload Distribution
          - Total user namespace pods (u-*): {{ user_pods | length }}
          - Pods on control plane nodes: {{ control_plane_pod_count }}
          - Pods on agent nodes: {{ agent_pod_count }}

          ## Isolation Status
          {% if control_plane_pod_count | int == 0 %}
          ✅ PASS: All user workloads correctly isolated to agent nodes
          {% else %}
          ❌ FAIL: {{ control_plane_pod_count }} pod(s) running on control plane nodes
          Violating pods: {{ violating_pods | join(', ') }}
          {% endif %}

          ## Control Plane Taints
          {% for result in control_plane_taints.results %}
          - {{ result.item }}: {{ result.stdout }}
          {% endfor %}

          ## Agent Node Labels
          {% for result in agent_labels.results %}
          - {{ result.item }}: basilica.ai/workloads-only={{ result.stdout }}
          {% endfor %}
        dest: /tmp/workload-isolation-report.md
        mode: '0644'
      tags: ['verify', 'isolation', 'report']

    - name: Display report location
      ansible.builtin.debug:
        msg: "Isolation verification report saved to: /tmp/workload-isolation-report.md"
      tags: ['verify', 'isolation', 'report']
