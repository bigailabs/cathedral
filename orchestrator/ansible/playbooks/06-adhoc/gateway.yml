---
- name: Deploy Envoy Gateway and Gateway API Resources
  hosts: k3s_server
  gather_facts: true
  become: false
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Install Envoy Gateway via Helm
      ansible.builtin.include_role:
        name: envoy-gateway

    - name: Copy Gateway API manifests to server
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/opt/basilica/k8s/networking/gateway-api/{{ item | basename }}"
        mode: '0644'
      loop:
        - "{{ playbook_dir }}/../../k8s/networking/gateway-api/gatewayclass.yaml"
        - "{{ playbook_dir }}/../../k8s/networking/gateway-api/gateway.yaml"
        - "{{ playbook_dir }}/../../k8s/networking/gateway-api/envoyproxy-config.yaml"
        - "{{ playbook_dir }}/../../k8s/networking/gateway-api/backend-traffic-policy.yaml"
        - "{{ playbook_dir }}/../../k8s/networking/gateway-api/envoy-pdb.yaml"
        - "{{ playbook_dir }}/../../k8s/networking/gateway-api/controller-pdb.yaml"

    - name: Apply GatewayClass
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/gatewayclass.yaml"

    - name: Apply EnvoyProxy Configuration
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/envoyproxy-config.yaml"

    - name: Apply Gateway
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/gateway.yaml"

    - name: Wait for Gateway to be ready before applying policies
      kubernetes.core.k8s_info:
        api_version: gateway.networking.k8s.io/v1
        kind: Gateway
        name: basilica-gateway
        namespace: basilica-system
        wait: true
        wait_condition:
          type: Programmed
          status: "True"
        wait_timeout: 300

    - name: Apply BackendTrafficPolicy (after Gateway is ready)
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/backend-traffic-policy.yaml"

    - name: Apply Controller PodDisruptionBudget
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/controller-pdb.yaml"

    - name: Apply Envoy PodDisruptionBudget (after Gateway creates Envoy pods)
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/envoy-pdb.yaml"

    - name: Get Envoy deployment name
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        namespace: envoy-gateway-system
        label_selectors:
          - gateway.envoyproxy.io/owning-gateway-name=basilica-gateway
      register: envoy_deployment_info

    - name: Template HPA with dynamic deployment name
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../ansible/roles/envoy-gateway/templates/gateway-hpa.yaml.j2"
        dest: "/opt/basilica/k8s/networking/gateway-api/gateway-hpa.yaml"
        mode: '0644'
      vars:
        envoy_deployment_name: "{{ envoy_deployment_info.resources[0].metadata.name }}"

    - name: Apply HorizontalPodAutoscaler (after Envoy deployment exists)
      kubernetes.core.k8s:
        state: present
        src: "/opt/basilica/k8s/networking/gateway-api/gateway-hpa.yaml"

    - name: Get Gateway status
      kubernetes.core.k8s_info:
        api_version: gateway.networking.k8s.io/v1
        kind: Gateway
        name: basilica-gateway
        namespace: basilica-system
      register: gateway_info

    - name: Display Gateway status
      ansible.builtin.debug:
        msg: "Gateway basilica-gateway is ready. Status: {{ gateway_info.resources[0].status }}"
