---
- name: Diagnose K8s API Connectivity
  hosts: server1
  gather_facts: false
  tasks:
    - name: Check if operator can resolve kubernetes service
      shell: kubectl exec -n basilica-system -l app=basilica-operator -- nslookup kubernetes.default.svc.cluster.local
      register: dns_check
      changed_when: false
      failed_when: false

    - name: Display DNS check
      debug:
        msg: "{{ dns_check.stdout_lines }}"

    - name: Check if operator can reach API server
      shell: kubectl exec -n basilica-system -l app=basilica-operator -- curl -k https://kubernetes.default.svc.cluster.local:443/version --max-time 5
      register: api_check
      changed_when: false
      failed_when: false

    - name: Display API check
      debug:
        msg: "{{ api_check }}"

    - name: Check network policies
      shell: kubectl get networkpolicies -A
      register: netpol_check
      changed_when: false
      failed_when: false

    - name: Display network policies
      debug:
        msg: "{{ netpol_check.stdout_lines }}"

    - name: Check kube-system DNS pods
      shell: kubectl get pods -n kube-system -l k8s-app=kube-dns -o wide
      register: dns_pods
      changed_when: false

    - name: Display DNS pods
      debug:
        msg: "{{ dns_pods.stdout_lines }}"

    - name: Check API server endpoints
      shell: kubectl get endpoints kubernetes -n default -o yaml
      register: api_endpoints
      changed_when: false

    - name: Display API endpoints
      debug:
        msg: "{{ api_endpoints.stdout_lines }}"
