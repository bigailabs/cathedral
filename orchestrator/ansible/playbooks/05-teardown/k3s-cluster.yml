---
- name: Reset K3s cluster completely
  hosts: k3s_cluster
  gather_facts: false
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  roles:
    - role: reset
  tags: ['reset']

- name: Confirm cluster reset
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display reset confirmation
      ansible.builtin.debug:
        msg: "K3s cluster has been completely reset. You may now run k3s-setup.yml to reinstall."
