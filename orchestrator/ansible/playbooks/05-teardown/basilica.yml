- hosts: k3s_server
  gather_facts: false
  become: true
  vars_files:
    - ../../group_vars/all.yml
    - ../../group_vars/all/vault.yml
    - ../../group_vars/all/r2.yml
    - ../../group_vars/all/loadbalancer.yml
    - ../../group_vars/all/cni.yml
    - ../../group_vars/all/infrastructure.yml
    - ../../group_vars/all/application.yml
  vars:
    tenant_ns: "{{ tenant_namespace | default('basilica-system') }}"
  tasks:
    - name: Delete Operator manifests
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/k8s/services/operator/operator-deployment.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Envoy forward proxy (if applied)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/k8s/networking/envoy/envoy-service.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/k8s/networking/envoy/envoy-deployment.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/k8s/networking/envoy/envoy-configmap.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Gateway API manifests (if applied)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/k8s/networking/gateway-api/examples/gatewayclass.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete tenant Role/RoleBinding
      ansible.builtin.shell: |
        set -euo pipefail
        sed "s/TENANT_NAMESPACE/{{ tenant_ns }}/g" /opt/basilica/k8s/core/rbac/operator-tenant-role.yaml | kubectl delete -f - --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete cluster RBAC (roles/bindings/serviceaccounts)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/k8s/core/rbac/operator-rbac.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Basilica CR instances (if any)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete gpurentals.basilica.ai --all -A --ignore-not-found || true
        kubectl delete basilicajobs.basilica.ai --all -A --ignore-not-found || true
        kubectl delete basilicanodeprofiles.basilica.ai --all -A --ignore-not-found || true
        kubectl delete basilicaqueues.basilica.ai --all -A --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete CRDs
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/basilica-crds.yaml --ignore-not-found || true
        kubectl delete crd gpurentals.basilica.ai basilicajobs.basilica.ai basilicanodeprofiles.basilica.ai basilicaqueues.basilica.ai --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete namespaces
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete namespace basilica-system --ignore-not-found || true
        kubectl delete namespace basilica-validators --ignore-not-found || true
        kubectl delete namespace "{{ tenant_ns }}" --ignore-not-found || true
      args:
        executable: /bin/bash

