# Enhancement to e2e-apply.yml: Secure K3s Token Fetching
#
# Add these tasks to e2e-apply.yml after the kubeconfig fetch section (around line 860)
# to securely fetch and store the K3s node token for validator node onboarding.

- hosts: k3s_server
  gather_facts: false
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    _detected_repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    repo_root_final: "{{ repo_root | default(_detected_repo_root, true) }}"
  tasks:
    # ----------------------------------------------------------------------------
    # Fetch K3s node token securely for validator node onboarding
    # ----------------------------------------------------------------------------
    - name: Read K3s node token from server
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_node_token_raw
      tags: ["k3s_token"]

    - name: Decode K3s node token
      delegate_to: localhost
      run_once: true
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_node_token_raw.content | b64decode | trim }}"
      tags: ["k3s_token"]

    - name: Write K3s token to local build directory (encrypted)
      delegate_to: localhost
      run_once: true
      ansible.builtin.copy:
        dest: "{{ repo_root_final }}/build/k3s-node-token.txt"
        content: "{{ k3s_node_token }}"
        mode: '0600'  # Readable only by owner
      tags: ["k3s_token"]

    - name: Add build/ to .gitignore (if not already present)
      delegate_to: localhost
      run_once: true
      ansible.builtin.lineinfile:
        path: "{{ repo_root_final }}/.gitignore"
        line: "build/"
        create: yes
        mode: '0644'
      tags: ["k3s_token"]

    - name: Show token location (info only)
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          K3s node token saved to: {{ repo_root_final }}/build/k3s-node-token.txt

          To enable validator node onboarding, set:
            export BASILICA_ENABLE_K3S_JOIN=true
            export BASILICA_K3S_URL=https://{{ kubeconfig_server_effective | default(ansible_host) }}:6443
            export BASILICA_K3S_TOKEN=$(cat {{ repo_root_final }}/build/k3s-node-token.txt)

          Or create a Kubernetes secret:
            kubectl create secret generic k3s-join-token \
              --from-file=token={{ repo_root_final }}/build/k3s-node-token.txt \
              -n basilica-validators
      tags: ["k3s_token"]
