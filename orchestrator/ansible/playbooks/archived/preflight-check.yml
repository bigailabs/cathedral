---
- name: Pre-flight validation checks
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: Check OS distribution
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
        fail_msg: "Only Ubuntu is supported. Found: {{ ansible_facts.distribution }}"
        success_msg: "OS check passed: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"

    - name: Check minimum OS version (Ubuntu 20.04+)
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution_version is version('20.04', '>=')
        fail_msg: "Ubuntu 20.04 or higher required. Found: {{ ansible_facts.distribution_version }}"
        success_msg: "OS version check passed: {{ ansible_facts.distribution_version }}"

    - name: Check CPU cores
      ansible.builtin.assert:
        that:
          - ansible_facts.processor_vcpus >= 2
        fail_msg: "Minimum 2 CPU cores required. Found: {{ ansible_facts.processor_vcpus }}"
        success_msg: "CPU check passed: {{ ansible_facts.processor_vcpus }} cores"

    - name: Check memory
      ansible.builtin.assert:
        that:
          - ansible_facts.memtotal_mb >= 2048
        fail_msg: "Minimum 2GB RAM required. Found: {{ ansible_facts.memtotal_mb }}MB"
        success_msg: "Memory check passed: {{ ansible_facts.memtotal_mb }}MB"

    - name: Check disk space on root
      ansible.builtin.assert:
        that:
          - item.size_available >= 20 * 1024 * 1024 * 1024
        fail_msg: "Minimum 20GB free space required on {{ item.mount }}. Found: {{ (item.size_available / 1024 / 1024 / 1024) | round(2) }}GB"
        success_msg: "Disk space check passed on {{ item.mount }}: {{ (item.size_available / 1024 / 1024 / 1024) | round(2) }}GB available"
      when: item.mount == '/'
      loop: "{{ ansible_facts.mounts }}"

    - name: Check Python version
      ansible.builtin.assert:
        that:
          - ansible_facts.python_version is version('3.8', '>=')
        fail_msg: "Python 3.8+ required. Found: {{ ansible_facts.python_version }}"
        success_msg: "Python version check passed: {{ ansible_facts.python_version }}"

    - name: Check systemd is running
      ansible.builtin.command:
        cmd: systemctl is-system-running
      register: systemd_status
      changed_when: false
      failed_when: false

    - name: Verify systemd status
      ansible.builtin.assert:
        that:
          - systemd_status.stdout in ['running', 'degraded']
        fail_msg: "Systemd not in expected state: {{ systemd_status.stdout }}"
        success_msg: "Systemd check passed: {{ systemd_status.stdout }}"

    - name: Check SSH connectivity
      ansible.builtin.ping:

    - name: Check sudo privileges
      ansible.builtin.command:
        cmd: whoami
      register: whoami_result
      changed_when: false

    - name: Verify sudo access
      ansible.builtin.assert:
        that:
          - whoami_result.stdout == 'root'
        fail_msg: "Sudo access required. Current user: {{ whoami_result.stdout }}"
        success_msg: "Sudo access verified"

    - name: Check required ports are available (server)
      ansible.builtin.wait_for:
        port: "{{ item }}"
        state: stopped
        timeout: 1
      loop:
        - 6443  # K3s API
        - 10250 # kubelet
      when: inventory_hostname in groups['k3s_server']
      failed_when: false
      register: port_check

    - name: Check network connectivity to K3s release server
      ansible.builtin.uri:
        url: https://github.com/k3s-io/k3s/releases
        method: HEAD
        timeout: 10
      register: github_check
      failed_when: false

    - name: Verify internet connectivity
      ansible.builtin.assert:
        that:
          - github_check.status == 200
        fail_msg: "Cannot reach GitHub releases. Check internet connectivity."
        success_msg: "Internet connectivity verified"
      when: not (custom_registries | default(false) | bool)

    - name: Check for existing K3s installation
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Display existing K3s version if installed
      ansible.builtin.command:
        cmd: /usr/local/bin/k3s --version
      register: k3s_version_output
      when: k3s_binary.stat.exists
      changed_when: false
      failed_when: false

    - name: Report existing K3s installation
      ansible.builtin.debug:
        msg: "K3s already installed: {{ k3s_version_output.stdout_lines[0] }}"
      when:
        - k3s_binary.stat.exists
        - k3s_version_output is defined
        - k3s_version_output.stdout_lines | length > 0

- name: Pre-flight validation summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Display validation summary
      ansible.builtin.debug:
        msg:
          - "================================"
          - "Pre-flight validation completed"
          - "================================"
          - "All nodes passed basic requirements"
          - "Ready to proceed with K3s installation"
          - ""
          - "Next steps:"
          - "  ansible-playbook -i inventories/production.ini playbooks/k3s-setup.yml"
