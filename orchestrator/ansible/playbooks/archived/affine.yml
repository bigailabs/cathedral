---
- name: Deploy Affine Evaluation Service to K3s
  hosts: k3s_server
  become: true
  gather_facts: false

  vars:
    affine_namespace: affine-system
    affine_image: "ghcr.io/one-covenant/basilica-affine:latest"
    affine_image_pull_policy: "IfNotPresent"
    local_config_dir: "{{ playbook_dir }}/../../../config/deploy/affine"
    remote_config_dir: "/opt/basilica/affine-manifests"

  tasks:
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_version
      changed_when: false

    - name: Display kubectl version
      ansible.builtin.debug:
        msg: "kubectl is available"

    - name: Create remote config directory
      ansible.builtin.file:
        path: "{{ remote_config_dir }}"
        state: directory
        mode: '0755'

    - name: Copy Kubernetes manifests to server
      ansible.builtin.copy:
        src: "{{ local_config_dir }}/"
        dest: "{{ remote_config_dir }}/"
        mode: '0644'

    - name: Create affine-system namespace
      ansible.builtin.command:
        cmd: kubectl apply -f {{ remote_config_dir }}/namespace.yaml
      register: namespace_result
      changed_when: "'created' in namespace_result.stdout or 'configured' in namespace_result.stdout"

    - name: Check if affine-secrets exists
      ansible.builtin.command:
        cmd: kubectl get secret affine-secrets -n {{ affine_namespace }}
      register: secret_check
      failed_when: false
      changed_when: false

    - name: Prompt for CHUTES_API_KEY if secret doesn't exist
      when: secret_check.rc != 0
      block:
        - name: Get CHUTES_API_KEY from vault
          ansible.builtin.set_fact:
            chutes_api_key: "{{ vault_chutes_api_key | default('') }}"

        - name: Fail if CHUTES_API_KEY not provided
          ansible.builtin.fail:
            msg: |
              CHUTES_API_KEY not found in vault.
              Please add 'vault_chutes_api_key' to group_vars/all/vault.yml
              Or pass it via command line: -e vault_chutes_api_key=your-key
          when: chutes_api_key == ''

        - name: Create affine-secrets
          ansible.builtin.shell: |
            kubectl create secret generic affine-secrets \
              -n {{ affine_namespace }} \
              --from-literal=CHUTES_API_KEY="{{ chutes_api_key }}"
          register: secret_create
          changed_when: true
          no_log: true

    - name: Apply Affine service deployment
      ansible.builtin.command:
        cmd: kubectl apply -f {{ remote_config_dir }}/deployment.yaml
      register: deployment_result
      changed_when: "'created' in deployment_result.stdout or 'configured' in deployment_result.stdout"

    - name: Apply Affine service
      ansible.builtin.command:
        cmd: kubectl apply -f {{ remote_config_dir }}/service.yaml
      register: service_result
      changed_when: "'created' in service_result.stdout or 'configured' in service_result.stdout"

    - name: Wait for deployment rollout
      ansible.builtin.command:
        cmd: kubectl rollout status deployment/affine-service -n {{ affine_namespace }} --timeout=3m
      register: rollout_result
      changed_when: false

    - name: Get pod status
      ansible.builtin.command:
        cmd: kubectl get pods -n {{ affine_namespace }} -l app=affine-service -o wide
      register: pod_status
      changed_when: false

    - name: Display pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"

    - name: Get service details
      ansible.builtin.command:
        cmd: kubectl get svc affine-service -n {{ affine_namespace }}
      register: service_details
      changed_when: false

    - name: Display service details
      ansible.builtin.debug:
        msg: "{{ service_details.stdout_lines }}"

    - name: Run smoke test
      when: run_smoke_test | default(true)
      block:
        - name: Get a pod name for testing
          ansible.builtin.shell: |
            kubectl get pods -n {{ affine_namespace }} -l app=affine-service -o jsonpath='{.items[0].metadata.name}'
          register: test_pod
          changed_when: false

        - name: Test health endpoint
          ansible.builtin.command:
            cmd: kubectl exec -n {{ affine_namespace }} {{ test_pod.stdout }} -- python -c "import httpx; r = httpx.get('http://localhost:8000/health', timeout=5.0); print(r.json())"
          register: health_check
          changed_when: false

        - name: Display health check result
          ansible.builtin.debug:
            msg: "Health check: {{ health_check.stdout }}"

        - name: Test methods endpoint
          ansible.builtin.command:
            cmd: kubectl exec -n {{ affine_namespace }} {{ test_pod.stdout }} -- python -c "import httpx; r = httpx.get('http://localhost:8000/methods', timeout=5.0); print(r.json())"
          register: methods_check
          changed_when: false

        - name: Display methods check result
          ansible.builtin.debug:
            msg: "Available methods: {{ methods_check.stdout }}"

    - name: Display success message
      ansible.builtin.debug:
        msg: |
          ========================================
          Affine Evaluation Service deployed successfully!
          ========================================
          Namespace: {{ affine_namespace }}
          Service: affine-service

          To access the service from within the cluster:
            http://affine-service.{{ affine_namespace }}.svc.cluster.local:8000

          To test from the K3s server:
            kubectl port-forward -n {{ affine_namespace }} svc/affine-service 8000:8000
            curl http://localhost:8000/health

          To view logs:
            kubectl logs -n {{ affine_namespace }} -l app=affine-service --tail=50

          To view pods:
            kubectl get pods -n {{ affine_namespace }}
