---
# Apply performance tuning to K3s servers and GPU nodes
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/03-operations/performance-tuning.yml
#
# To apply only to servers:
#   ansible-playbook -i inventories/production.ini playbooks/03-operations/performance-tuning.yml --limit k3s_server
#

- name: Apply performance tuning to K3s infrastructure
  hosts: "{{ target_hosts | default('k3s_server') }}"
  become: yes
  gather_facts: yes
  roles:
    - role: performance_tuning
      tags: ['performance']

  post_tasks:
    - name: Summarize performance tuning
      ansible.builtin.debug:
        msg: |
          Performance tuning applied to {{ inventory_hostname }}:
          - Socket buffers: 64MB max
          - BBR congestion control: enabled
          - Conntrack table: 1M entries
          - PMTUD: enabled
      tags: ['performance', 'summary']
