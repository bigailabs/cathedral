---
# Deploy or update WireGuard watchdog on K3s servers
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbooks/03-operations/wireguard-watchdog.yml
#
# To apply only to specific servers:
#   ansible-playbook -i inventories/production.ini playbooks/03-operations/wireguard-watchdog.yml --limit k3s_server1
#

- name: Deploy WireGuard watchdog to K3s infrastructure
  hosts: "{{ target_hosts | default('k3s_server') }}"
  become: yes
  gather_facts: yes
  roles:
    - role: wireguard_watchdog
      tags: ['watchdog']

  post_tasks:
    - name: Get watchdog status
      ansible.builtin.command: systemctl is-active wireguard-watchdog
      register: watchdog_status
      changed_when: false
      failed_when: false

    - name: Summarize watchdog deployment
      ansible.builtin.debug:
        msg: |
          WireGuard watchdog deployed to {{ inventory_hostname }}:
          - Status: {{ watchdog_status.stdout }}
          - Features: parallel pings, handshake verification, graduated recovery
          - Startup jitter: {{ watchdog_startup_jitter | default(5) }}s
          - Check interval: {{ watchdog_check_interval | default(30) }}s
          - Failure threshold: {{ watchdog_failure_threshold | default(3) }}
      tags: ['watchdog', 'summary']
