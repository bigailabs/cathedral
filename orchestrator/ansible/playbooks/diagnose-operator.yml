---
- name: Diagnose Operator Deployment Issues
  hosts: server1
  gather_facts: false
  tasks:
    - name: Get operator pods
      shell: kubectl get pods -n basilica-system -o wide
      register: operator_pods
      changed_when: false

    - name: Display operator pods
      debug:
        msg: "{{ operator_pods.stdout_lines }}"

    - name: Get operator deployment
      shell: kubectl get deployment -n basilica-system basilica-operator -o yaml
      register: operator_deployment
      changed_when: false
      failed_when: false

    - name: Display operator deployment
      debug:
        msg: "{{ operator_deployment.stdout_lines }}"

    - name: Describe operator pod
      shell: kubectl describe pod -n basilica-system -l app=basilica-operator
      register: operator_pod_describe
      changed_when: false
      failed_when: false

    - name: Display operator pod describe
      debug:
        msg: "{{ operator_pod_describe.stdout_lines }}"

    - name: Get operator logs
      shell: kubectl logs -n basilica-system -l app=basilica-operator --tail=100
      register: operator_logs
      changed_when: false
      failed_when: false

    - name: Display operator logs
      debug:
        msg: "{{ operator_logs.stdout_lines }}"

    - name: Get events in basilica-system
      shell: kubectl get events -n basilica-system --sort-by='.lastTimestamp' | tail -30
      register: namespace_events
      changed_when: false

    - name: Display events
      debug:
        msg: "{{ namespace_events.stdout_lines }}"

    - name: Check if CRDs are installed
      shell: kubectl get crds | grep basilica
      register: crds_check
      changed_when: false
      failed_when: false

    - name: Display CRDs
      debug:
        msg: "{{ crds_check.stdout_lines }}"

    - name: Check nodes
      shell: kubectl get nodes -o wide
      register: nodes_check
      changed_when: false

    - name: Display nodes
      debug:
        msg: "{{ nodes_check.stdout_lines }}"
