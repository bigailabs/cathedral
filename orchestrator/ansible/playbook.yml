---
# Basilica K3s Complete Deployment
#
# Orchestrates setup, deployment, and verification of Basilica infrastructure on K3s.
#
# Deployment Architecture:
#   - Operator: K3s cluster (managed by this playbook)
#   - API: AWS ECS via Terraform (scripts/cloud/compute.tf)
#   - Validator: Docker Compose (scripts/validator/compose.prod.yml)
#
# Usage:
#   ansible-playbook -i inventories/production.ini playbook.yml
#   ansible-playbook -i inventories/production.ini playbook.yml --ask-vault-pass
#   ansible-playbook -i inventories/production.ini playbook.yml --skip-tags verify

- name: Basilica Complete Deployment - Setup Phase
  import_playbook: playbooks/setup.yml
  tags: [setup, always]

- name: Basilica Complete Deployment - Deploy Phase
  import_playbook: playbooks/deploy.yml
  tags: [deploy, always]

- name: Basilica Complete Deployment - Verify Phase
  import_playbook: playbooks/verify.yml
  tags: [verify]
