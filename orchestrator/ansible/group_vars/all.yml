---
# Global defaults for Basilica K3s deployment
#
# Additional variables are automatically loaded from:
#   - group_vars/all/infrastructure.yml  (K3s infrastructure config)
#   - group_vars/all/cni.yml             (CNI configuration)
#   - group_vars/all/loadbalancer.yml    (Load balancer config)
#   - group_vars/all/application.yml     (Basilica application config)
#
# Ansible automatically loads all YAML files in the group_vars/all/ directory
# and merges them into the group's variables.

# ansible_user: root
ansible_python_interpreter: /usr/bin/python3
