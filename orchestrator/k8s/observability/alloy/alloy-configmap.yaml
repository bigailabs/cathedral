apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: basilica-system
data:
  config.alloy: |
    logging {
      level = "info"
      format = "logfmt"
    }

    // Loki remote write
    loki.write "default" {
      endpoint {
        url = "https://basilica-logs.tplr.ai/loki/api/v1/push"
      }
    }

    // Prometheus remote write
    prometheus.remote_write "default" {
      endpoint {
        url = "https://basilica-telemetry.tplr.ai/api/v1/write"
      }
      external_labels = {
        cluster = "basilica-k3s-prod",
        environment = "production",
        alloy_instance = env("POD_NAME"),
        node = env("NODE_NAME"),
      }
    }

    // Kubernetes pod logs
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["basilica-system", "basilica-validators"]
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.process.add_labels.receiver]
    }

    loki.process "add_labels" {
      forward_to = [loki.write.default.receiver]

      stage.static_labels {
        values = {
          cluster = "basilica-k3s-prod",
          environment = "production",
        }
      }

      // Extract log level
      stage.regex {
        expression = `(?P<level>(ERROR|WARN|INFO|DEBUG|TRACE))`
      }

      stage.labels {
        values = {
          level = "level",
        }
      }
    }

    // Scrape operator metrics
    prometheus.scrape "operator" {
      targets = [{
        __address__ = "basilica-operator.basilica-system.svc:9400",
        job = "basilica-operator",
        namespace = "basilica-system",
        cluster = "basilica-k3s-prod",
      }]
      forward_to = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
    }

    // Scrape API metrics
    prometheus.scrape "api" {
      targets = [{
        __address__ = "basilica-api.basilica-system.svc:9401",
        job = "basilica-api",
        namespace = "basilica-system",
        cluster = "basilica-k3s-prod",
      }]
      forward_to = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
    }

    // System metrics
    prometheus.exporter.unix "system" {
      include_exporter_metrics = true
    }

    prometheus.scrape "system" {
      targets = prometheus.exporter.unix.system.targets
      forward_to = [prometheus.remote_write.default.receiver]
    }

    // WireGuard metrics from K3s server nodes
    // Exporter runs on port 9586 on each server
    prometheus.scrape "wireguard" {
      targets = [
        {
          __address__ = "10.200.0.1:9586",
          job = "wireguard",
          instance = "server1",
          node_type = "k3s-server",
        },
        {
          __address__ = "10.200.0.2:9586",
          job = "wireguard",
          instance = "server2",
          node_type = "k3s-server",
        },
        {
          __address__ = "10.200.0.3:9586",
          job = "wireguard",
          instance = "server3",
          node_type = "k3s-server",
        },
      ]
      forward_to = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
      scrape_timeout = "10s"
    }

    // Kubelet metrics for GPU node health monitoring
    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.relabel "kubelet" {
      targets = discovery.kubernetes.nodes.targets
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        target_label = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_address_InternalIP"]
        regex = "(.*)"
        replacement = "$1:10250"
        target_label = "__address__"
      }
    }

    prometheus.scrape "kubelet" {
      targets = discovery.relabel.kubelet.output
      forward_to = [prometheus.remote_write.default.receiver]
      scrape_interval = "30s"
      scheme = "https"
      tls_config {
        insecure_skip_verify = true
      }
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    }
