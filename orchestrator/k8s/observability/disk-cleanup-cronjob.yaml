apiVersion: v1
kind: ServiceAccount
metadata:
  name: disk-cleanup
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: disk-cleanup
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: disk-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: disk-cleanup
subjects:
- kind: ServiceAccount
  name: disk-cleanup
  namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: disk-cleanup
  namespace: kube-system
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: disk-cleanup
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              echo "Starting pod-level cleanup at $(date)"

              # Delete evicted pods
              kubectl get pods --all-namespaces --field-selector=status.phase=Failed -o json | \
                jq -r '.items[] | select(.status.reason=="Evicted") | "\(.metadata.namespace) \(.metadata.name)"' | \
                while read namespace pod; do
                  if [ -n "$namespace" ] && [ -n "$pod" ]; then
                    echo "Deleting evicted pod $namespace/$pod"
                    kubectl delete pod "$pod" -n "$namespace"
                  fi
                done

              # Delete completed jobs older than 7 days
              kubectl get jobs --all-namespaces -o json | \
                jq -r '.items[] | select(.status.completionTime != null and (.status.completionTime | fromdateiso8601) < (now - 604800)) | "\(.metadata.namespace) \(.metadata.name)"' | \
                while read namespace job; do
                  if [ -n "$namespace" ] && [ -n "$job" ]; then
                    echo "Deleting old job $namespace/$job"
                    kubectl delete job "$job" -n "$namespace"
                  fi
                done

              echo "Cleanup complete at $(date)"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
