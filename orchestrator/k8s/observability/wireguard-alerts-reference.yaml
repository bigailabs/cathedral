# WireGuard Alerting Rules Reference
#
# NOTE: This file is a REFERENCE for configuring alerts in your remote
# Prometheus/Grafana instance (basilica-telemetry.tplr.ai).
#
# The cluster uses Grafana Alloy to collect metrics and send them to a
# remote Prometheus endpoint. Alerts should be configured in that remote
# instance, not via PrometheusRule CRD (which requires Prometheus Operator).
#
# To configure these alerts:
# 1. Access your Grafana instance at basilica-telemetry.tplr.ai
# 2. Navigate to Alerting > Alert Rules
# 3. Create alert rules using the expressions below
#
# Metrics collected:
# - vxlan_* metrics from wireguard-watchdog.sh textfile exporter
# - wireguard_reconcile_* metrics from DaemonSet textfile exporter
# - wireguard_gpu_nodes_* metrics from DaemonSet (GPU node flannel.1 health)
# - wireguard_* metrics from prometheus-wireguard-exporter
#
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: wireguard-alerts
  namespace: kube-system
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: wireguard
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: wireguard
      interval: 30s
      rules:
        - alert: WireGuardPeerHandshakeStale
          expr: (time() - wireguard_latest_handshake_seconds) > 180
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "WireGuard peer handshake stale on {{ $labels.instance }}"
            description: "WireGuard peer {{ $labels.public_key }} has not had a handshake in {{ $value | humanizeDuration }}. Expected < 180s with 60s keepalive."

        - alert: WireGuardPeerDisconnected
          expr: (time() - wireguard_latest_handshake_seconds) > 600
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "WireGuard peer disconnected on {{ $labels.instance }}"
            description: "WireGuard peer {{ $labels.public_key }} has been disconnected for {{ $value | humanizeDuration }}. Node may be unreachable."

        - alert: WireGuardExporterDown
          expr: up{job="wireguard"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "WireGuard exporter down on {{ $labels.instance }}"
            description: "WireGuard metrics exporter is not responding. Cannot monitor tunnel health."

        - alert: WireGuardNoPeers
          expr: wireguard_peers == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "WireGuard has no peers on {{ $labels.instance }}"
            description: "WireGuard interface {{ $labels.interface }} has no configured peers."

        - alert: WireGuardHighPacketLoss
          expr: |
            rate(wireguard_sent_bytes_total[5m]) > 0
            and rate(wireguard_received_bytes_total[5m]) == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "WireGuard possible packet loss on {{ $labels.instance }}"
            description: "WireGuard peer {{ $labels.public_key }} is sending data but receiving nothing. Possible asymmetric routing or firewall issue."

    - name: kubelet-wireguard
      interval: 30s
      rules:
        - alert: KubeletUnreachableViaWireGuard
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 1
            and on(node) (
              up{job="kubelet"} == 0
              or absent(up{job="kubelet"})
            )
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Kubelet unreachable despite node Ready status"
            description: "Node {{ $labels.node }} shows Ready but kubelet metrics are unavailable. This indicates 502 Bad Gateway scenario - API server cannot reach kubelet via WireGuard."

        - alert: GPUNodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready",status="true"} == 0
            and on(node) kube_node_labels{label_basilica_ai_node_type="gpu"}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "GPU node {{ $labels.node }} is not ready"
            description: "GPU node {{ $labels.node }} has been in NotReady state for 5 minutes. Check WireGuard tunnel and K3s agent status."

        - alert: GPUNodeHighRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"u-.*"}[1h]) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High pod restart rate on user namespace"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value | printf \"%.0f\" }} times in the last hour. May indicate network instability."

    - name: flannel-vxlan
      interval: 30s
      rules:
        - alert: VXLANStaleNeighborEntries
          expr: vxlan_stale_neighbor_entries > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High VXLAN stale neighbor count on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has {{ $value }} stale VXLAN neighbor entries. This may cause intermittent 503 errors for pod traffic."

        - alert: VXLANFDBEntriesLow
          expr: vxlan_fdb_entries_total < 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low VXLAN FDB entry count on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has only {{ $value }} FDB entries. Expected at least 2 for proper VXLAN routing to GPU nodes."

        - alert: VXLANNeighborEntriesLow
          expr: vxlan_neighbor_entries_total < 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low VXLAN neighbor entry count on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has only {{ $value }} neighbor entries. GPU pod traffic may fail."

        - alert: DuplicateFlannelVtepMAC
          expr: |
            count by (vtep_mac) (flannel_vtep_mac_info) > 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Duplicate Flannel VtepMAC detected"
            description: "Multiple nodes share VtepMAC {{ $labels.vtep_mac }}. This causes VXLAN routing failures and HTTP 503 errors. Recreate flannel.1 with unique MAC on affected nodes."

        - alert: FlannelRouteViaWG0
          expr: flannel_route_via_wg0 > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Incorrect Flannel route via wg0 on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has {{ $value }} pod CIDR routes going via wg0 instead of flannel.1. This breaks VXLAN encapsulation and causes HTTP 503 errors."

    - name: wireguard-reconcile
      interval: 60s
      rules:
        - alert: WireGuardReconcileStale
          expr: (time() - wireguard_reconcile_last_run_timestamp_seconds) > 600
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "WireGuard reconcile has not run on {{ $labels.instance }}"
            description: "WireGuard reconcile job has not run in {{ $value | humanizeDuration }} on {{ $labels.instance }}. CronJob may be failing or leader election stuck."

        - alert: WireGuardReconcileFailed
          expr: wireguard_reconcile_success == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "WireGuard reconcile failing on {{ $labels.instance }}"
            description: "WireGuard reconcile job is failing on {{ $labels.instance }}. GPU pod traffic may be affected."

        - alert: WireGuardReconcileHighChanges
          expr: wireguard_reconcile_changes_total > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High WireGuard reconcile change rate on {{ $labels.instance }}"
            description: "WireGuard reconcile made {{ $value }} changes on {{ $labels.instance }}. May indicate routing instability or frequent node churn."

    - name: gpu-node-flannel
      interval: 60s
      rules:
        - alert: GPUNodeFlannelMissing
          expr: wireguard_gpu_nodes_flannel_missing > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "GPU node missing flannel.1 interface"
            description: "{{ $value }} GPU node(s) have WireGuard connectivity but flannel.1 interface is missing or broken. This causes HTTP 503 errors. Restart K3s agent on affected GPU nodes: sudo systemctl restart k3s-agent"

        - alert: GPUNodeFlannelUnhealthy
          expr: |
            wireguard_gpu_nodes_total > 0
            and wireguard_gpu_nodes_healthy < wireguard_gpu_nodes_total
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "GPU node VXLAN connectivity degraded"
            description: "Only {{ $value }} of {{ $labels.wireguard_gpu_nodes_total }} GPU nodes have healthy flannel.1 connectivity. Check WireGuard tunnels and K3s agent status."

        - alert: GPUNodeFlannelAllDown
          expr: |
            wireguard_gpu_nodes_total > 0
            and wireguard_gpu_nodes_healthy == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "All GPU nodes have broken flannel.1 connectivity"
            description: "None of the {{ $labels.wireguard_gpu_nodes_total }} GPU nodes have working VXLAN overlay. All user deployments will fail with HTTP 503. Immediate action required."

        - alert: GPUNodesNotMonitored
          expr: |
            wireguard_reconcile_success == 1
            and wireguard_gpu_nodes_total == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "No GPU nodes detected for flannel.1 monitoring"
            description: "Reconciliation is running but no GPU nodes with basilica.ai/wireguard=true label are visible. Check node labels and K8s API connectivity."

    - name: vxlan-traffic
      interval: 30s
      rules:
        - alert: VXLANHighErrorRate
          expr: |
            rate(vxlan_rx_errors_total[5m]) + rate(vxlan_tx_errors_total[5m]) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High VXLAN error rate on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} has {{ $value | printf \"%.2f\" }} VXLAN errors/sec. Check flannel.1 interface and MTU settings."

        - alert: VXLANHighDropRate
          expr: |
            rate(vxlan_rx_dropped_total[5m]) + rate(vxlan_tx_dropped_total[5m]) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High VXLAN packet drop rate on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} is dropping {{ $value | printf \"%.2f\" }} VXLAN packets/sec. May indicate buffer exhaustion or routing issues."

        - alert: VXLANNoTraffic
          expr: |
            rate(vxlan_rx_packets_total[10m]) == 0
            and rate(vxlan_tx_packets_total[10m]) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "VXLAN asymmetric traffic on {{ $labels.instance }}"
            description: "Node {{ $labels.instance }} is sending but not receiving VXLAN traffic. Possible return path routing issue."
