---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: user-resource-quota
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: resource-management
spec:
  hard:
    # CPU limits
    requests.cpu: "8"
    limits.cpu: "16"
    # Memory limits
    requests.memory: 32Gi
    limits.memory: 64Gi
    # Storage limits
    persistentvolumeclaims: "10"
    requests.storage: 500Gi
    # Object count limits
    pods: "20"
    services: "20"
    secrets: "50"
    configmaps: "50"
    replicationcontrollers: "0"
