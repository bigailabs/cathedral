apiVersion: v1
kind: ServiceAccount
metadata:
  name: basilica-operator
  namespace: basilica-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: basilica-operator
rules:
  # Core resources
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "delete"]

  # PodDisruptionBudgets for UserDeployment controller
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]

  # Evictions (PDB-aware draining)
  - apiGroups: ["policy"]
    resources: ["pods/eviction"]
    verbs: ["create"]

  # Batch Jobs managed by operator
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]

  # NetworkPolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]

  # Basilica CRDs
  - apiGroups: ["basilica.ai"]
    resources: ["basilicajobs", "gpurentals", "basilicanodeprofiles", "userdeployments"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: ["basilica.ai"]
    resources: ["basilicajobs/status", "gpurentals/status", "basilicanodeprofiles/status", "userdeployments/status"]
    verbs: ["patch", "update"]

  # Apps resources for UserDeployment controller
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]

  # ConfigMaps for Envoy routing
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: basilica-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: basilica-operator
subjects:
  - kind: ServiceAccount
    name: basilica-operator
    namespace: basilica-system
