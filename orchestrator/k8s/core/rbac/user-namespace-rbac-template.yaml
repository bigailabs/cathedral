---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: user-workload
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-workload-restricted
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-workload-restricted-binding
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: user-workload-restricted
subjects:
  - kind: ServiceAccount
    name: default
    namespace: TENANT_NAMESPACE

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operator-elevated-binding
  namespace: TENANT_NAMESPACE
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: basilica-operator-tenant
subjects:
  - kind: ServiceAccount
    name: basilica-operator
    namespace: basilica-system
