apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fuse-module-loader
  namespace: kube-system
  labels:
    app: fuse-module-loader
spec:
  selector:
    matchLabels:
      app: fuse-module-loader
  template:
    metadata:
      labels:
        app: fuse-module-loader
    spec:
      hostPID: true
      hostNetwork: true
      containers:
      - name: loader
        image: alpine:3.19
        command:
        - /bin/sh
        - -c
        - |
          # Load FUSE module
          if ! lsmod | grep -q '^fuse '; then
            echo "Loading FUSE kernel module..."
            modprobe fuse
          else
            echo "FUSE module already loaded"
          fi

          # Keep container running
          while true; do
            sleep 3600
          done
        securityContext:
          privileged: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      tolerations:
      - operator: Exists
