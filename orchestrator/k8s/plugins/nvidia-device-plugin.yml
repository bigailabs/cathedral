# NVIDIA Device Plugin for Kubernetes
# Exposes nvidia.com/gpu extended resource to enable GPU scheduling
#
# Prerequisites on GPU nodes:
#   1. NVIDIA drivers installed (nvidia-smi working)
#   2. NVIDIA Container Toolkit installed and configured
#   3. Node labeled with basilica.ai/node-type=gpu
#
# Based on: https://github.com/NVIDIA/k8s-device-plugin v0.17.0
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/version: "0.17.0"
    app.kubernetes.io/component: device-plugin
    app.kubernetes.io/part-of: basilica
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
        app.kubernetes.io/name: nvidia-device-plugin
    spec:
      # Only schedule on GPU nodes (nodes labeled during onboarding)
      nodeSelector:
        basilica.ai/node-type: gpu
      tolerations:
      # Tolerate nvidia.com/gpu taint (standard for GPU nodes)
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Tolerate unvalidated nodes (new nodes before validation completes)
      - key: basilica.ai/unvalidated
        operator: Exists
        effect: NoSchedule
      # Tolerate WireGuard failure taint (network issues shouldn't block GPU discovery)
      - key: basilica.ai/wireguard-failure
        operator: Exists
        effect: NoExecute
      priorityClassName: system-node-critical
      containers:
      - name: nvidia-device-plugin-ctr
        image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
        env:
        - name: FAIL_ON_INIT_ERROR
          value: "false"
        - name: NVIDIA_MIG_MONITOR_DEVICES
          value: "all"
        - name: DEVICE_LIST_STRATEGY
          value: "envvar"
        - name: DEVICE_ID_STRATEGY
          value: "uuid"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/device-plugins
