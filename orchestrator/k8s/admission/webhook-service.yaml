---
# Service for the admission webhook endpoint.
# Routes traffic to the basilica-operator pods on the webhook port.
apiVersion: v1
kind: Service
metadata:
  name: basilica-operator-webhook
  namespace: basilica-system
  labels:
    app.kubernetes.io/name: basilica-operator
    app.kubernetes.io/component: admission-webhook
spec:
  selector:
    app: basilica-operator
  ports:
    - name: webhook
      port: 9443
      targetPort: 9443
      protocol: TCP
