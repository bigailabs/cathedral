---
# ValidatingWebhookConfiguration for storage mount path validation.
# Ensures pods in user namespaces (u-*) can only mount their own namespace's storage.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: basilica-storage-mount-validator
  labels:
    app.kubernetes.io/name: basilica-operator
    app.kubernetes.io/component: admission-webhook
webhooks:
  - name: storage-mount.basilica.ai
    clientConfig:
      service:
        name: basilica-operator-webhook
        namespace: basilica-system
        path: /validate-pod
        port: 9443
      # CA bundle injected by cert-manager or manually
      caBundle: ""
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchExpressions:
        # Only validate pods in user namespaces (u-*)
        - key: kubernetes.io/metadata.name
          operator: In
          values: []  # Dynamically populated or use prefix matching via label
        - key: basilica.ai/tenant
          operator: Exists
    objectSelector:
      matchExpressions:
        # Skip pods that explicitly opt out of validation
        - key: basilica.ai/skip-mount-validation
          operator: NotIn
          values: ["true"]
    failurePolicy: Fail
    sideEffects: None
    admissionReviewVersions: ["v1", "v1beta1"]
    timeoutSeconds: 10
    matchPolicy: Equivalent
