---
# Kustomize patch for adding webhook support to basilica-operator deployment.
# Apply with: kubectl patch deployment basilica-operator -n basilica-system --patch-file operator-webhook-patch.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-operator
  namespace: basilica-system
spec:
  template:
    spec:
      containers:
        - name: operator
          env:
            - name: OPERATOR_WEBHOOK_ENABLED
              value: "true"
            - name: OPERATOR_WEBHOOK_ADDR
              value: "0.0.0.0:9443"
            - name: OPERATOR_FUSE_BASE_PATH
              value: "/var/lib/basilica/fuse"
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: basilica-webhook-certs
