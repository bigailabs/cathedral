---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fuse-daemon
  namespace: basilica-storage
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: storage-daemon

---
# ClusterRole to list and watch namespaces
# Required for the daemon to discover user namespaces (u-*)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fuse-daemon-namespace-reader
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: storage-daemon
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding grants the fuse-daemon ServiceAccount
# permission to list namespaces cluster-wide
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fuse-daemon-namespace-reader
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: storage-daemon
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fuse-daemon-namespace-reader
subjects:
  - kind: ServiceAccount
    name: fuse-daemon
    namespace: basilica-storage

---
# Role for reading storage secrets in user namespaces
# This Role must be created in each user namespace via RoleBinding
# The fuse-daemon needs to read storage credentials from user namespace secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fuse-daemon-secret-reader
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: storage-daemon
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "watch"]
    resourceNames:
      - basilica-r2-credentials
      - basilica-s3-credentials
      - basilica-gcs-credentials
