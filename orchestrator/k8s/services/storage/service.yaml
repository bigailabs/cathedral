apiVersion: v1
kind: Service
metadata:
  name: fuse-daemon
  namespace: basilica-storage
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: fuse-daemon
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: fuse-daemon
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fuse-daemon
  namespace: basilica-storage
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: fuse-daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: basilica
      app.kubernetes.io/component: fuse-daemon
  namespaceSelector:
    matchNames:
      - basilica-storage
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
