apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fuse-daemon
  namespace: basilica-storage
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: fuse-daemon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: basilica
      app.kubernetes.io/component: fuse-daemon
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: basilica
        app.kubernetes.io/component: fuse-daemon
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fuse-daemon
      hostPID: false
      hostNetwork: false
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 60
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: fuse-init
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Verifying FUSE device..."
              if [ ! -e /dev/fuse ]; then
                echo "ERROR: /dev/fuse not available"
                exit 1
              fi
              echo "FUSE device available"
              mkdir -p /var/lib/basilica/fuse
              chmod 755 /var/lib/basilica/fuse
              echo "Initialization complete"
          volumeMounts:
            - name: fuse-mount
              mountPath: /var/lib/basilica/fuse
            - name: fuse-device
              mountPath: /dev/fuse
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 16Mi
      containers:
        - name: fuse-daemon
          image: ghcr.io/one-covenant/basilica-storage-daemon:latest
          imagePullPolicy: Always
          args:
            - "--mode=daemonset"
            - "--fuse-base-path=/var/lib/basilica/fuse"
            - "--http-port=9090"
          env:
            - name: DAEMON_MODE
              value: "daemonset"
            - name: RUST_LOG
              value: "info,basilica_storage=debug"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          securityContext:
            privileged: true
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Initiating graceful shutdown..."
                    curl -sf -X POST http://localhost:9090/shutdown || true
                    sleep 10
                    echo "Shutdown complete"
          volumeMounts:
            - name: fuse-mount
              mountPath: /var/lib/basilica/fuse
              mountPropagation: Bidirectional
            - name: fuse-device
              mountPath: /dev/fuse
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 10Gi
            limits:
              cpu: 2000m
              memory: 4Gi
              ephemeral-storage: 50Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: fuse-mount
          hostPath:
            path: /var/lib/basilica/fuse
            type: DirectoryOrCreate
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 10Gi
