apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fuse-daemon-alerts
  namespace: basilica-storage
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: fuse-daemon
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: fuse-daemon
      interval: 30s
      rules:
        - alert: FUSEDaemonDown
          expr: up{job="fuse-daemon"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "FUSE daemon is down on node {{ $labels.node }}"
            description: "FUSE daemon pod {{ $labels.pod }} has been down for more than 5 minutes"

        - alert: FUSEDaemonNotReady
          expr: kube_daemonset_status_number_ready{daemonset="fuse-daemon",namespace="basilica-storage"} < kube_daemonset_status_desired_number_scheduled{daemonset="fuse-daemon",namespace="basilica-storage"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "FUSE daemon pods not ready"
            description: "Not all FUSE daemon pods are ready. Ready: {{ $value }}"

        - alert: FUSEMountFailures
          expr: rate(basilica_storage_mount_failures_total[5m]) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High FUSE mount failure rate"
            description: "FUSE daemon is experiencing {{ $value | printf \"%.2f\" }} mount failures per second"

        - alert: FUSEDaemonHighMemory
          expr: |
            (container_memory_usage_bytes{pod=~"fuse-daemon.*",namespace="basilica-storage"}
            / container_spec_memory_limit_bytes{pod=~"fuse-daemon.*",namespace="basilica-storage"}) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "FUSE daemon high memory usage"
            description: "FUSE daemon {{ $labels.pod }} is using {{ $value | humanizePercentage }} of memory limit"

        - alert: FUSEDaemonHighCPU
          expr: |
            rate(container_cpu_usage_seconds_total{pod=~"fuse-daemon.*",namespace="basilica-storage"}[5m])
            / container_spec_cpu_quota{pod=~"fuse-daemon.*",namespace="basilica-storage"} * 100000 > 0.8
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "FUSE daemon high CPU usage"
            description: "FUSE daemon {{ $labels.pod }} is using more than 80% of CPU limit"

        - alert: FUSEDaemonEphemeralStorageHigh
          expr: |
            (container_fs_usage_bytes{pod=~"fuse-daemon.*",namespace="basilica-storage"}
            / container_fs_limit_bytes{pod=~"fuse-daemon.*",namespace="basilica-storage"}) > 0.8
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "FUSE daemon ephemeral storage high"
            description: "FUSE daemon {{ $labels.pod }} is using {{ $value | humanizePercentage }} of ephemeral storage limit"

        - alert: FUSEDaemonRestarting
          expr: increase(kube_pod_container_status_restarts_total{pod=~"fuse-daemon.*",namespace="basilica-storage"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "FUSE daemon restarting frequently"
            description: "FUSE daemon {{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last hour"
