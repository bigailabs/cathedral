apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fuse-daemon-pdb
  namespace: basilica-storage
  labels:
    app.kubernetes.io/name: basilica
    app.kubernetes.io/component: fuse-daemon
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: basilica
      app.kubernetes.io/component: fuse-daemon
  unhealthyPodEvictionPolicy: IfHealthyBudget
