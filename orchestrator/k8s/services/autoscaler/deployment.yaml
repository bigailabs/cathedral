apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-autoscaler
  namespace: basilica-autoscaler
  labels:
    app: basilica-autoscaler
spec:
  # Single replica with leader election
  # K8s will restart pod on failure; no need for standby replicas
  replicas: 1
  selector:
    matchLabels:
      app: basilica-autoscaler
  template:
    metadata:
      labels:
        app: basilica-autoscaler
    spec:
      serviceAccountName: basilica-autoscaler
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: autoscaler
          image: ghcr.io/one-covenant/basilica-autoscaler:latest
          imagePullPolicy: Always
          args:
            - "--config"
            - "/etc/basilica/config.toml"
          env:
            - name: BASILICA_API_URL
              value: "https://api.basilica.ai"
            - name: BASILICA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: basilica-autoscaler-credentials
                  key: api-key
            - name: RUST_LOG
              value: "info,basilica_autoscaler=debug"
            - name: AUTOSCALER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEADER_ELECTION_LEASE_DURATION
              value: "15s"
            - name: LEADER_ELECTION_RENEW_DEADLINE
              value: "10s"
            - name: LEADER_ELECTION_RETRY_PERIOD
              value: "2s"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          ports:
            - name: metrics
              containerPort: 9400
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          volumeMounts:
            - name: config
              mountPath: /etc/basilica
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: basilica-autoscaler-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: basilica-autoscaler
  namespace: basilica-autoscaler
  labels:
    app: basilica-autoscaler
spec:
  selector:
    app: basilica-autoscaler
  ports:
    - name: metrics
      port: 9400
      targetPort: metrics
    - name: health
      port: 8080
      targetPort: health
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-autoscaler-config
  namespace: basilica-autoscaler
data:
  config.toml: |
    [controller]
    namespace = "basilica-autoscaler"
    reconcile_interval_secs = 30
    max_concurrent_reconciles = 5
    phase_timeout_secs = 600

    [health]
    listen_addr = "0.0.0.0:8080"

    [metrics]
    listen_addr = "0.0.0.0:9400"

    [leader_election]
    enabled = true
    lease_name = "basilica-autoscaler-leader"
    lease_namespace = "basilica-autoscaler"
    lease_duration_secs = 15
    renew_deadline_secs = 10
    retry_period_secs = 2

    [api]
    base_url = "https://api.basilica.ai"
    timeout_secs = 30
    max_retries = 3

    [ssh]
    connection_timeout_secs = 30
    execution_timeout_secs = 300
    max_retries = 3
    retry_delay_secs = 5
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: basilica-autoscaler
  namespace: basilica-autoscaler
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: basilica-autoscaler
