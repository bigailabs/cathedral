# Default ScalingPolicy for dynamic GPU node provisioning
# This policy enables automatic scale-up/down based on pending GPU workloads
#
# Apply with: kubectl apply -f scaling-policy.yaml
---
apiVersion: autoscaler.basilica.ai/v1alpha1
kind: ScalingPolicy
metadata:
  name: default
  namespace: basilica-autoscaler
spec:
  # Enable autoscaling
  enabled: true

  # Node count limits
  minNodes: 0
  maxNodes: 50

  # Scale-up configuration
  scaleUp:
    # Number of pending GPU pods to trigger scale-up
    pendingPodThreshold: 1
    # Cooldown after scale-up in seconds
    cooldownSeconds: 60
    # Number of nodes to add per scale-up event
    increment: 1

  # Scale-down configuration
  scaleDown:
    # Node must be idle for this duration (seconds)
    idleTimeoutSeconds: 600
    # Scale down if GPU utilization below this percentage
    gpuUtilizationThreshold: 10.0
    # Node has zero pods for this duration (seconds)
    zeroPodsDurationSeconds: 300
    # Cooldown after scale-down in seconds
    cooldownSeconds: 300
    # Number of nodes to remove per scale-down event
    decrement: 1

  # Dynamic offering selection constraints
  # The autoscaler will query available GPU offerings and select the cheapest
  # one that meets the pending pod requirements
  offeringConstraints:
    # Preferred providers (empty = any provider)
    providers:
      - hyperstack
    # Preferred regions (optional, empty = any region)
    # regions:
    #   - us-east-1
    #   - eu-west-1
    # Maximum hourly rate in USD (optional)
    maxHourlyRate: 10.0
    # Allow fallback to any available GPU when requested model not found
    # When true, selects cheapest offering meeting GPU count (ignoring model)
    allowModelFallback: true
    # Fallback offering ID if no dynamic match found (optional)
    # Uncomment and set if you want a default fallback
    # fallbackOfferingId: "rtx4090-1gpu"

  # Metrics collection configuration
  metrics:
    collectionIntervalSeconds: 30
    evaluationIntervalSeconds: 60

  # Warm pool configuration for proactive capacity reservation
  # Maintains idle GPU capacity to serve workloads immediately (<10s)
  # instead of waiting for node provisioning (3-5 minutes)
  warmPool:
    # Enable warm pool capacity reservation
    enabled: true
    # Target minimum idle VRAM in GB across warm pool nodes
    minIdleVramGb: 160
    # Maximum number of idle warm pool nodes
    maxIdleNodes: 3
    # Maximum hourly cost for idle warm pool in USD
    maxIdleCostPerHour: 15.0
    # Preferred GPU types for warm pool (ordered by preference)
    # preferredGpuTypes:
    #   - A100
    #   - H100
    #   - L40S
    # Preferred GPU types for warm pool (empty = select by cheapest cost)
    preferredGpuTypes: []
    # Hysteresis thresholds to prevent scaling flapping
    # Scale up when idle VRAM falls below 80% of target
    scaleUpThresholdPercent: 80
    # Scale down when idle VRAM exceeds 120% of target
    scaleDownThresholdPercent: 120

  # CPU workload scaling configuration
  # Provisions GPU boxes for CPU-only workloads when pending
  # (used until CPU-only providers are available in the API)
  cpuWorkloadScaling:
    # Enable CPU-aware scaling
    enabled: true
    # Number of pending CPU-only pods to trigger scale-up
    pendingPodThreshold: 1
    # Cooldown after scale-up in seconds (prevents runaway scaling)
    cooldownSeconds: 300
    # Preferred GPU model for CPU workloads (cheapest option)
    # Leave empty to auto-select cheapest available
    # preferredGpuModel: "RTX4090"

  # Image pre-pull configuration for warm pool nodes
  # Pre-pulls common images to reduce container startup time
  imagePrepull:
    enabled: true
    images:
      - name: pytorch/pytorch:2.1.0-cuda12.1-cudnn8-runtime
        sizeEstimateGb: 8
      - name: vllm/vllm-openai:v0.6.0
        sizeEstimateGb: 12

  # Node template for dynamically provisioned nodes
  nodeTemplate:
    # Secure Cloud configuration for dynamic provisioning
    secureCloud:
      # offering_id is now OPTIONAL - dynamically selected based on pending pods
      # Uncomment to force a specific offering (bypasses dynamic selection):
      # offeringId: "rtx4090-2gpu"

      # SSH key ID registered with your cloud provider
      sshKeyId: "35f0ab63-e983-40b0-b53d-953cf67b53d2"
      datacenterId: "github|434149"

      # Reference to SSH private key secret
      sshKeySecretRef:
        name: hyperstack-ssh-key
        namespace: basilica-ssh-keys
        key: ssh-private-key

    # K3s agent configuration
    k3s:
      # K3s server URL (your cluster's API endpoint)
      serverUrl: "https://connect.basilica.ai:6443"

      # Reference to K3s join token secret
      tokenSecretRef:
        name: k3s-cluster-token
        namespace: basilica-autoscaler
        key: node-token

      # Additional node labels applied to provisioned nodes
      nodeLabels:
        basilica.ai/node-role: miner
        basilica.ai/validated: "true"
        basilica.ai/node-group: user-deployments
        basilica.ai/workloads-only: "true"

      # Node taints for GPU workload isolation
      nodeTaints:
        - nvidia.com/gpu=true:NoSchedule

      # Additional K3s agent arguments
      extraArgs:
        - "--kubelet-arg=max-pods=50"

    # Lifecycle hooks
    lifecycle:
      # Drain node before removal
      drainOnRemoval: true
      drainTimeoutSeconds: 600
      deleteGracePeriodSeconds: 30
      forceDrain: false
