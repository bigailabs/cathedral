# Secrets required for basilica-autoscaler
# IMPORTANT: Replace placeholder values before applying
#
# Apply with: kubectl apply -f secrets.yaml
# Do NOT commit this file with real values to git
---
apiVersion: v1
kind: Secret
metadata:
  name: basilica-autoscaler-credentials
  namespace: basilica-autoscaler
type: Opaque
stringData:
  # Your Basilica API key for Secure Cloud API calls
  api-key: "REPLACE_WITH_BASILICA_API_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: k3s-cluster-token
  namespace: basilica-autoscaler
type: Opaque
stringData:
  # K3s node join token (from /var/lib/rancher/k3s/server/node-token on server)
  node-token: "REPLACE_WITH_K3S_NODE_TOKEN"
---
# Optional: SSH keys for dynamic provisioning
# Only needed if using mode=Dynamic in NodePools
apiVersion: v1
kind: Secret
metadata:
  name: hyperstack-ssh-key
  namespace: basilica-ssh-keys
type: Opaque
stringData:
  # SSH private key for Hyperstack (or other provider) instances
  ssh-private-key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    REPLACE_WITH_YOUR_SSH_PRIVATE_KEY
    -----END OPENSSH PRIVATE KEY-----
