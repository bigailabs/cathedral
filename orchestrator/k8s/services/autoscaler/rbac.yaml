apiVersion: v1
kind: ServiceAccount
metadata:
  name: basilica-autoscaler
  namespace: basilica-autoscaler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: basilica-autoscaler
rules:
  # NodePool and ScalingPolicy CRDs - full access including status
  - apiGroups: ["autoscaler.basilica.ai"]
    resources: ["nodepools", "scalingpolicies"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: ["autoscaler.basilica.ai"]
    resources: ["nodepools/status", "scalingpolicies/status"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Node operations
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update", "delete"]

  # Pod operations for GPU detection and eviction
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]

  # PodDisruptionBudget operations for safe eviction
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]

  # Events for status reporting
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: basilica-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: basilica-autoscaler
subjects:
  - kind: ServiceAccount
    name: basilica-autoscaler
    namespace: basilica-autoscaler
---
# Namespace-scoped Role for config secrets in basilica-autoscaler namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: basilica-autoscaler-config
  namespace: basilica-autoscaler
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - k3s-cluster-token
      - basilica-autoscaler-credentials
      - basilica-api-key
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: basilica-autoscaler-config
  namespace: basilica-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: basilica-autoscaler-config
subjects:
  - kind: ServiceAccount
    name: basilica-autoscaler
    namespace: basilica-autoscaler
---
# Namespace-scoped Role for SSH keys in basilica-ssh-keys namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: basilica-autoscaler-ssh-keys
  namespace: basilica-ssh-keys
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: basilica-autoscaler-ssh-keys
  namespace: basilica-ssh-keys
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: basilica-autoscaler-ssh-keys
subjects:
  - kind: ServiceAccount
    name: basilica-autoscaler
    namespace: basilica-autoscaler
---
# Namespace-scoped Role for leader election leases
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: basilica-autoscaler-leader-election
  namespace: basilica-autoscaler
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
    resourceNames:
      - basilica-autoscaler-leader
  # Allow creating the lease initially (resourceNames don't apply to create)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: basilica-autoscaler-leader-election
  namespace: basilica-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: basilica-autoscaler-leader-election
subjects:
  - kind: ServiceAccount
    name: basilica-autoscaler
    namespace: basilica-autoscaler
