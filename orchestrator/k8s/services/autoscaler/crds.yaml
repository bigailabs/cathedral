apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodepools.autoscaler.basilica.ai
spec:
  group: autoscaler.basilica.ai
  names:
    categories: []
    kind: NodePool
    plural: nodepools
    shortNames: []
    singular: nodepool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.nodeName
      name: Node
      type: string
    - jsonPath: .status.externalIp
      name: External-IP
      type: string
    - jsonPath: .status.gpuModel
      name: GPU
      type: string
    - jsonPath: .status.gpuCount
      name: GPUs
      type: integer
    - jsonPath: .status.gpuMemoryGb
      name: VRAM
      type: integer
    - jsonPath: .metadata.labels.basilica\.ai/warm-pool
      name: Warm
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .spec.mode
      name: Mode
      priority: 1
      type: string
    - jsonPath: .status.provider
      name: Provider
      priority: 1
      type: string
    - jsonPath: .status.cudaVersion
      name: CUDA
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for NodePoolSpec via `CustomResource`
        properties:
          spec:
            description: NodePool represents a single GPU node in the cluster
            properties:
              adoptExisting:
                default: false
                description: If true and node already exists, adopt it instead of failing
                type: boolean
              datacenterId:
                description: Datacenter/owner identifier
                nullable: true
                type: string
              healthCheck:
                default:
                  enabled: true
                  failureThreshold: 5
                  intervalSeconds: 30
                  timeoutSeconds: 10
                description: Health check configuration
                properties:
                  enabled:
                    default: true
                    description: Enable health checks
                    type: boolean
                  failureThreshold:
                    default: 5
                    description: Number of failures before marking unhealthy
                    format: uint32
                    minimum: 0.0
                    type: integer
                  intervalSeconds:
                    default: 30
                    description: Check interval in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                  timeoutSeconds:
                    default: 10
                    description: Timeout for each check in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              k3s:
                description: K3s agent configuration
                properties:
                  extraArgs:
                    default: []
                    description: Additional K3s agent arguments
                    items:
                      type: string
                    type: array
                  nodeLabels:
                    additionalProperties:
                      type: string
                    default: {}
                    description: Labels to apply to the node
                    type: object
                  nodeTaints:
                    default: []
                    description: 'Taints to apply (format: key=value:effect)'
                    items:
                      type: string
                    type: array
                  serverUrl:
                    description: K3s API server URL
                    type: string
                  tokenSecretRef:
                    description: Reference to Secret containing K3s join token
                    properties:
                      key:
                        description: Key within secret (default varies by usage)
                        nullable: true
                        type: string
                      name:
                        description: Secret name
                        type: string
                      namespace:
                        description: Namespace of the secret (defaults to autoscaler namespace)
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  version:
                    description: K3s version (e.g., v1.31.1+k3s1)
                    nullable: true
                    type: string
                required:
                - serverUrl
                - tokenSecretRef
                type: object
              lifecycle:
                default:
                  deleteGracePeriodSeconds: 30
                  drainOnRemoval: true
                  drainTimeoutSeconds: 600
                  forceDrain: false
                description: Lifecycle hooks
                properties:
                  deleteGracePeriodSeconds:
                    default: 30
                    description: Delete grace period in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                  drainOnRemoval:
                    default: true
                    description: Drain node before removal
                    type: boolean
                  drainTimeoutSeconds:
                    default: 600
                    description: Drain timeout in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                  forceDrain:
                    default: false
                    description: Force drain (delete pods after timeout)
                    type: boolean
                  postJoinScript:
                    description: Script to run after K3s join (optional)
                    nullable: true
                    type: string
                  preJoinScript:
                    description: Script to run before K3s join (optional)
                    nullable: true
                    type: string
                type: object
              mode:
                description: 'Provisioning mode: Manual or Dynamic'
                enum:
                - Manual
                - Dynamic
                type: string
              nodeId:
                description: Unique node identifier (auto-generated if not provided)
                nullable: true
                type: string
              nodePassword:
                description: Node password reference for K3s re-registration
                nullable: true
                properties:
                  secretRef:
                    description: Reference to a Kubernetes Secret
                    properties:
                      key:
                        description: Key within secret (default varies by usage)
                        nullable: true
                        type: string
                      name:
                        description: Secret name
                        type: string
                      namespace:
                        description: Namespace of the secret (defaults to autoscaler namespace)
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                required:
                - secretRef
                type: object
              secureCloud:
                description: Secure Cloud configuration (required for Dynamic mode)
                nullable: true
                properties:
                  offeringId:
                    description: GPU offering ID from Basilica API
                    type: string
                  sshKeyId:
                    description: SSH key ID registered with provider
                    type: string
                  sshKeySecretRef:
                    description: Reference to Secret containing the corresponding private key
                    properties:
                      key:
                        description: Key within secret (default varies by usage)
                        nullable: true
                        type: string
                      name:
                        description: Secret name
                        type: string
                      namespace:
                        description: Namespace of the secret (defaults to autoscaler namespace)
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  sshUser:
                    default: ubuntu
                    description: 'SSH username for connecting to provisioned VMs (default: ubuntu)'
                    type: string
                required:
                - offeringId
                - sshKeyId
                - sshKeySecretRef
                type: object
              ssh:
                description: SSH configuration (required for Manual mode)
                nullable: true
                properties:
                  authSecretRef:
                    description: Reference to Secret containing SSH private key
                    properties:
                      key:
                        description: Key within secret (default varies by usage)
                        nullable: true
                        type: string
                      name:
                        description: Secret name
                        type: string
                      namespace:
                        description: Namespace of the secret (defaults to autoscaler namespace)
                        nullable: true
                        type: string
                    required:
                    - name
                    type: object
                  authType:
                    default: PrivateKey
                    description: Authentication type
                    enum:
                    - PrivateKey
                    - PrivateKeyPem
                    type: string
                  host:
                    description: IP address or hostname
                    type: string
                  port:
                    default: 22
                    description: 'SSH port (default: 22)'
                    format: uint16
                    minimum: 0.0
                    type: integer
                  user:
                    default: root
                    description: 'SSH username (default: root)'
                    type: string
                required:
                - authSecretRef
                - host
                type: object
              wireguard:
                default:
                  enabled: true
                description: WireGuard configuration
                properties:
                  enabled:
                    default: true
                    description: 'Enable WireGuard (default: true for remote nodes)'
                    type: boolean
                type: object
            required:
            - k3s
            - mode
            type: object
          status:
            description: NodePool status
            nullable: true
            properties:
              cleanupInProgress:
                default: false
                description: Cleanup in progress flag
                type: boolean
              conditions:
                default: []
                description: Kubernetes conditions
                items:
                  description: NodePool condition
                  properties:
                    lastProbeTime:
                      description: Last probe time
                      format: date-time
                      nullable: true
                      type: string
                    lastTransitionTime:
                      description: Last transition time
                      format: date-time
                      nullable: true
                      type: string
                    message:
                      description: Human-readable message
                      nullable: true
                      type: string
                    reason:
                      description: Machine-readable reason
                      nullable: true
                      type: string
                    status:
                      description: 'Status: True, False, Unknown'
                      type: string
                    type:
                      description: Condition type
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              cudaVersion:
                description: CUDA version
                nullable: true
                type: string
              driverVersion:
                description: Driver version
                nullable: true
                type: string
              externalIp:
                description: Public IP (for SSH)
                nullable: true
                type: string
              failureCount:
                default: 0
                description: Failure count
                format: uint32
                minimum: 0.0
                type: integer
              gpuCount:
                description: GPU count
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              gpuMemoryGb:
                description: GPU memory in GB
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              gpuModel:
                description: GPU model
                nullable: true
                type: string
              identityCheckDetails:
                description: Identity check details
                nullable: true
                type: string
              identityVerified:
                default: false
                description: Node identity verified
                type: boolean
              internalIp:
                description: WireGuard IP (internal)
                nullable: true
                type: string
              joinedAt:
                description: When node joined K3s cluster
                format: date-time
                nullable: true
                type: string
              labelsApplied:
                default: false
                description: Whether GPU labels have been applied to the K8s node. Used to track label application state and avoid race conditions.
                type: boolean
              lastError:
                description: Last error message
                nullable: true
                type: string
              lastHealthCheckAt:
                description: Last health check timestamp
                format: date-time
                nullable: true
                type: string
              managedBy:
                description: Management metadata
                enum:
                - Autoscaler
                - OnboardScript
                nullable: true
                type: string
              nodeId:
                description: Generated node ID (persisted for idempotency)
                nullable: true
                type: string
              nodeName:
                description: K3s node name
                nullable: true
                type: string
              nodeUid:
                description: K8s Node UID
                nullable: true
                type: string
              observedGeneration:
                description: Observed generation
                format: int64
                nullable: true
                type: integer
              offeringId:
                description: GPU offering ID (for dynamic mode)
                nullable: true
                type: string
              phase:
                description: Current phase
                enum:
                - Pending
                - Provisioning
                - Configuring
                - InstallingWireGuard
                - ValidatingNetwork
                - JoiningCluster
                - WaitingForNode
                - Ready
                - Unhealthy
                - Draining
                - Terminating
                - Failed
                - Deleted
                nullable: true
                type: string
              phaseEnteredAt:
                description: When current phase was entered
                format: date-time
                nullable: true
                type: string
              provider:
                description: Provider name
                nullable: true
                type: string
              providerId:
                description: Provider instance ID
                nullable: true
                type: string
              provisionedAt:
                description: When VM was leased (dynamic mode)
                format: date-time
                nullable: true
                type: string
              rentalId:
                description: Secure cloud rental ID (dynamic mode)
                nullable: true
                type: string
              retryAfter:
                description: When to retry after failure
                format: date-time
                nullable: true
                type: string
              wireguard:
                description: WireGuard status
                nullable: true
                properties:
                  endpoint:
                    description: Public endpoint
                    nullable: true
                    type: string
                  nodeIp:
                    description: WireGuard IP assigned by API
                    nullable: true
                    type: string
                  peers:
                    description: Peers from registration (used to configure WireGuard)
                    items:
                      description: WireGuard peer for status storage
                      properties:
                        endpoint:
                          type: string
                        publicKey:
                          type: string
                        routePodNetwork:
                          default: false
                          type: boolean
                        vpcSubnet:
                          type: string
                        wireguardIp:
                          type: string
                      required:
                      - endpoint
                      - publicKey
                      - vpcSubnet
                      - wireguardIp
                      type: object
                    type: array
                  publicKey:
                    description: Node's WireGuard public key
                    nullable: true
                    type: string
                type: object
            type: object
        required:
        - spec
        title: NodePool
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scalingpolicies.autoscaler.basilica.ai
spec:
  group: autoscaler.basilica.ai
  names:
    categories: []
    kind: ScalingPolicy
    plural: scalingpolicies
    shortNames: []
    singular: scalingpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .spec.minNodes
      name: Min
      type: integer
    - jsonPath: .spec.maxNodes
      name: Max
      type: integer
    - jsonPath: .status.currentNodes
      name: Current
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for ScalingPolicySpec via `CustomResource`
        properties:
          spec:
            description: ScalingPolicy defines the autoscaling behavior for the cluster
            properties:
              enabled:
                default: true
                description: Enable/disable autoscaling
                type: boolean
              imagePrepull:
                description: Image pre-pull configuration for faster container starts
                nullable: true
                properties:
                  enabled:
                    default: false
                    description: Enable/disable image pre-pulling
                    type: boolean
                  images:
                    default: []
                    description: Images to pre-pull on warm pool nodes
                    items:
                      description: Image to pre-pull on warm pool nodes
                      properties:
                        name:
                          description: Full image name with tag (e.g., "vllm/vllm-openai:latest")
                          type: string
                        sizeEstimateGb:
                          default: 0
                          description: Estimated image size in GB (used for capacity planning)
                          format: uint32
                          minimum: 0.0
                          type: integer
                      required:
                      - name
                      type: object
                    type: array
                type: object
              maxNodes:
                default: 10
                description: Maximum number of GPU nodes
                format: uint32
                minimum: 0.0
                type: integer
              metrics:
                default:
                  collectionIntervalSeconds: 30
                  evaluationIntervalSeconds: 60
                description: Metrics collection configuration
                properties:
                  collectionIntervalSeconds:
                    default: 30
                    description: Collection interval in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                  evaluationIntervalSeconds:
                    default: 60
                    description: Evaluation interval in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              minNodes:
                default: 0
                description: Minimum number of GPU nodes
                format: uint32
                minimum: 0.0
                type: integer
              nodeTemplate:
                description: Node template for dynamic provisioning
                nullable: true
                properties:
                  k3s:
                    description: K3s configuration
                    properties:
                      extraArgs:
                        default: []
                        description: Additional K3s agent arguments
                        items:
                          type: string
                        type: array
                      nodeLabels:
                        additionalProperties:
                          type: string
                        default: {}
                        description: Labels to apply to the node
                        type: object
                      nodeTaints:
                        default: []
                        description: 'Taints to apply (format: key=value:effect)'
                        items:
                          type: string
                        type: array
                      serverUrl:
                        description: K3s API server URL
                        type: string
                      tokenSecretRef:
                        description: Reference to Secret containing K3s join token
                        properties:
                          key:
                            description: Key within secret (default varies by usage)
                            nullable: true
                            type: string
                          name:
                            description: Secret name
                            type: string
                          namespace:
                            description: Namespace of the secret (defaults to autoscaler namespace)
                            nullable: true
                            type: string
                        required:
                        - name
                        type: object
                      version:
                        description: K3s version (e.g., v1.31.1+k3s1)
                        nullable: true
                        type: string
                    required:
                    - serverUrl
                    - tokenSecretRef
                    type: object
                  lifecycle:
                    default:
                      deleteGracePeriodSeconds: 30
                      drainOnRemoval: true
                      drainTimeoutSeconds: 600
                      forceDrain: false
                    description: Lifecycle configuration
                    properties:
                      deleteGracePeriodSeconds:
                        default: 30
                        description: Delete grace period in seconds
                        format: uint32
                        minimum: 0.0
                        type: integer
                      drainOnRemoval:
                        default: true
                        description: Drain node before removal
                        type: boolean
                      drainTimeoutSeconds:
                        default: 600
                        description: Drain timeout in seconds
                        format: uint32
                        minimum: 0.0
                        type: integer
                      forceDrain:
                        default: false
                        description: Force drain (delete pods after timeout)
                        type: boolean
                      postJoinScript:
                        description: Script to run after K3s join (optional)
                        nullable: true
                        type: string
                      preJoinScript:
                        description: Script to run before K3s join (optional)
                        nullable: true
                        type: string
                    type: object
                  secureCloud:
                    description: Secure Cloud configuration
                    nullable: true
                    properties:
                      datacenterId:
                        description: Datacenter ID for node registration (typically user ID)
                        type: string
                      gpuType:
                        description: Preferred GPU type (e.g., RTX_4090, A100) for dynamic selection
                        nullable: true
                        type: string
                      maxHourlyRate:
                        description: Maximum acceptable hourly rate for dynamic selection
                        format: double
                        nullable: true
                        type: number
                      minGpuCount:
                        default: 1
                        description: Minimum GPUs per node for dynamic selection
                        format: uint32
                        minimum: 0.0
                        type: integer
                      offeringId:
                        description: GPU offering ID from Basilica API. If not specified, the autoscaler will dynamically select an offering based on pending pod GPU requirements.
                        nullable: true
                        type: string
                      preferredProvider:
                        description: Preferred provider for dynamic selection
                        nullable: true
                        type: string
                      region:
                        description: Preferred region for dynamic selection
                        nullable: true
                        type: string
                      sshKeyId:
                        description: SSH key ID for provisioning
                        type: string
                      sshKeySecretRef:
                        description: Reference to Secret containing SSH private key
                        properties:
                          key:
                            description: Key within secret (default varies by usage)
                            nullable: true
                            type: string
                          name:
                            description: Secret name
                            type: string
                          namespace:
                            description: Namespace of the secret (defaults to autoscaler namespace)
                            nullable: true
                            type: string
                        required:
                        - name
                        type: object
                      sshUser:
                        default: ubuntu
                        description: 'SSH username for connecting to provisioned VMs (default: ubuntu)'
                        type: string
                    required:
                    - datacenterId
                    - sshKeyId
                    - sshKeySecretRef
                    type: object
                required:
                - k3s
                type: object
              offeringConstraints:
                description: Constraints for dynamic offering selection
                nullable: true
                properties:
                  allowModelFallback:
                    default: false
                    description: Allow fallback to any available offering when requested model not found When true, if exact model match fails, will select cheapest offering meeting GPU count and other constraints (ignoring model requirement)
                    type: boolean
                  fallbackOfferingId:
                    description: Fallback offering ID if no dynamic match found
                    nullable: true
                    type: string
                  maxHourlyRate:
                    description: Maximum acceptable hourly rate
                    format: double
                    nullable: true
                    type: number
                  providers:
                    default: []
                    description: Preferred providers (empty = any)
                    items:
                      type: string
                    type: array
                  regions:
                    description: Preferred regions (empty = any)
                    items:
                      type: string
                    nullable: true
                    type: array
                type: object
              scaleDown:
                default:
                  cooldownSeconds: 300
                  decrement: 1
                  gpuUtilizationThreshold: 10.0
                  idleTimeoutSeconds: 600
                  zeroPodsDurationSeconds: 300
                description: Scale-down configuration
                properties:
                  cooldownSeconds:
                    default: 300
                    description: Cooldown after scale-down in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                  decrement:
                    default: 1
                    description: Number of nodes to remove per scale-down event
                    format: uint32
                    minimum: 0.0
                    type: integer
                  gpuUtilizationThreshold:
                    default: 10.0
                    description: Scale down if GPU utilization below this percentage
                    format: float
                    type: number
                  idleTimeoutSeconds:
                    default: 600
                    description: Node must be idle for this duration (seconds)
                    format: uint32
                    minimum: 0.0
                    type: integer
                  zeroPodsDurationSeconds:
                    default: 300
                    description: Node has zero pods for this duration (seconds)
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              scaleUp:
                default:
                  cooldownSeconds: 300
                  increment: 1
                  pendingPodThreshold: 1
                description: Scale-up configuration
                properties:
                  cooldownSeconds:
                    default: 300
                    description: Cooldown after scale-up in seconds
                    format: uint32
                    minimum: 0.0
                    type: integer
                  increment:
                    default: 1
                    description: Number of nodes to add per scale-up event
                    format: uint32
                    minimum: 0.0
                    type: integer
                  pendingPodThreshold:
                    default: 1
                    description: Number of pending GPU pods to trigger scale-up
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              warmPool:
                description: Warm pool configuration for proactive capacity reservation
                nullable: true
                properties:
                  enabled:
                    default: false
                    description: Enable/disable warm pool
                    type: boolean
                  maxIdleCostPerHour:
                    default: 10.0
                    description: Maximum hourly spend on idle nodes (USD)
                    format: double
                    type: number
                  maxIdleNodes:
                    default: 3
                    description: Maximum idle nodes regardless of VRAM target
                    format: uint32
                    minimum: 0.0
                    type: integer
                  minIdleVramGb:
                    default: 80
                    description: 'Target idle VRAM capacity in GB. Example: 160 = 2x A100-80GB nodes or 2x H100-80GB nodes'
                    format: uint32
                    minimum: 0.0
                    type: integer
                  preferredGpuTypes:
                    default: []
                    description: Preferred GPU types for warm pool (in priority order)
                    items:
                      type: string
                    type: array
                  scaleDownThresholdPercent:
                    default: 120
                    description: 'Scale down when idle VRAM exceeds this percentage of target (default: 120)'
                    format: uint32
                    minimum: 0.0
                    type: integer
                  scaleUpThresholdPercent:
                    default: 80
                    description: 'Scale up when idle VRAM falls below this percentage of target (default: 80)'
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
            type: object
          status:
            description: ScalingPolicy status
            nullable: true
            properties:
              conditions:
                default: []
                description: Kubernetes conditions
                items:
                  description: ScalingPolicy condition
                  properties:
                    lastTransitionTime:
                      description: Last transition time
                      format: date-time
                      nullable: true
                      type: string
                    message:
                      description: Human-readable message
                      nullable: true
                      type: string
                    reason:
                      description: Machine-readable reason
                      nullable: true
                      type: string
                    status:
                      description: 'Status: True, False, Unknown'
                      type: string
                    type:
                      description: Condition type
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              currentNodes:
                default: 0
                description: Number of active NodePool CRs
                format: uint32
                minimum: 0.0
                type: integer
              desiredNodes:
                default: 0
                description: Target number based on demand
                format: uint32
                minimum: 0.0
                type: integer
              lastEvaluationTime:
                description: Last evaluation timestamp
                format: date-time
                nullable: true
                type: string
              lastScaleDownTime:
                description: Last scale-down timestamp
                format: date-time
                nullable: true
                type: string
              lastScaleUpTime:
                description: Last scale-up timestamp
                format: date-time
                nullable: true
                type: string
              metrics:
                description: Current metrics snapshot
                nullable: true
                properties:
                  averageGpuUtilization:
                    description: Average GPU utilization percentage (None when metrics unavailable)
                    format: float
                    nullable: true
                    type: number
                  healthyGpuNodes:
                    default: 0
                    description: Healthy GPU nodes
                    format: uint32
                    minimum: 0.0
                    type: integer
                  idleNodes:
                    default: 0
                    description: Number of idle nodes
                    format: uint32
                    minimum: 0.0
                    type: integer
                  pendingGpuPods:
                    default: 0
                    description: Number of pending GPU pods
                    format: uint32
                    minimum: 0.0
                    type: integer
                  totalGpuNodes:
                    default: 0
                    description: Total GPU nodes in cluster
                    format: uint32
                    minimum: 0.0
                    type: integer
                type: object
              observedGeneration:
                description: Observed generation
                format: int64
                nullable: true
                type: integer
              pendingScaleDown:
                default: 0
                description: Number of nodes being drained
                format: uint32
                minimum: 0.0
                type: integer
              pendingScaleUp:
                default: 0
                description: Number of nodes being provisioned
                format: uint32
                minimum: 0.0
                type: integer
              warmPool:
                description: Warm pool status (VRAM accounting and capacity info)
                nullable: true
                properties:
                  allocatedVramGb:
                    default: 0
                    description: Allocated VRAM (pods running on warm pool nodes) (GB)
                    format: uint32
                    minimum: 0.0
                    type: integer
                  estimatedHourlyCost:
                    default: 0.0
