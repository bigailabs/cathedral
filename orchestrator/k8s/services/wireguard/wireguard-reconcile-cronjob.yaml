---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wireguard-reconcile
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wireguard-reconcile
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wireguard-reconcile
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wireguard-reconcile
subjects:
- kind: ServiceAccount
  name: wireguard-reconcile
  namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wireguard-reconcile
  namespace: kube-system
  labels:
    app.kubernetes.io/name: wireguard-reconcile
    app.kubernetes.io/component: network-reconciliation
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: wireguard-reconcile
        spec:
          serviceAccountName: wireguard-reconcile
          restartPolicy: OnFailure
          hostNetwork: true
          hostPID: false
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: wireguard-reconcile
                topologyKey: kubernetes.io/hostname
          initContainers:
          - name: leader-election
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              LEASE_NAME="wireguard-reconcile-leader"
              LEASE_NS="kube-system"
              NODE_NAME="${HOSTNAME}"
              LEASE_DURATION=60

              acquire_lease() {
                  local now
                  now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  local renew_time
                  renew_time=$(date -u -d "+${LEASE_DURATION} seconds" +"%Y-%m-%dT%H:%M:%SZ")

                  if ! kubectl get lease "$LEASE_NAME" -n "$LEASE_NS" &>/dev/null; then
                      kubectl create -f - <<EOF
              apiVersion: coordination.k8s.io/v1
              kind: Lease
              metadata:
                name: $LEASE_NAME
                namespace: $LEASE_NS
              spec:
                holderIdentity: $NODE_NAME
                leaseDurationSeconds: $LEASE_DURATION
                acquireTime: "$now"
                renewTime: "$now"
              EOF
                      echo "Created lease, we are the leader"
                      exit 0
                  fi

                  local holder
                  holder=$(kubectl get lease "$LEASE_NAME" -n "$LEASE_NS" -o jsonpath='{.spec.holderIdentity}')
                  local last_renew
                  last_renew=$(kubectl get lease "$LEASE_NAME" -n "$LEASE_NS" -o jsonpath='{.spec.renewTime}')

                  if [ "$holder" = "$NODE_NAME" ]; then
                      kubectl patch lease "$LEASE_NAME" -n "$LEASE_NS" --type=merge -p "{\"spec\":{\"renewTime\":\"$now\"}}"
                      echo "We hold the lease, renewed"
                      exit 0
                  fi

                  local last_renew_epoch
                  last_renew_epoch=$(date -d "$last_renew" +%s 2>/dev/null || echo 0)
                  local now_epoch
                  now_epoch=$(date +%s)
                  local age=$((now_epoch - last_renew_epoch))

                  if [ $age -gt $LEASE_DURATION ]; then
                      kubectl patch lease "$LEASE_NAME" -n "$LEASE_NS" --type=merge \
                        -p "{\"spec\":{\"holderIdentity\":\"$NODE_NAME\",\"acquireTime\":\"$now\",\"renewTime\":\"$now\"}}"
                      echo "Lease expired, acquired leadership"
                      exit 0
                  fi

                  echo "Another node ($holder) holds the lease (age: ${age}s), skipping"
                  exit 1
              }

              acquire_lease
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 50m
                memory: 64Mi
          containers:
          - name: reconcile
            image: bitnami/kubectl:latest
            securityContext:
              privileged: true
              capabilities:
                add:
                - NET_ADMIN
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              METRICS_DIR="/var/lib/node-exporter/textfile"
              METRICS_FILE="${METRICS_DIR}/wireguard_reconcile.prom"

              log() {
                  echo "$(date -Iseconds) $1"
              }

              write_heartbeat_metric() {
                  local status="$1"
                  local changes="$2"
                  mkdir -p "$METRICS_DIR" 2>/dev/null || true
                  cat > "${METRICS_FILE}.tmp" <<EOF
              # HELP wireguard_reconcile_last_run_timestamp_seconds Unix timestamp of last reconcile run
              # TYPE wireguard_reconcile_last_run_timestamp_seconds gauge
              wireguard_reconcile_last_run_timestamp_seconds $(date +%s)

              # HELP wireguard_reconcile_success Whether the last reconcile succeeded (1=success, 0=failure)
              # TYPE wireguard_reconcile_success gauge
              wireguard_reconcile_success $status

              # HELP wireguard_reconcile_changes_total Number of changes made in last reconcile
              # TYPE wireguard_reconcile_changes_total gauge
              wireguard_reconcile_changes_total $changes
              EOF
                  mv "${METRICS_FILE}.tmp" "$METRICS_FILE" 2>/dev/null || true
              }

              reconcile_flannel() {
                  local changes=0
                  log "Reconciling Flannel VXLAN entries for GPU nodes"

                  local node_json
                  node_json=$(kubectl get nodes -o json 2>/dev/null) || {
                      log "ERROR: Failed to fetch node data"
                      return 1
                  }

                  echo "$node_json" | jq -r '
                      .items[] |
                      select(.metadata.labels["basilica.ai/wireguard"] == "true") |
                      select(.spec.podCIDR != null) |
                      "\(.status.addresses[] | select(.type == "InternalIP") | .address) \(.spec.podCIDR) \(.metadata.annotations["flannel.alpha.coreos.com/backend-data"] | fromjson | .VtepMAC // "unknown")"
                  ' 2>/dev/null | while IFS= read -r line; do
                      [ -z "$line" ] && continue

                      local wg_ip pod_cidr vtep_mac
                      wg_ip=$(echo "$line" | awk '{print $1}')
                      pod_cidr=$(echo "$line" | awk '{print $2}')
                      vtep_mac=$(echo "$line" | awk '{print $3}')

                      [ -z "$wg_ip" ] || [ -z "$pod_cidr" ] || [ "$vtep_mac" = "unknown" ] && continue

                      local vtep_ip
                      vtep_ip=$(echo "$pod_cidr" | sed 's|/.*||')

                      if ip route show "$pod_cidr" 2>/dev/null | grep -q "dev wg0"; then
                          log "  Removing incorrect wg0 route for $pod_cidr"
                          ip route del "$pod_cidr" dev wg0 2>/dev/null || true
                          ((changes++)) || true
                      fi

                      if ! ip route show "$pod_cidr" 2>/dev/null | grep -q "dev flannel.1"; then
                          log "  Adding Flannel route for $pod_cidr"
                          ip route add "$pod_cidr" via "$vtep_ip" dev flannel.1 onlink 2>/dev/null || \
                          ip route replace "$pod_cidr" via "$vtep_ip" dev flannel.1 onlink 2>/dev/null || true
                          ((changes++)) || true
                      fi

                      local current_fdb
                      current_fdb=$(bridge fdb show dev flannel.1 2>/dev/null | grep "$vtep_mac" | grep -oP 'dst \K[0-9.]+' | head -1)
                      if [ "$current_fdb" != "$wg_ip" ]; then
                          log "  Updating FDB entry for $vtep_mac -> $wg_ip"
                          bridge fdb replace "$vtep_mac" dev flannel.1 dst "$wg_ip" self permanent 2>/dev/null || true
                          ((changes++)) || true
                      fi

                      local current_neigh
                      current_neigh=$(ip neigh show dev flannel.1 2>/dev/null | grep "^$vtep_ip " | grep -oP 'lladdr \K[0-9a-f:]+')
                      if [ "$current_neigh" != "$vtep_mac" ]; then
                          log "  Updating neighbor entry for $vtep_ip -> $vtep_mac"
                          ip neigh replace "$vtep_ip" lladdr "$vtep_mac" dev flannel.1 nud permanent 2>/dev/null || true
                          ((changes++)) || true
                      fi
                  done

                  echo "$changes"
              }

              log "Starting WireGuard reconciliation"

              if ! ip link show wg0 &>/dev/null; then
                  log "ERROR: WireGuard interface wg0 not available"
                  write_heartbeat_metric 0 0
                  exit 1
              fi

              changes=$(reconcile_flannel) || {
                  log "ERROR: Reconciliation failed"
                  write_heartbeat_metric 0 0
                  exit 1
              }

              log "Reconciliation complete: $changes changes"
              write_heartbeat_metric 1 "$changes"
            volumeMounts:
            - name: host-run
              mountPath: /var/run
            - name: metrics
              mountPath: /var/lib/node-exporter/textfile
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
          volumes:
          - name: host-run
            hostPath:
              path: /var/run
              type: Directory
          - name: metrics
            hostPath:
              path: /var/lib/node-exporter/textfile
              type: DirectoryOrCreate
