---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wireguard-reconcile
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wireguard-reconcile
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: wireguard-reconcile
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: wireguard-reconcile
subjects:
- kind: ServiceAccount
  name: wireguard-reconcile
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wireguard-reconcile
  namespace: kube-system
  labels:
    app.kubernetes.io/name: wireguard-reconcile
    app.kubernetes.io/component: network-reconciliation
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wireguard-reconcile
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wireguard-reconcile
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: wireguard-reconcile
      hostNetwork: true
      hostPID: false
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 30
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: basilica.ai/control-plane-only
        operator: Exists
        effect: NoSchedule
      initContainers:
      - name: copy-kubectl
        image: bitnami/kubectl:latest
        command: ["cp", "/opt/bitnami/kubectl/bin/kubectl", "/shared/kubectl"]
        volumeMounts:
        - name: shared-bin
          mountPath: /shared
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      containers:
      - name: reconcile
        image: nicolaka/netshoot:latest
        securityContext:
          runAsUser: 0
          privileged: true
          capabilities:
            add:
            - NET_ADMIN
        env:
        - name: PATH
          value: "/shared:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: RECONCILE_INTERVAL
          value: "60"
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          METRICS_DIR="/var/lib/node-exporter/textfile"
          METRICS_FILE="${METRICS_DIR}/wireguard_reconcile.prom"
          RECONCILE_INTERVAL="${RECONCILE_INTERVAL:-60}"

          log() {
              echo "$(date -Iseconds) [${NODE_NAME}] $1" >&2
          }

          write_metrics() {
              local status="$1"
              local changes="$2"
              local gpu_nodes_total="$3"
              local gpu_nodes_healthy="$4"
              local gpu_nodes_flannel_missing="$5"

              mkdir -p "$METRICS_DIR" 2>/dev/null || true
              cat > "${METRICS_FILE}.tmp" <<EOF
          # HELP wireguard_reconcile_last_run_timestamp_seconds Unix timestamp of last reconcile run
          # TYPE wireguard_reconcile_last_run_timestamp_seconds gauge
          wireguard_reconcile_last_run_timestamp_seconds $(date +%s)

          # HELP wireguard_reconcile_success Whether the last reconcile succeeded (1=success, 0=failure)
          # TYPE wireguard_reconcile_success gauge
          wireguard_reconcile_success $status

          # HELP wireguard_reconcile_changes_total Number of changes made in last reconcile
          # TYPE wireguard_reconcile_changes_total gauge
          wireguard_reconcile_changes_total $changes

          # HELP wireguard_gpu_nodes_total Total number of GPU nodes with WireGuard label
          # TYPE wireguard_gpu_nodes_total gauge
          wireguard_gpu_nodes_total $gpu_nodes_total

          # HELP wireguard_gpu_nodes_healthy Number of GPU nodes with healthy flannel.1 interface
          # TYPE wireguard_gpu_nodes_healthy gauge
          wireguard_gpu_nodes_healthy $gpu_nodes_healthy

          # HELP wireguard_gpu_nodes_flannel_missing Number of GPU nodes missing flannel.1 interface
          # TYPE wireguard_gpu_nodes_flannel_missing gauge
          wireguard_gpu_nodes_flannel_missing $gpu_nodes_flannel_missing
          EOF
              mv "${METRICS_FILE}.tmp" "$METRICS_FILE" 2>/dev/null || true
          }

          check_gpu_node_flannel() {
              local wg_ip="$1"
              local node_name="$2"

              # Ping the VTEP IP (first IP in pod CIDR) through flannel.1
              # If we can reach the VTEP, flannel.1 is working on the GPU node
              local vtep_ip
              vtep_ip=$(echo "$3" | sed 's|/.*||')

              if ping -c 1 -W 2 "$vtep_ip" &>/dev/null; then
                  return 0
              fi

              # VTEP ping failed - check if we can at least reach the WireGuard IP
              if ping -c 1 -W 2 "$wg_ip" &>/dev/null; then
                  # WireGuard is up but VXLAN is broken - flannel.1 likely missing
                  log "WARNING: GPU node $node_name ($wg_ip) - WireGuard OK but VXLAN unreachable (flannel.1 may be missing)"
                  return 1
              fi

              # Both WireGuard and VXLAN unreachable - node may be completely down
              log "WARNING: GPU node $node_name ($wg_ip) - both WireGuard and VXLAN unreachable"
              return 2
          }

          reconcile_flannel() {
              local changes=0
              local gpu_nodes_total=0
              local gpu_nodes_healthy=0
              local gpu_nodes_flannel_missing=0

              log "Reconciling Flannel VXLAN entries for GPU nodes"

              local node_json
              node_json=$(/shared/kubectl get nodes -o json 2>/dev/null) || {
                  log "ERROR: Failed to fetch node data"
                  echo "0 0 0 0"
                  return 1
              }

              # Process each GPU node using process substitution to avoid subshell variable loss
              while IFS= read -r line; do
                  [ -z "$line" ] && continue

                  local node_name wg_ip pod_cidr vtep_mac
                  node_name=$(echo "$line" | awk '{print $1}')
                  wg_ip=$(echo "$line" | awk '{print $2}')
                  pod_cidr=$(echo "$line" | awk '{print $3}')
                  vtep_mac=$(echo "$line" | awk '{print $4}')

                  [ -z "$wg_ip" ] || [ -z "$pod_cidr" ] || [ "$vtep_mac" = "unknown" ] && continue

                  ((gpu_nodes_total++)) || true

                  local vtep_ip
                  vtep_ip=$(echo "$pod_cidr" | sed 's|/.*||')

                  # Check GPU node flannel.1 health
                  local flannel_status=0
                  check_gpu_node_flannel "$wg_ip" "$node_name" "$pod_cidr" || flannel_status=$?

                  if [ "$flannel_status" -eq 0 ]; then
                      ((gpu_nodes_healthy++)) || true
                  elif [ "$flannel_status" -eq 1 ]; then
                      ((gpu_nodes_flannel_missing++)) || true
                      log "ALERT: GPU node $node_name needs K3s agent restart to recreate flannel.1"
                  fi

                  # Reconcile local Flannel entries regardless of GPU node health
                  # This ensures the server is ready when the GPU node comes back

                  # Remove incorrect wg0 routes
                  if ip route show "$pod_cidr" 2>/dev/null | grep -q "dev wg0"; then
                      log "  Removing incorrect wg0 route for $pod_cidr"
                      ip route del "$pod_cidr" dev wg0 2>/dev/null || true
                      ((changes++)) || true
                  fi

                  # Add flannel.1 route if missing
                  if ! ip route show "$pod_cidr" 2>/dev/null | grep -q "dev flannel.1"; then
                      log "  Adding Flannel route for $pod_cidr via $vtep_ip"
                      ip route add "$pod_cidr" via "$vtep_ip" dev flannel.1 onlink 2>/dev/null || \
                      ip route replace "$pod_cidr" via "$vtep_ip" dev flannel.1 onlink 2>/dev/null || true
                      ((changes++)) || true
                  fi

                  # Update FDB entry if destination IP doesn't match
                  local current_fdb
                  current_fdb=$(bridge fdb show dev flannel.1 2>/dev/null | grep "$vtep_mac" | awk '{for(i=1;i<=NF;i++) if($i=="dst") print $(i+1)}' | head -1)
                  if [ "$current_fdb" != "$wg_ip" ]; then
                      log "  Updating FDB entry for $vtep_mac -> $wg_ip"
                      bridge fdb replace "$vtep_mac" dev flannel.1 dst "$wg_ip" self permanent 2>/dev/null || true
                      ((changes++)) || true
                  fi

                  # Update neighbor entry if MAC doesn't match
                  local current_neigh
                  current_neigh=$(ip neigh show dev flannel.1 2>/dev/null | grep "^$vtep_ip " | awk '{for(i=1;i<=NF;i++) if($i=="lladdr") print $(i+1)}')
                  if [ "$current_neigh" != "$vtep_mac" ]; then
                      log "  Updating neighbor entry for $vtep_ip -> $vtep_mac"
                      ip neigh replace "$vtep_ip" lladdr "$vtep_mac" dev flannel.1 nud permanent 2>/dev/null || true
                      ((changes++)) || true
                  fi
              done < <(echo "$node_json" | jq -r '
                  .items[] |
                  select(.metadata.labels["basilica.ai/wireguard"] == "true") |
                  select(.spec.podCIDR != null) |
                  "\(.metadata.name) \(.status.addresses[] | select(.type == "InternalIP") | .address) \(.spec.podCIDR) \(.metadata.annotations["flannel.alpha.coreos.com/backend-data"] | fromjson | .VtepMAC // "unknown")"
              ' 2>/dev/null)

              echo "$changes $gpu_nodes_total $gpu_nodes_healthy $gpu_nodes_flannel_missing"
          }

          main_loop() {
              log "Starting WireGuard reconciliation daemon on ${NODE_NAME}"
              log "Reconcile interval: ${RECONCILE_INTERVAL}s"

              # Initial startup delay with jitter to prevent thundering herd
              local jitter=$((RANDOM % 10))
              log "Startup jitter: ${jitter}s"
              sleep "$jitter"

              while true; do
                  if ! ip link show wg0 &>/dev/null; then
                      log "ERROR: WireGuard interface wg0 not available"
                      write_metrics 0 0 0 0 0
                      sleep "$RECONCILE_INTERVAL"
                      continue
                  fi

                  if ! ip link show flannel.1 &>/dev/null; then
                      log "ERROR: Flannel interface flannel.1 not available"
                      write_metrics 0 0 0 0 0
                      sleep "$RECONCILE_INTERVAL"
                      continue
                  fi

                  local result
                  result=$(reconcile_flannel) || {
                      log "ERROR: Reconciliation failed"
                      write_metrics 0 0 0 0 0
                      sleep "$RECONCILE_INTERVAL"
                      continue
                  }

                  local changes gpu_total gpu_healthy gpu_missing
                  changes=$(echo "$result" | awk '{print $1}')
                  gpu_total=$(echo "$result" | awk '{print $2}')
                  gpu_healthy=$(echo "$result" | awk '{print $3}')
                  gpu_missing=$(echo "$result" | awk '{print $4}')

                  # Default to 0 if empty
                  changes=${changes:-0}
                  gpu_total=${gpu_total:-0}
                  gpu_healthy=${gpu_healthy:-0}
                  gpu_missing=${gpu_missing:-0}

                  if [ "$changes" -gt 0 ]; then
                      log "Reconciliation complete: $changes changes, $gpu_total GPU nodes ($gpu_healthy healthy, $gpu_missing missing flannel.1)"
                  fi

                  write_metrics 1 "$changes" "$gpu_total" "$gpu_healthy" "$gpu_missing"

                  # Add jitter to interval to prevent fleet synchronization
                  local sleep_jitter=$((RANDOM % 5))
                  sleep $((RECONCILE_INTERVAL + sleep_jitter))
              done
          }

          cleanup() {
              log "Received shutdown signal, exiting gracefully"
              exit 0
          }

          trap cleanup SIGTERM SIGINT

          main_loop
        volumeMounts:
        - name: shared-bin
          mountPath: /shared
        - name: host-run
          mountPath: /var/run
        - name: metrics
          mountPath: /var/lib/node-exporter/textfile
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ip link show wg0 &>/dev/null && ip link show flannel.1 &>/dev/null"
          initialDelaySeconds: 30
          periodSeconds: 60
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ip link show wg0 &>/dev/null && ip link show flannel.1 &>/dev/null"
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 2
      volumes:
      - name: shared-bin
        emptyDir: {}
      - name: host-run
        hostPath:
          path: /var/run
          type: Directory
      - name: metrics
        hostPath:
          path: /var/lib/node-exporter/textfile
          type: DirectoryOrCreate
