apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-operator
  namespace: basilica-system
  labels:
    app: basilica-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basilica-operator
  template:
    metadata:
      labels:
        app: basilica-operator
    spec:
      serviceAccountName: basilica-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          # Replace with your published image reference
          image: ghcr.io/one-covenant/basilica/basilica-operator:k3_test
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: info
            # Enable metrics if your cluster supports metrics API
            - name: BASILICA_ENABLE_K8S_METRICS
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - name: metrics
              containerPort: 9400
          startupProbe:
            httpGet:
              path: /health
              port: 9400
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 9400
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 9400
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: cache
            mountPath: /var/cache
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: cache
        emptyDir:
          sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: basilica-operator
  namespace: basilica-system
  labels:
    app: basilica-operator
spec:
  selector:
    app: basilica-operator
  ports:
    - name: metrics
      port: 9400
      targetPort: 9400
