apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-envoy
  namespace: basilica-system
  labels:
    app: basilica-envoy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basilica-envoy
  template:
    metadata:
      labels:
        app: basilica-envoy
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - basilica-envoy
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.30-latest
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /etc/envoy/bootstrap.yaml
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8080
            - name: admin
              containerPort: 9901
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 2Gi
          volumeMounts:
            - name: bootstrap-config
              mountPath: /etc/envoy/bootstrap.yaml
              subPath: bootstrap.yaml
            - name: dynamic-config
              mountPath: /etc/envoy/dynamic
      volumes:
        - name: bootstrap-config
          configMap:
            name: basilica-envoy-config
            items:
              - key: bootstrap.yaml
                path: bootstrap.yaml
        - name: dynamic-config
          configMap:
            name: basilica-envoy-config
            items:
              - key: rds.yaml
                path: rds.yaml
              - key: cds.yaml
                path: cds.yaml
