apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: default-client-policy
  namespace: basilica-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: basilica-gateway
  timeout:
    http:
      requestReceivedTimeout: 300s
      idleTimeout: 3700s
