apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-httproutes-to-gateway
  namespace: basilica-system
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
  to:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: basilica-gateway
