# ReferenceGrants are now created dynamically by basilica-api
# when user namespaces (u-*) are created. This file documents the template.
#
# For existing namespaces, run: ./create-referencegrants-retroactive.sh
#
# Template (created per user namespace):
# apiVersion: gateway.networking.k8s.io/v1beta1
# kind: ReferenceGrant
# metadata:
#   name: allow-httproutes-{namespace}
#   namespace: basilica-system
# spec:
#   from:
#   - group: gateway.networking.k8s.io
#     kind: HTTPRoute
#     namespace: {user-namespace}
#   to:
#   - group: gateway.networking.k8s.io
#     kind: Gateway
#     name: basilica-gateway
