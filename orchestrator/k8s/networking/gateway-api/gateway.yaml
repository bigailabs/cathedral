apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: basilica-gateway
  namespace: basilica-system
  annotations:
    gateway.envoyproxy.io/external-traffic-policy: "Cluster"
spec:
  gatewayClassName: eg
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: gateway-proxy-config
  listeners:
  - name: http
    protocol: HTTP
    port: 8080
    allowedRoutes:
      namespaces:
        from: All
