---
# Ingress policy for Trivy Operator
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trivy-operator-ingress
  namespace: trivy-system
spec:
  podSelector:
    matchLabels:
      app: trivy-operator
  policyTypes:
    - Ingress
  ingress:
    # Prometheus scraping from basilica-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: basilica-system
      ports:
        - protocol: TCP
          port: 8080
    # Health checks from kubelet
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 9090
---
# Egress policy for Trivy Operator
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trivy-operator-egress
  namespace: trivy-system
spec:
  podSelector:
    matchLabels:
      app: trivy-operator
  policyTypes:
    - Egress
  egress:
    # K8s API server access
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Container registries (HTTPS)
    - to: []
      ports:
        - protocol: TCP
          port: 443
---
# Ingress policy for Falco DaemonSet (Prometheus scraping)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falco-ingress
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app: falco
  policyTypes:
    - Ingress
  ingress:
    # Prometheus scraping from basilica-system
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: basilica-system
      ports:
        - protocol: TCP
          port: 8765
    # Health checks from kubelet
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8765
---
# Egress policy for Falco DaemonSet
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falco-egress
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app: falco
  policyTypes:
    - Egress
  egress:
    # K8s API server access
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Falcosidekick communication
    - to:
        - podSelector:
            matchLabels:
              app: falcosidekick
      ports:
        - protocol: TCP
          port: 2801
---
# Network policies for Falcosidekick
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falcosidekick-egress
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app: falcosidekick
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow inbound from Falco pods
    - from:
        - podSelector:
            matchLabels:
              app: falco
      ports:
        - protocol: TCP
          port: 2801
  egress:
    # DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # External observability (Loki, Prometheus)
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 3100
        - protocol: TCP
          port: 9090
    # Basilica API webhook
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: basilica-system
      ports:
        - protocol: TCP
          port: 8080
