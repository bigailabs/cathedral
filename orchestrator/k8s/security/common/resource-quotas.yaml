---
# Resource quota for Trivy namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: trivy-quota
  namespace: trivy-system
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    pods: "20"
---
# Resource quota for Falco namespace
# Sized for up to 20 GPU nodes + 2 Falcosidekick replicas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: falco-quota
  namespace: falco
spec:
  hard:
    requests.cpu: "3"
    requests.memory: "8Gi"
    limits.cpu: "25"
    limits.memory: "24Gi"
    pods: "30"
---
# Limit range for Trivy containers
apiVersion: v1
kind: LimitRange
metadata:
  name: trivy-limits
  namespace: trivy-system
spec:
  limits:
    - max:
        cpu: "1"
        memory: "2Gi"
      min:
        cpu: "10m"
        memory: "32Mi"
      default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
      type: Container
---
# Limit range for Falco containers
apiVersion: v1
kind: LimitRange
metadata:
  name: falco-limits
  namespace: falco
spec:
  limits:
    - max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "50m"
        memory: "128Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      type: Container
