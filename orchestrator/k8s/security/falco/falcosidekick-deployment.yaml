---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: falcosidekick
  namespace: falco
  labels:
    app: falcosidekick
    app.kubernetes.io/name: falcosidekick
    app.kubernetes.io/part-of: basilica-security
spec:
  replicas: 2
  selector:
    matchLabels:
      app: falcosidekick
  template:
    metadata:
      labels:
        app: falcosidekick
    spec:
      serviceAccountName: falco

      securityContext:
        runAsNonRoot: true
        runAsUser: 1234
        fsGroup: 1234
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: falcosidekick
                topologyKey: kubernetes.io/hostname

      containers:
        - name: falcosidekick
          image: falcosecurity/falcosidekick:2.28.0
          imagePullPolicy: IfNotPresent

          env:
            - name: PROMETHEUS_EXTRALABELS
              value: "cluster=basilica-k3s,environment=production"
            - name: KUBERNETES_MINIMUMPRIORITY
              value: "warning"
            - name: DEBUG
              value: "false"
            # Webhook for automated response on CRITICAL alerts
            - name: WEBHOOK_ADDRESS
              value: "http://basilica-api.basilica-system.svc.cluster.local:8080/webhooks/security/falco"
            - name: WEBHOOK_MINIMUMPRIORITY
              value: "critical"
            - name: WEBHOOK_CUSTOMHEADERS
              value: "X-Falco-Source:falcosidekick"

          ports:
            - name: http
              containerPort: 2801

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

          startupProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 50Mi
---
apiVersion: v1
kind: Service
metadata:
  name: falcosidekick
  namespace: falco
  labels:
    app: falcosidekick
spec:
  selector:
    app: falcosidekick
  ports:
    - name: http
      port: 2801
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: falcosidekick
  namespace: falco
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: falcosidekick
