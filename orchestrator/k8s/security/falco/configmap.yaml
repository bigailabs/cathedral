apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-config
  namespace: falco
data:
  falco.yaml: |
    # Rules files
    rules_files:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/rules.d

    # Engine configuration - Modern eBPF (CO-RE) for K3s compatibility
    engine:
      kind: modern_ebpf
      modern_ebpf:
        cpus_for_each_buffer: 2
        buf_size_preset: 4

    # Watch for config changes
    watch_config_files: true

    # Buffering for performance
    buffered_outputs: true
    outputs_queue:
      capacity: 10000

    # Output rate limiting
    outputs:
      rate: 1
      max_burst: 10

    # Logging
    log_stderr: true
    log_syslog: false
    log_level: info

    # Priority threshold
    priority: info

    # Syscall event drops handling
    syscall_event_drops:
      actions:
        - log
        - alert
      rate: 0.03333
      max_burst: 10

    # gRPC for Falcosidekick
    grpc:
      enabled: true
      bind_address: "unix:///var/run/falco/falco.sock"
      threadiness: 0

    # HTTP server for health checks and metrics
    webserver:
      enabled: true
      listen_port: 8765
      k8s_healthz_endpoint: /healthz
      ssl_enabled: false
      threadiness: 0

    # Output format
    json_output: true
    json_include_output_property: true
    json_include_tags_property: true

    # HTTP output to Falcosidekick
    http_output:
      enabled: true
      url: "http://falcosidekick.falco.svc.cluster.local:2801"
      user_agent: "falco/0.39.2"

    # File output disabled (use Falcosidekick)
    file_output:
      enabled: false

    stdout_output:
      enabled: true

    syslog_output:
      enabled: false
