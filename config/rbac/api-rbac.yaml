apiVersion: v1
kind: ServiceAccount
metadata:
  name: basilica-api
  namespace: basilica-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: basilica-api
rules:
  # Namespace management for user deployments
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list"]

  # Read/exec into pods for logs/exec endpoints
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

  # Basilica CRDs (full CRUD for rentals and jobs)
  - apiGroups: ["basilica.ai"]
    resources: ["gpurentals"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: ["basilica.ai"]
    resources: ["gpurentals/status"]
    verbs: ["get"]
  - apiGroups: ["basilica.ai"]
    resources: ["basilicajobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: ["basilica.ai"]
    resources: ["basilicajobs/status"]
    verbs: ["get"]

  # UserDeployment CRD for K8s-based deployments
  - apiGroups: ["basilica.ai"]
    resources: ["userdeployments"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  - apiGroups: ["basilica.ai"]
    resources: ["userdeployments/status"]
    verbs: ["get", "watch"]

  # Core K8s resources for deployment management
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: basilica-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: basilica-api
subjects:
  - kind: ServiceAccount
    name: basilica-api
    namespace: basilica-system

