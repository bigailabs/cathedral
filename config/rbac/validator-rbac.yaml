apiVersion: v1
kind: ServiceAccount
metadata:
  name: basilica-validator
  namespace: basilica-validators
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: basilica-validator
rules:
  # Publish BasilicaNodeProfile and patch status
  - apiGroups: ["basilica.ai"]
    resources: ["basilicanodeprofiles"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["basilica.ai"]
    resources: ["basilicanodeprofiles/status"]
    verbs: ["patch", "update"]

  # Optional: create GpuRental CRs (if validator is allowed to submit rentals)
  - apiGroups: ["basilica.ai"]
    resources: ["gpurentals"]
    verbs: ["create", "get"]

  # Optional: apply labels/taints on Nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: basilica-validator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: basilica-validator
subjects:
  - kind: ServiceAccount
    name: basilica-validator
    namespace: basilica-validators

