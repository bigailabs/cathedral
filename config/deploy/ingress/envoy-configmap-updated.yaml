apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-envoy-config
  namespace: basilica-system
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: listener_http
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: user_deployments
                  domains: ["*"]
                  routes:
                  # Health check endpoint
                  - match:
                      prefix: "/health"
                    direct_response:
                      status: 200
                      body:
                        inline_string: "healthy"

                  # User deployment routes - affine-env
                  - match:
                      prefix: "/deployments/affine-env/"
                    route:
                      cluster: affine_env_cluster
                      prefix_rewrite: "/"
                      timeout: 300s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

                  # User deployment routes - agentgym-webshop
                  - match:
                      prefix: "/deployments/agentgym-webshop/"
                    route:
                      cluster: agentgym_webshop_cluster
                      prefix_rewrite: "/"
                      timeout: 300s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

                  # User deployment routes - my-nginx-test
                  - match:
                      prefix: "/deployments/my-nginx-test/"
                    route:
                      cluster: my_nginx_test_cluster
                      prefix_rewrite: "/"
                      timeout: 300s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

                  # User deployment routes - test-nginx
                  - match:
                      prefix: "/deployments/test-nginx/"
                    route:
                      cluster: test_nginx_cluster
                      prefix_rewrite: "/"
                      timeout: 300s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

                  # Fallback: dynamic forward proxy for external requests
                  - match:
                      prefix: "/"
                    route:
                      cluster: dynamic_forward_proxy_cluster
                      timeout: 0s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

              http_filters:
              - name: envoy.filters.http.dynamic_forward_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                  dns_cache_config:
                    name: dynamic_forward_proxy_cache
                    dns_lookup_family: V4_ONLY
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      # User deployment clusters - static K8s service endpoints
      - name: affine_env_cluster
        type: STRICT_DNS
        connect_timeout: 5s
        lb_policy: ROUND_ROBIN
        dns_lookup_family: V4_ONLY
        load_assignment:
          cluster_name: affine_env_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: affine-env-service.u-github-434149.svc.cluster.local
                    port_value: 8000
        health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"

      - name: agentgym_webshop_cluster
        type: STRICT_DNS
        connect_timeout: 5s
        lb_policy: ROUND_ROBIN
        dns_lookup_family: V4_ONLY
        load_assignment:
          cluster_name: agentgym_webshop_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: agentgym-webshop-service.u-github-434149.svc.cluster.local
                    port_value: 8000
        health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"

      - name: my_nginx_test_cluster
        type: STRICT_DNS
        connect_timeout: 5s
        lb_policy: ROUND_ROBIN
        dns_lookup_family: V4_ONLY
        load_assignment:
          cluster_name: my_nginx_test_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: my-nginx-test-service.u-github-434149.svc.cluster.local
                    port_value: 80
        health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/"

      - name: test_nginx_cluster
        type: STRICT_DNS
        connect_timeout: 5s
        lb_policy: ROUND_ROBIN
        dns_lookup_family: V4_ONLY
        load_assignment:
          cluster_name: test_nginx_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: test-nginx-service.u-github-434149.svc.cluster.local
                    port_value: 80
        health_checks:
        - timeout: 3s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/"

      # Dynamic forward proxy cluster for external traffic
      - name: dynamic_forward_proxy_cluster
        connect_timeout: 1s
        lb_policy: CLUSTER_PROVIDED
        cluster_type:
          name: envoy.clusters.dynamic_forward_proxy
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
            dns_cache_config:
              name: dynamic_forward_proxy_cache
              dns_lookup_family: V4_ONLY

    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
