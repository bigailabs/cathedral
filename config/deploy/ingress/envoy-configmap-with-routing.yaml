apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-envoy-config
  namespace: basilica-system
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: listener_http
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend_services
                  domains: ["*"]
                  routes:
                  # Affine evaluation service - route /affine to affine-service
                  - match:
                      prefix: "/affine/"
                    route:
                      cluster: affine_service
                      prefix_rewrite: "/"
                      timeout: 300s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

                  # Affine without trailing slash - redirect to /affine/
                  - match:
                      prefix: "/affine"
                      headers:
                        - name: ":path"
                          exact_match: "/affine"
                    redirect:
                      path_redirect: "/affine/"
                      response_code: MOVED_PERMANENTLY

                  # Health check endpoint for load balancer
                  - match:
                      prefix: "/health"
                    direct_response:
                      status: 200
                      body:
                        inline_string: "healthy"

                  # Fallback: dynamic forward proxy for other requests
                  - match:
                      prefix: "/"
                    route:
                      cluster: dynamic_forward_proxy_cluster
                      timeout: 0s
                      retry_policy:
                        retry_on: 5xx,connect-failure,refused-stream
                        num_retries: 2

              http_filters:
              - name: envoy.filters.http.dynamic_forward_proxy
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                  dns_cache_config:
                    name: dynamic_forward_proxy_cache
                    dns_lookup_family: V4_ONLY
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      # Static cluster for Affine service
      - name: affine_service
        type: STRICT_DNS
        connect_timeout: 5s
        lb_policy: ROUND_ROBIN
        dns_lookup_family: V4_ONLY
        load_assignment:
          cluster_name: affine_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: affine-service.affine-system.svc.cluster.local
                    port_value: 8000
        health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"

      # Dynamic forward proxy cluster (for other traffic)
      - name: dynamic_forward_proxy_cluster
        connect_timeout: 1s
        lb_policy: CLUSTER_PROVIDED
        cluster_type:
          name: envoy.clusters.dynamic_forward_proxy
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
            dns_cache_config:
              name: dynamic_forward_proxy_cache
              dns_lookup_family: V4_ONLY

    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
