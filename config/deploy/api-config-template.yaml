# ConfigMap for Basilica API configuration
# This is a TEMPLATE - substitute VALIDATOR_HOTKEY_SS58 before applying
apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-api-config
  namespace: basilica-system
data:
  # Validator hotkey (SS58 address) - REPLACE before deployment
  VALIDATOR_HOTKEY: "VALIDATOR_HOTKEY_SS58"
  # Network configuration
  BITTENSOR_NETWORK: "test"
  BITTENSOR_NETUID: "387"
  BITTENSOR_CHAIN_ENDPOINT: "wss://test.finney.opentensor.ai:443"
  # Rental backend
  RENTAL_BACKEND: "k8s"
---
# Example usage in deployment (uncomment and use in api-deployment.yaml if needed):
# envFrom:
#   - configMapRef:
#       name: basilica-api-config
