apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: basilica-gw
  namespace: u-test
spec:
  gatewayClassName: basilica-envoy-gc
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: SameNamespace
