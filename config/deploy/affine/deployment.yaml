apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine-service
  namespace: affine-system
  labels:
    app: affine-service
    app.kubernetes.io/name: affine
    app.kubernetes.io/component: evaluation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: affine-service
  template:
    metadata:
      labels:
        app: affine-service
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: affine
          image: ghcr.io/one-covenant/basilica-affine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: CHUTES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: affine-secrets
                  key: CHUTES_API_KEY
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      restartPolicy: Always
