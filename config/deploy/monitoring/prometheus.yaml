apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-prometheus-config
  namespace: basilica-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'basilica-api'
        static_configs:
          - targets: ['basilica-api.basilica-system.svc:9401']
      - job_name: 'basilica-operator'
        static_configs:
          - targets: ['basilica-operator.basilica-system.svc:9400']
      - job_name: 'basilica-validator'
        static_configs:
          - targets: ['basilica-validator.basilica-validators.svc:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-prometheus
  namespace: basilica-system
  labels:
    app: basilica-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basilica-prometheus
  template:
    metadata:
      labels:
        app: basilica-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: basilica-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: basilica-prometheus
  namespace: basilica-system
  labels:
    app: basilica-prometheus
spec:
  selector:
    app: basilica-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090

