apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-grafana-datasources
  namespace: basilica-system
  labels:
    app: basilica-grafana
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://basilica-prometheus.basilica-system.svc:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: basilica-grafana-dashboards
  namespace: basilica-system
  labels:
    app: basilica-grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'Basilica'
        orgId: 1
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
  basilica-overview.json: |
    {
      "uid": "basilica-overview",
      "title": "Basilica Overview",
      "schemaVersion": 36,
      "version": 1,
      "timezone": "",
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "API Requests per Second",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(basilica_api_http_requests_total[5m])) by (route, method)",
              "legendFormat": "{{route}} {{method}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Active Rentals",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(basilica_operator_active_rentals_total) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Job Reconciles per Second",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "sum(rate(basilica_operator_jobs_reconciles_total[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-grafana
  namespace: basilica-system
  labels:
    app: basilica-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basilica-grafana
  template:
    metadata:
      labels:
        app: basilica-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-json
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: basilica-grafana-datasources
        - name: dashboards
          configMap:
            name: basilica-grafana-dashboards
            items:
              - key: dashboards.yml
                path: dashboards.yml
        - name: dashboards-json
          configMap:
            name: basilica-grafana-dashboards
            items:
              - key: basilica-overview.json
                path: basilica-overview.json
---
apiVersion: v1
kind: Service
metadata:
  name: basilica-grafana
  namespace: basilica-system
  labels:
    app: basilica-grafana
spec:
  selector:
    app: basilica-grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000

