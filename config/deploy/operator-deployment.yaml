apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-operator
  namespace: basilica-system
  labels:
    app: basilica-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basilica-operator
  template:
    metadata:
      labels:
        app: basilica-operator
    spec:
      serviceAccountName: basilica-operator
      containers:
        - name: operator
          # Replace with your published image reference
          image: ghcr.io/one-covenant/basilica/basilica-operator:k3_test
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: info
            # Enable metrics if your cluster supports metrics API
            - name: BASILICA_ENABLE_K8S_METRICS
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - name: metrics
              containerPort: 9400
---
apiVersion: v1
kind: Service
metadata:
  name: basilica-operator
  namespace: basilica-system
  labels:
    app: basilica-operator
spec:
  selector:
    app: basilica-operator
  ports:
    - name: metrics
      port: 9400
      targetPort: 9400
