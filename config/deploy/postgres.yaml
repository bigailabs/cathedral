apiVersion: v1
kind: Secret
metadata:
  name: basilica-postgres-secret
  namespace: basilica-system
type: Opaque
data:
  # Base64 for "devpassword". Replace for real environments.
  POSTGRES_PASSWORD: ZGV2cGFzc3dvcmQ=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basilica-postgres
  namespace: basilica-system
  labels:
    app: basilica-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basilica-postgres
  template:
    metadata:
      labels:
        app: basilica-postgres
    spec:
      # Allow postgres to run on control plane nodes
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: basilica
            - name: POSTGRES_USER
              value: basilica
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: basilica-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: basilica-postgres
  namespace: basilica-system
  labels:
    app: basilica-postgres
spec:
  selector:
    app: basilica-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432

