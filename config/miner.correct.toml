[bittensor]
wallet_name = "test_miner"
hotkey_name = "default"
network = "finney"
netuid = 39
weight_interval_secs = 300
coldkey_name = "default"
external_ip = "185.216.22.185"
axon_port = 8080
max_weight_uids = 256
skip_registration = false

[database]
url = "sqlite:///opt/basilica/data/miner.db"
max_connections = 10
min_connections = 1
run_migrations = true
connect_timeout = 30
idle_timeout = 600
max_lifetime = 3600

[server]
host = "0.0.0.0"
advertised_host = "185.216.22.185"
advertised_port = 8080
port = 8080
max_connections = 1000
advertised_tls = false
tls_enabled = false
request_timeout = 30
keep_alive_timeout = 60

[logging]
level = "debug"
format = "pretty"
stdout = true
max_file_size = 104857600
max_files = 5

[logging.targets]

[metrics]
enabled = true
collection_interval = 30
retention_period = 604800

[metrics.prometheus]
host = "127.0.0.1"
port = 9090
path = "/metrics"

[metrics.default_labels]

[validator_comms]
max_concurrent_sessions = 100
request_timeout = 30

[validator_comms.auth]
enabled = true
method = "bittensor_signature"

[validator_comms.auth.token_validation]
validate_issuer = true
validate_audience = true
validate_expiration = true
clock_skew_tolerance = 60

[validator_comms.rate_limit]
enabled = true
requests_per_second = 10
burst_capacity = 20
window_duration = 60

[executor_management]
executors = [
  { grpc_address = "160.202.129.13:50051", host = "160.202.129.13", port = 50051, ssh_username = "shadeform", ssh_port = 22, enabled = true },
]
max_retry_attempts = 3
auto_recovery = true
health_check_interval = 60
health_check_timeout = 10

[security]
enable_mtls = false
jwt_secret = "0f340697e18b0c88329c8d3366b867d5d02bff18089e62f0a12adffd24cabd3e"
verify_signatures = true
private_key_file = "~/.basilca/private_key"
token_expiration = 3600

[ssh_session]
miner_executor_key_path = "~/.ssh/miner_executor_key"
default_executor_username = "executor"
max_sessions_per_validator = 5
session_rate_limit = 200
enable_audit_log = true
audit_log_path = "./data/ssh_audit.log"
enable_automated_sessions = true
max_session_duration = 3600
enable_session_expiration = true
enable_key_cleanup = true
ssh_retry_attempts = 3
session_cleanup_interval = 60
ssh_connection_timeout = 30
ssh_command_timeout = 60
key_cleanup_interval = 300
rate_limit_window = 3600
ssh_retry_delay = 2

[validator_assignment]
enabled = true
strategy = "highest_stake"
min_stake_threshold = 6000.0
validator_hotkey = "5G3qVaXzKMPDm5AJ3dpzbpUC27kpccBvDwzSWXrq8M6qMmbC"

[advertised_addresses]

grpc_endpoint = "http://185.216.22.185:8080"
axon_endpoint = "http://185.216.22.185:8080"
metrics_endpoint = "http://185.216.22.185:9090"