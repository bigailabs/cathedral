name: Build Operator Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to apply to operator image"
        required: true
        default: "k3_test"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-operator:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          # Sanitize accidental "TAG=..." input
          if [[ "$TAG" == TAG=* ]]; then TAG="${TAG#TAG=}"; fi
          if [[ -z "$TAG" ]]; then TAG="k3_test"; fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Building operator image with tag: $TAG"

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build operator image
        run: |
          chmod +x scripts/operator/build.sh
          ./scripts/operator/build.sh \
            --image-name ghcr.io/one-covenant/basilica-operator \
            --image-tag "$TAG"

      - name: Push operator image
        run: |
          chmod +x scripts/operator/push.sh
          ./scripts/operator/push.sh \
            --source-image ghcr.io/one-covenant/basilica-operator \
            --target-image ghcr.io/one-covenant/basilica-operator \
            --tag "$TAG"

      - name: Summary
        run: |
          echo "✅ Operator image built and pushed successfully"
          echo "Image: ghcr.io/one-covenant/basilica-operator:$TAG"
          echo ""
          echo "To use this image in your cluster, update your operator deployment:"
          echo "  kubectl set image deployment/basilica-operator \\"
          echo "    basilica-operator=ghcr.io/one-covenant/basilica-operator:$TAG \\"
          echo "    -n basilica-system"
