services:
  miner:
    image: ghcr.io/one-covenant/basilica/miner:latest
    container_name: basilica-miner
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"  # Enable automatic updates via Watchtower

    environment:
      - RUST_LOG=debug           # Log level: trace, debug, info, warn, error
      - RUST_BACKTRACE=1          # Enable stack traces for debugging

    volumes:
      - /opt/basilica/config/miner.toml:/opt/basilica/config/miner.toml:ro  # Miner configuration file
      - /opt/basilica/data:/opt/basilica/data:rw                            # SQLite database and persistent data
      - ~/.ssh:/root/.ssh:ro                                                 # SSH keys for GPU node access
      - ~/.bittensor:/root/.bittensor:ro                                     # Bittensor wallet (read-only for security)
      - /var/log/basilica:/var/log/basilica:rw                              # Application logs

    ports:
      - "8080:8080"     # gRPC server for validator communications (config: validator_comms.port)
      - "9090:9090"     # Prometheus metrics endpoint (config: metrics.prometheus.port)

    dns:
      - 1.1.1.1        # Cloudflare DNS (primary)
      - 1.0.0.1        # Cloudflare DNS (secondary)

    networks:
      - basilica_network

    command: ["--config", "/opt/basilica/config/miner.toml"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  watchtower:
    image: containrrr/watchtower
    container_name: basilica-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300      # Check for updates every 5 minutes
      - WATCHTOWER_LABEL_ENABLE=true      # Only update containers with watchtower.enable label
    dns:
      - 1.1.1.1        # Cloudflare DNS (primary)
      - 1.0.0.1        # Cloudflare DNS (secondary)
    command: --label-enable --cleanup --interval 300

networks:
  basilica_network:
    driver: bridge
