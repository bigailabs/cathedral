services:
  miner:
    image: ghcr.io/one-covenant/basilica/miner:latest
    container_name: cathedral-miner
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"  # Enable automatic updates via Watchtower

    environment:
      - RUST_LOG=debug           # Log level: trace, debug, info, warn, error
      - RUST_BACKTRACE=1          # Enable stack traces for debugging

    volumes:
      - ./config/miner.toml:/var/lib/cathedral/miner/miner.toml:ro       # Miner configuration file
      - ./data:/var/lib/cathedral/miner/data:rw                          # SQLite database and persistent data
      - ~/.ssh:/var/lib/cathedral/miner/.ssh:ro                          # SSH keys for GPU executor access
      - ~/.bittensor:/var/lib/cathedral/miner/.bittensor:ro              # Bittensor wallet (read-only for security)
      - ./log:/var/lib/cathedral/miner/log:rw                            # Application logs

    ports:
      - "8080:8080"     # gRPC server for validator communications
      - "8091:8091"     # Bittensor axon server port
      - "9090:9090"     # Prometheus metrics endpoint

    dns:
      - 1.1.1.1        # Cloudflare DNS (primary)
      - 1.0.0.1        # Cloudflare DNS (secondary)

    networks:
      - cathedral_network

    command: ["--config", "/var/lib/cathedral/miner/miner.toml"]

    healthcheck:
      test: ["CMD", "pgrep", "-f", "cathedral-miner"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  watchtower:
    image: nickfedor/watchtower:1.14.0
    container_name: cathedral-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300      # Check for updates every 5 minutes
      - WATCHTOWER_LABEL_ENABLE=true      # Only update containers with watchtower.enable label
    dns:
      - 1.1.1.1        # Cloudflare DNS (primary)
      - 1.0.0.1        # Cloudflare DNS (secondary)
    command: --label-enable --cleanup --interval 300

networks:
  cathedral_network:
    driver: bridge
