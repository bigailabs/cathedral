# Global defaults for Basilica K3s + E2E setup

# K3s
k3s_channel: stable               # e.g., stable, v1.29
k3s_disable_traefik: true         # disable built-in Traefik (we use Envoy/Gateway)
k3s_server_exec_args: >-
  --disable traefik
  --write-kubeconfig-mode 644
  --tls-san {{ hostvars[groups['k3s_server'][0]]['ansible_host'] | default(inventory_hostname) }}

# Agents can add custom args (e.g., taints/labels)
k3s_agent_exec_args: >-
  --node-label basilica.io/workloads-only=true

# Install Rust toolchain on the K3s server host (for generating CRDs or building tools)
install_rust: true

# E2E readiness
tenant_namespace: u-test

# Image refs (override with your registry)
operator_image: ghcr.io/one-covenant/basilica-operator:latest
api_image: ghcr.io/one-covenant/basilica-api:latest

# API config overrides
api_hotkey: ""                    # set to your validator hotkey if required
api_database_url: postgres://basilica:devpassword@basilica-postgres.basilica-system.svc.cluster.local:5432/basilica

# Toggles
install_envoy_forward_proxy: true   # apply forward proxy (config/deploy/ingress/*)
install_gateway_api: true           # apply Gateway API bits (config/deploy/gateway/*)
install_monitoring_stack: false     # apply optional monitoring (Prometheus/Grafana)

# CRD generation
generate_crds: true
# Command used locally to generate CRDs; output redirected to {{ crds_output }}
crdgen_cmd: cargo run -p basilica-operator --bin crdgen
crds_output: build/basilica-crds.yaml

# Path to repo root on the control machine (auto-detected in playbook)
repo_root: ""

# Use templates for operator/api manifests instead of in-place edits
use_templates: true

# Run an ephemeral port-forward + /health probe for the API
run_smoke_probe: true

# Generate a dev API key and insert it into Postgres automatically
generate_api_key: true
api_key_user: test
api_key_name: k3s
api_key_scopes:
  - rentals:*
  - jobs:*

# Long-lived port-forward systemd service (optional)
port_forward:
  enabled: false
  namespace: basilica-system
  resource_kind: deploy
  resource_name: basilica-api
  local_port: 8000
  remote_port: 8000
  bind_address: 127.0.0.1

# Long-lived Postgres port-forward
postgres_forward:
  enabled: false
  namespace: basilica-system
  resource_kind: svc
  resource_name: basilica-postgres
  local_port: 5432
  remote_port: 5432
  bind_address: 127.0.0.1

# Long-lived Envoy HTTP forward proxy port-forward
envoy_forward:
  enabled: false
  namespace: basilica-system
  resource_kind: svc
  resource_name: basilica-envoy
  local_port: 8080
  remote_port: 8080
  bind_address: 127.0.0.1

# Optional Envoy admin (9901)
envoy_admin_forward:
  enabled: false
  namespace: basilica-system
  resource_kind: svc
  resource_name: basilica-envoy
  local_port: 9901
  remote_port: 9901
  bind_address: 127.0.0.1
