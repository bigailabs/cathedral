---
# Default variables for basilica-storage role
# These can be overridden via:
#   1. Ansible Vault variables (vault_basilica_*) - RECOMMENDED for production
#   2. Environment variables (BASILICA_*) - Good for development
#   3. Playbook vars - For programmatic configuration

# R2 Backend (default: r2, can be: r2, s3, gcs)
# Priority: vault > env > default
basilica_r2_backend: "{{ vault_basilica_r2_backend | default(lookup('env', 'BASILICA_R2_BACKEND') | default('r2', true), true) }}"

# R2 Bucket name (REQUIRED)
basilica_r2_bucket: "{{ vault_basilica_r2_bucket | default(lookup('env', 'BASILICA_R2_BUCKET') | default('', true), true) }}"

# R2 Endpoint (REQUIRED for R2, optional for S3)
# Format: https://account-id.r2.cloudflarestorage.com
basilica_r2_endpoint: "{{ vault_basilica_r2_endpoint | default(lookup('env', 'BASILICA_R2_ENDPOINT') | default('', true), true) }}"

# R2 Access Key ID (REQUIRED)
basilica_r2_access_key_id: "{{ vault_basilica_r2_access_key_id | default(lookup('env', 'BASILICA_R2_ACCESS_KEY_ID') | default('', true), true) }}"

# R2 Secret Access Key (REQUIRED)
basilica_r2_secret_access_key: "{{ vault_basilica_r2_secret_access_key | default(lookup('env', 'BASILICA_R2_SECRET_ACCESS_KEY') | default('', true), true) }}"

# Enable persistent storage (set to true to deploy credentials)
basilica_enable_persistent_storage: "{{ vault_basilica_enable_persistent_storage | default(lookup('env', 'BASILICA_ENABLE_PERSISTENT_STORAGE') | default(false, true), true) }}"
