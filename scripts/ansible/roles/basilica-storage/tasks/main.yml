---
# Basilica Storage Role - Deploy R2 Credentials Secret
# This role creates a Kubernetes Secret containing validator-managed R2 credentials
# for the Basilica FUSE-based persistent storage layer.

- name: Check if R2 credentials secret already exists
  ansible.builtin.shell: |
    kubectl get secret basilica-r2-credentials -n basilica-system --ignore-not-found -o name
  register: existing_r2_secret
  changed_when: false
  failed_when: false

- name: Skip if R2 credentials already deployed
  ansible.builtin.debug:
    msg: "✅ R2 credentials secret already exists - skipping deployment"
  when: existing_r2_secret.stdout != ""

- name: Deploy R2 credentials
  when: existing_r2_secret.stdout == ""
  block:
    - name: Check if R2 credentials are provided
      ansible.builtin.assert:
        that:
          - basilica_r2_access_key_id is defined
          - basilica_r2_access_key_id | length > 0
          - basilica_r2_secret_access_key is defined
          - basilica_r2_secret_access_key | length > 0
          - basilica_r2_bucket is defined
          - basilica_r2_bucket | length > 0
        fail_msg: "R2 credentials not provided. Set BASILICA_R2_ACCESS_KEY_ID, BASILICA_R2_SECRET_ACCESS_KEY, and BASILICA_R2_BUCKET environment variables."
        success_msg: "R2 credentials validated"

    - name: Display R2 configuration (masked)
      ansible.builtin.debug:
        msg:
          - "R2 Backend: {{ basilica_r2_backend }}"
          - "R2 Bucket: {{ basilica_r2_bucket }}"
          - "R2 Endpoint: {{ basilica_r2_endpoint }}"
          - "R2 Access Key ID: {{ basilica_r2_access_key_id[:8] }}... (masked)"

    - name: Create basilica-system namespace
      ansible.builtin.shell: |
        kubectl create namespace basilica-system --dry-run=client -o yaml | kubectl apply -f -
      changed_when: false

    - name: Create R2 credentials secret
      ansible.builtin.shell: |
        kubectl create secret generic basilica-r2-credentials \
          --namespace=basilica-system \
          --from-literal=STORAGE_ACCESS_KEY_ID="{{ basilica_r2_access_key_id }}" \
          --from-literal=STORAGE_SECRET_ACCESS_KEY="{{ basilica_r2_secret_access_key }}" \
          --from-literal=STORAGE_BUCKET="{{ basilica_r2_bucket }}" \
          --from-literal=STORAGE_ENDPOINT="{{ basilica_r2_endpoint }}" \
          --from-literal=STORAGE_BACKEND="{{ basilica_r2_backend }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      register: secret_create_result
      changed_when: "'configured' in secret_create_result.stdout or 'created' in secret_create_result.stdout"

    - name: Label R2 credentials secret
      ansible.builtin.shell: |
        kubectl label secret basilica-r2-credentials \
          -n basilica-system \
          app.kubernetes.io/name=basilica \
          app.kubernetes.io/component=storage \
          app.kubernetes.io/managed-by=ansible \
          --overwrite
      changed_when: false

    - name: Create RBAC role for storage secret access
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: basilica-storage-secret-reader
          namespace: basilica-system
          labels:
            app.kubernetes.io/name: basilica
            app.kubernetes.io/component: storage
        rules:
          - apiGroups: [""]
            resources: ["secrets"]
            resourceNames: ["basilica-r2-credentials"]
            verbs: ["get", "list"]
        EOF
      changed_when: false

    - name: Create RBAC role binding for operator service account
      ansible.builtin.shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: basilica-operator-storage-secret
          namespace: basilica-system
          labels:
            app.kubernetes.io/name: basilica
            app.kubernetes.io/component: storage
        subjects:
          - kind: ServiceAccount
            name: basilica-operator
            namespace: basilica-system
        roleRef:
          kind: Role
          name: basilica-storage-secret-reader
          apiGroup: rbac.authorization.k8s.io
        EOF
      changed_when: false

    - name: Verify secret was created
      ansible.builtin.shell: |
        kubectl get secret basilica-r2-credentials -n basilica-system -o jsonpath='{.metadata.name}'
      register: secret_verify
      changed_when: false
      failed_when: secret_verify.stdout != "basilica-r2-credentials"

    - name: Display secret creation status
      ansible.builtin.debug:
        msg: "✅ R2 credentials secret created successfully in basilica-system namespace"
      when: secret_verify.stdout == "basilica-r2-credentials"

    - name: Display next steps
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✅ Basilica Storage Configuration Complete"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Secret: basilica-r2-credentials"
          - "Namespace: basilica-system"
          - "Backend: {{ basilica_r2_backend }}"
          - "Bucket: {{ basilica_r2_bucket }}"
          - ""
          - "Next steps:"
          - "1. Deploy operator with storage daemon support"
          - "2. Submit jobs with persistent.enabled: true"
          - "3. Data will automatically sync to R2 every 1 second"
          - ""
          - "Example job manifest:"
          - "  storage:"
          - "    persistent:"
          - "      enabled: true"
