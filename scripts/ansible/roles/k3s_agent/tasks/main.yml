- name: Ensure dependencies present
  ansible.builtin.package:
    name:
      - curl
      - ca-certificates
    state: present
  become: true

- name: Check if K3s agent is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s-agent-uninstall.sh
  register: k3s_agent_uninstall

- name: Verify K3s server is reachable on port 6443
  ansible.builtin.wait_for:
    host: "{{ k3s_server_address }}"
    port: 6443
    timeout: 30
    state: started
  when: not k3s_agent_uninstall.stat.exists

- name: Install K3s agent
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ k3s_server_address }}:6443 K3S_TOKEN={{ k3s_server_token | quote }} INSTALL_K3S_CHANNEL={{ k3s_channel | quote }} INSTALL_K3S_EXEC="agent {{ k3s_agent_exec_args }}" sh -
  args:
    executable: /bin/bash
  become: true
  when: not k3s_agent_uninstall.stat.exists
  async: 300
  poll: 10
  register: k3s_agent_install_result

- name: Display K3s agent installation output on failure
  ansible.builtin.debug:
    var: k3s_agent_install_result
  when: k3s_agent_install_result is defined and k3s_agent_install_result.failed | default(false)

- name: Ensure k3s-agent service is enabled and running
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
  become: true

- name: Create kubectl symlink on agent
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
  become: true

- name: Verify kubectl is available on agent
  ansible.builtin.command: kubectl version --client
  changed_when: false
  register: kubectl_verify_agent
  become: true

