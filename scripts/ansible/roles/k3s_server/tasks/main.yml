- name: Ensure dependencies present
  ansible.builtin.package:
    name:
      - curl
      - ca-certificates
    state: present
  become: true

- name: Install build dependencies for Rust (optional)
  ansible.builtin.package:
    name:
      - build-essential
      - pkg-config
      - libssl-dev
      - clang
      - mold
      - protobuf-compiler
    state: present
  become: true
  when: install_rust | default(false) | bool

- name: Check if cargo is already installed for the remote user
  become: true
  become_user: "{{ ansible_user | default(ansible_ssh_user) }}"
  ansible.builtin.shell: |
    set -euo pipefail
    if command -v cargo >/dev/null 2>&1; then echo present; else echo absent; fi
  args:
    executable: /bin/bash
  register: cargo_check
  changed_when: false
  failed_when: false
  when: install_rust | default(false) | bool

- name: Install Rust toolchain via rustup (remote user)
  become: true
  become_user: "{{ ansible_user | default(ansible_ssh_user) }}"
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user | default(ansible_ssh_user) }}"
    USER: "{{ ansible_user | default(ansible_ssh_user) }}"
  when: install_rust | default(false) | bool and (cargo_check.stdout | default('absent')) != 'present'

- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install K3s server
  ansible.builtin.shell: |
    set -euo pipefail
    curl -sfL https://get.k3s.io | INSTALL_K3S_CHANNEL={{ k3s_channel | quote }} INSTALL_K3S_EXEC="server {{ k3s_server_exec_args }}" sh -
  args:
    executable: /bin/bash
  become: true
  when: not k3s_bin.stat.exists

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started
  become: true

- name: Read K3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_file
  become: true

- name: Set fact with K3s token
  ansible.builtin.set_fact:
    k3s_server_token: "{{ k3s_token_file['content'] | b64decode | trim }}"

- name: Ensure kubeconfig is readable by remote user
  ansible.builtin.file:
    path: /etc/rancher/k3s/k3s.yaml
    mode: '0644'
  become: true

- name: Create ~/.kube for remote user
  ansible.builtin.file:
    path: "/home/{{ ansible_user | default(ansible_ssh_user) }}/.kube"
    state: directory
    mode: '0755'
  become: true

- name: Copy kubeconfig to remote user home
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user | default(ansible_ssh_user) }}/.kube/config"
    remote_src: true
    mode: '0644'
  become: true
