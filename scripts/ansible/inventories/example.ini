[k3s_server]
# Single-node K3s server (AWS EC2 example)
# Connects like: ssh -i "~/.ssh/sam.pem" ubuntu@ec2-3-145-214-54.us-east-2.compute.amazonaws.com
server ansible_host=ec2-3-145-214-54.us-east-2.compute.amazonaws.com ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/sam.pem ansible_become=true

[k3s_agents]
# Optional agents
#agent1 ansible_host=192.0.2.11 ansible_user=ubuntu ansible_become=true
#agent2 ansible_host=192.0.2.12 ansible_user=ubuntu ansible_become=true
