---
- name: Fetch K3s kubeconfig for local use
  hosts: k3s_server
  gather_facts: true
  become: false
  vars:
    local_kubeconfig_dir: "{{ lookup('env', 'HOME') }}/.kube"
    local_kubeconfig_path: "{{ local_kubeconfig_dir }}/k3s-basilica-config"
  tasks:
    - name: Get server public IP
      ansible.builtin.shell: |
        set -euo pipefail
        curl -s ifconfig.me || curl -s icanhazip.com || echo "{{ ansible_host }}"
      args:
        executable: /bin/bash
      register: server_public_ip
      changed_when: false

    - name: Set public IP fact
      ansible.builtin.set_fact:
        k3s_public_ip: "{{ server_public_ip.stdout | trim }}"

    - name: Display detected public IP
      ansible.builtin.debug:
        msg: "Detected K3s server public IP: {{ k3s_public_ip }}"

    - name: Create local .kube directory
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ local_kubeconfig_dir }}"
        state: directory
        mode: '0700'

    - name: Fetch kubeconfig from K3s server
      become: true
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ local_kubeconfig_path }}"
        flat: yes

    - name: Update server address in kubeconfig
      delegate_to: localhost
      run_once: true
      ansible.builtin.replace:
        path: "{{ local_kubeconfig_path }}"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ k3s_public_ip }}:6443"

    - name: Also replace any other localhost references
      delegate_to: localhost
      run_once: true
      ansible.builtin.replace:
        path: "{{ local_kubeconfig_path }}"
        regexp: 'https://.*:6443'
        replace: "https://{{ k3s_public_ip }}:6443"

    - name: Set correct permissions on kubeconfig
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ local_kubeconfig_path }}"
        mode: '0600'

    - name: Verify kubeconfig server address
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        grep "server:" {{ local_kubeconfig_path }}
      args:
        executable: /bin/bash
      register: kubeconfig_server
      changed_when: false

    - name: Display kubeconfig server address
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: "{{ kubeconfig_server.stdout }}"

    - name: Test kubectl connectivity
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        export KUBECONFIG={{ local_kubeconfig_path }}
        kubectl cluster-info --request-timeout=10s
      args:
        executable: /bin/bash
      register: kubectl_test
      changed_when: false
      failed_when: false

    - name: Display kubectl test result
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: "{{ kubectl_test.stdout_lines if kubectl_test.rc == 0 else kubectl_test.stderr_lines }}"

    - name: Display success message and instructions
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          ==========================================
          ✅ Kubeconfig successfully fetched!
          ==========================================

          📁 Kubeconfig saved to: {{ local_kubeconfig_path }}
          🌐 Server endpoint: https://{{ k3s_public_ip }}:6443

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          🖥️  TO USE FROM THIS CONTROL MACHINE:
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          export KUBECONFIG={{ local_kubeconfig_path }}
          kubectl get nodes
          kubectl get pods -A

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          💻 TO COPY TO YOUR LAPTOP:
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          1. From your laptop, run:
             scp root@{{ inventory_hostname }}:{{ local_kubeconfig_path }} ~/.kube/k3s-basilica-config

          2. Or display the file and copy manually:
             cat {{ local_kubeconfig_path }}

          3. On your laptop, set the kubeconfig:
             export KUBECONFIG=~/.kube/k3s-basilica-config
             kubectl get nodes

          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          📝 MAKE IT PERMANENT (optional):
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Add to your ~/.bashrc or ~/.zshrc:
          export KUBECONFIG=~/.kube/k3s-basilica-config

          Or merge with existing kubeconfig:
          KUBECONFIG=~/.kube/config:~/.kube/k3s-basilica-config kubectl config view --flatten > ~/.kube/config.new
          mv ~/.kube/config.new ~/.kube/config
          kubectl config use-context default

          ==========================================
      when: kubectl_test.rc == 0

    - name: Display troubleshooting message if connection failed
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          ⚠️  KUBECONFIG SAVED BUT CONNECTION TEST FAILED
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          Kubeconfig: {{ local_kubeconfig_path }}
          Server: https://{{ k3s_public_ip }}:6443

          TROUBLESHOOTING:
          1. Verify port 6443 is open in security group for your IP
          2. Test connectivity: telnet {{ k3s_public_ip }} 6443
          3. Check firewall on K3s server:
             sudo ufw status
             sudo ufw allow 6443/tcp
          4. Verify K3s is running:
             ansible -i inventories/production.ini server -m shell -a "systemctl status k3s"

          Once connectivity is fixed, test with:
          export KUBECONFIG={{ local_kubeconfig_path }}
          kubectl get nodes
      when: kubectl_test.rc != 0
