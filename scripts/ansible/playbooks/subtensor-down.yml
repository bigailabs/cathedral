- hosts: k3s_server
  gather_facts: false
  become: true
  tasks:
    - name: Delete Subtensor init Job
      ansible.builtin.shell: |
        kubectl -n basilica-system delete job/subtensor-init --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Bob resources
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/subtensor/bob-service.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/subtensor/bob-deployment.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Alice resources
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/subtensor/alice-service.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/subtensor/alice-deployment.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Subtensor ConfigMap
      ansible.builtin.shell: |
        kubectl delete -f /opt/basilica/config/deploy/subtensor/subtensor-configmap.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

