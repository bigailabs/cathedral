---
- name: Build and deploy Basilica images to K3s
  hosts: localhost
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    operator_image_name: "basilica/basilica-operator"
    operator_image_tag: "latest"
    image_export_dir: "/tmp/basilica-images"
  tasks:
    - name: Create image export directory
      ansible.builtin.file:
        path: "{{ image_export_dir }}"
        state: directory
        mode: '0755'

    - name: Build operator image locally
      ansible.builtin.shell: |
        set -euo pipefail
        cd {{ repo_root | quote }}
        ./scripts/operator/build.sh --image-name {{ operator_image_name | quote }} --image-tag {{ operator_image_tag | quote }}
      args:
        executable: /bin/bash
      register: operator_build
      changed_when: operator_build.rc == 0

    - name: Export operator image
      ansible.builtin.shell: |
        set -euo pipefail
        docker save {{ operator_image_name }}:{{ operator_image_tag }} | gzip > {{ image_export_dir }}/operator.tar.gz
      args:
        executable: /bin/bash
      changed_when: true

    - name: Display build success
      ansible.builtin.debug:
        msg: "Operator image built and exported: {{ image_export_dir }}/operator.tar.gz"

- name: Load images to K3s server
  hosts: k3s_server
  gather_facts: false
  become: true
  vars:
    image_export_dir: "/tmp/basilica-images"
    operator_image_name: "basilica/basilica-operator"
    operator_image_tag: "latest"
  tasks:
    - name: Create remote image directory
      ansible.builtin.file:
        path: "{{ image_export_dir }}"
        state: directory
        mode: '0755'

    - name: Copy operator image to server
      ansible.builtin.copy:
        src: "{{ image_export_dir }}/operator.tar.gz"
        dest: "{{ image_export_dir }}/operator.tar.gz"
        mode: '0644'

    - name: Import operator image into K3s containerd
      ansible.builtin.shell: |
        set -euo pipefail
        gunzip -c {{ image_export_dir }}/operator.tar.gz | ctr -n k8s.io images import -
      args:
        executable: /bin/bash
      changed_when: true

    - name: Verify image was imported
      ansible.builtin.shell: |
        set -euo pipefail
        ctr -n k8s.io images ls | grep -E "{{ operator_image_name }}|{{ operator_image_tag }}"
      args:
        executable: /bin/bash
      register: image_verify
      changed_when: false

    - name: Display imported images
      ansible.builtin.debug:
        msg: "{{ image_verify.stdout_lines }}"

    - name: Update operator deployment to use local image
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl -n basilica-system set image deployment/basilica-operator operator={{ operator_image_name }}:{{ operator_image_tag }}
        kubectl -n basilica-system patch deployment basilica-operator -p '{"spec":{"template":{"spec":{"containers":[{"name":"operator","imagePullPolicy":"IfNotPresent"}]}}}}'
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for operator rollout
      ansible.builtin.command: kubectl -n basilica-system rollout status deploy/basilica-operator --timeout=180s
      changed_when: false

    - name: Get operator pod status
      ansible.builtin.command: kubectl -n basilica-system get pods -l app=basilica-operator
      register: operator_pods
      changed_when: false

    - name: Display operator status
      ansible.builtin.debug:
        msg: "{{ operator_pods.stdout_lines }}"

    - name: Cleanup temporary files
      ansible.builtin.file:
        path: "{{ image_export_dir }}"
        state: absent

- name: Cleanup local temporary files
  hosts: localhost
  gather_facts: false
  vars:
    image_export_dir: "/tmp/basilica-images"
  tasks:
    - name: Remove local image exports
      ansible.builtin.file:
        path: "{{ image_export_dir }}"
        state: absent
