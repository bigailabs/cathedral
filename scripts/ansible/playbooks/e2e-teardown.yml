- hosts: k3s_server
  gather_facts: false
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    tenant_ns: "{{ tenant_namespace | default('u-test') }}"
  tasks:
    - name: Delete ServiceMonitors (if present)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/operator-servicemonitor.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/api-servicemonitor.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/validator-servicemonitor.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete minimal Prometheus + Grafana (if applied)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/monitoring/grafana.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/monitoring/prometheus.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete API/Operator/Validator/DB manifests
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/api-deployment.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/operator-deployment.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/validator-deployment.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/postgres.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Envoy forward proxy (if applied)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/ingress/envoy-service.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/ingress/envoy-deployment.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/ingress/envoy-configmap.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Gateway API manifests (if applied)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/deploy/gateway/httproute-example.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/gateway/gateway-u-test.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/deploy/gateway/gatewayclass.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete tenant Role/RoleBinding
      ansible.builtin.shell: |
        set -euo pipefail
        sed "s/TENANT_NAMESPACE/{{ tenant_ns }}/g" /opt/basilica/config/rbac/operator-tenant-role.yaml | kubectl delete -f - --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete cluster RBAC (roles/bindings/serviceaccounts)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/config/rbac/operator-rbac.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/rbac/api-rbac.yaml --ignore-not-found || true
        kubectl delete -f /opt/basilica/config/rbac/validator-rbac.yaml --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete Basilica CR instances (if any)
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete gpurentals.basilica.ai --all -A --ignore-not-found || true
        kubectl delete basilicajobs.basilica.ai --all -A --ignore-not-found || true
        kubectl delete basilicanodeprofiles.basilica.ai --all -A --ignore-not-found || true
        kubectl delete basilicaqueues.basilica.ai --all -A --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete CRDs
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete -f /opt/basilica/basilica-crds.yaml --ignore-not-found || true
        kubectl delete crd gpurentals.basilica.ai basilicajobs.basilica.ai basilicanodeprofiles.basilica.ai basilicaqueues.basilica.ai --ignore-not-found || true
      args:
        executable: /bin/bash

    - name: Delete namespaces
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl delete namespace basilica-system --ignore-not-found || true
        kubectl delete namespace basilica-validators --ignore-not-found || true
        kubectl delete namespace "{{ tenant_ns }}" --ignore-not-found || true
      args:
        executable: /bin/bash

