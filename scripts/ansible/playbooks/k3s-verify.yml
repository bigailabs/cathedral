- hosts: k3s_server
  gather_facts: false
  become: true
  tasks:
    - name: Check K3s service status
      ansible.builtin.systemd:
        name: k3s
      register: k3s_service

    - name: Display K3s service status
      ansible.builtin.debug:
        msg: "K3s service is {{ k3s_service.status.ActiveState }}"

    - name: Get cluster nodes
      ansible.builtin.command: kubectl get nodes -o wide
      register: nodes_output
      changed_when: false

    - name: Display nodes
      ansible.builtin.debug:
        msg: "{{ nodes_output.stdout_lines }}"

    - name: Get all namespaces
      ansible.builtin.command: kubectl get namespaces
      register: ns_output
      changed_when: false

    - name: Display namespaces
      ansible.builtin.debug:
        msg: "{{ ns_output.stdout_lines }}"

    - name: Get system pods
      ansible.builtin.command: kubectl get pods -A
      register: pods_output
      changed_when: false

    - name: Display system pods
      ansible.builtin.debug:
        msg: "{{ pods_output.stdout_lines }}"
