- hosts: k3s_server
  gather_facts: false
  become: true
  tasks:
    - name: Show Subtensor Deployments/Services/Pods
      ansible.builtin.shell: |
        set -euo pipefail
        echo "=== Deployments ===" && kubectl -n basilica-system get deploy -l app=subtensor -o wide || true
        echo
        echo "=== Services ===" && kubectl -n basilica-system get svc -l app=subtensor -o wide || true
        echo
        echo "=== Pods ===" && kubectl -n basilica-system get pods -l app=subtensor -o wide || true
      args:
        executable: /bin/bash

    - name: Recent events (basilica-system)
      ansible.builtin.shell: |
        set -euo pipefail
        echo
        echo "=== Recent events (basilica-system) ==="
        kubectl -n basilica-system get events --sort-by=.lastTimestamp | tail -n 50 || true
      args:
        executable: /bin/bash

