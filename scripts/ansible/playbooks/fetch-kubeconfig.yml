- hosts: k3s_server
  gather_facts: true
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    _detected_repo_root: "{{ playbook_dir | realpath | dirname | dirname | dirname }}"
    repo_root_final: "{{ repo_root | default(_detected_repo_root, true) }}"
  tasks:
    - name: Create local build directory
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ repo_root_final }}/build"
        state: directory
        mode: '0755'

    - name: Read kubeconfig from server
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw

    - name: Compute kubeconfig server host
      delegate_to: localhost
      run_once: true
      ansible.builtin.set_fact:
        kubeconfig_server_effective: "{{ hostvars[groups['k3s_server'][0]]['ansible_host'] | default(hostvars[groups['k3s_server'][0]]['inventory_hostname']) }}"

    - name: Write kubeconfig locally
      delegate_to: localhost
      run_once: true
      ansible.builtin.copy:
        dest: "{{ repo_root_final }}/build/k3s.yaml"
        content: "{{ kubeconfig_raw.content | b64decode }}"
        mode: '0644'

    - name: Rewrite server URL in local kubeconfig
      delegate_to: localhost
      run_once: true
      ansible.builtin.lineinfile:
        path: "{{ repo_root_final }}/build/k3s.yaml"
        regexp: '^(\s*)server:\s*https://.*:6443\s*$'
        line: "\\1server: https://{{ kubeconfig_server_effective }}:6443"
        backrefs: true

    - name: Display connection instructions
      delegate_to: localhost
      run_once: true
      ansible.builtin.debug:
        msg: |
          ✅ Kubeconfig saved to: {{ repo_root_final }}/build/k3s.yaml

          To use kubectl from your laptop:

          1. Set KUBECONFIG environment variable:
             export KUBECONFIG={{ repo_root_final }}/build/k3s.yaml

          2. Test connection:
             kubectl get nodes
             kubectl get pods -A

          3. Or use with --kubeconfig flag:
             kubectl --kubeconfig={{ repo_root_final }}/build/k3s.yaml get nodes

          Server endpoint: https://{{ kubeconfig_server_effective }}:6443

          Note: Make sure port 6443 is accessible from your laptop to the server.
