# Prometheus configuration for Basilica local development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Validator metrics
  - job_name: 'validator'
    static_configs:
      - targets: ['validator:9090']
    metrics_path: /metrics

  # Miner metrics
  - job_name: 'miner'
    static_configs:
      - targets: ['miner:9090']
    metrics_path: /metrics
