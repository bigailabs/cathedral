# Composable Local Development Environment for Basilica
# Use profiles to start specific service groups:
#   docker compose --profile network up -d      # Subtensor only
#   docker compose --profile validator up -d    # + Validator
#   docker compose --profile miner up -d        # + Miner
#   docker compose --profile monitoring up -d   # + Prometheus + Grafana
#   docker compose up -d                        # Everything

services:
  # =============================================================================
  # Network Layer - Local Subtensor
  # =============================================================================
  subtensor:
    image: ghcr.io/opentensor/subtensor-localnet:devnet-ready
    container_name: basilica-subtensor
    profiles: ["network", "validator", "miner", "all"]
    ports:
      - "9944:9944"
      - "30334:30334"
    volumes:
      - subtensor-data:/tmp/alice
    command:
      - --base-path=/tmp/alice
      - --chain=local
      - --alice
      - --port=30334
      - --rpc-port=9944
      - --validator
      - --rpc-external
      - --rpc-cors=all
      - --rpc-methods=unsafe
      - --allow-private-ipv4
      - --unsafe-force-node-key-generation
    networks:
      basilica-localnet:
        ipv4_address: 172.28.0.10

  # =============================================================================
  # Database Layer - PostgreSQL for Validator
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: basilica-postgres
    profiles: ["monitoring"]
    environment:
      POSTGRES_USER: basilica
      POSTGRES_PASSWORD: basilica
      POSTGRES_DB: validator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basilica -d validator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      basilica-localnet:
        ipv4_address: 172.28.0.11

  # =============================================================================
  # Validator Service
  # =============================================================================
  validator:
    platform: linux/amd64  # Required for validator-binary (x86-64 ELF)
    build:
      context: ../..
      dockerfile: scripts/validator/Dockerfile
      args:
        BITTENSOR_NETWORK: "local"
        METADATA_CHAIN_ENDPOINT: "ws://subtensor:9944"
    container_name: basilica-validator
    profiles: ["validator", "miner", "monitoring"]
    restart: unless-stopped
    depends_on:
      subtensor:
        condition: service_started
    environment:
      - RUST_LOG=info,basilica_validator=debug
      - RUST_BACKTRACE=1
    volumes:
      - ./configs/validator.toml:/app/validator.toml:ro
      - validator-data:/opt/basilica/data
      - validator-ssh:/opt/basilica/data/ssh_keys
      - ./wallets:/root/.bittensor/wallets:ro
    ports:
      - "8080:8080"   # API
      - "9090:9090"   # Metrics
    networks:
      basilica-localnet:
        ipv4_address: 172.28.0.20
    command: ["start", "--config", "/app/validator.toml"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # =============================================================================
  # Miner Service
  # =============================================================================
  miner:
    build:
      context: ../..
      dockerfile: scripts/miner/Dockerfile
      args:
        BITTENSOR_NETWORK: "local"
        METADATA_CHAIN_ENDPOINT: "ws://subtensor:9944"
    container_name: basilica-miner
    profiles: ["miner", "monitoring"]
    restart: unless-stopped
    depends_on:
      subtensor:
        condition: service_started
      validator:
        condition: service_healthy
    environment:
      - RUST_LOG=info,basilica_miner=debug
      - RUST_BACKTRACE=1
      - HOME=/var/lib/basilica/miner
    volumes:
      - ./configs/miner.toml:/app/miner.toml:ro
      - miner-data:/var/lib/basilica/miner/data
      - ./ssh-keys:/var/lib/basilica/miner/.ssh:ro
      - ./wallets:/var/lib/basilica/miner/.bittensor/wallets:ro
    ports:
      - "8092:50051"  # gRPC server (validator communications)
      - "8091:8091"   # Bittensor axon port
      - "9091:9090"   # Metrics
    networks:
      basilica-localnet:
        ipv4_address: 172.28.0.30
    command: ["--config", "/app/miner.toml"]

  # =============================================================================
  # Monitoring - Prometheus
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: basilica-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      - validator
      - miner
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9099:9090"   # Prometheus UI (9099 to avoid conflict with validator metrics)
    networks:
      basilica-localnet:
        ipv4_address: 172.28.0.40
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  # =============================================================================
  # Monitoring - Grafana
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: basilica-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      basilica-localnet:
        ipv4_address: 172.28.0.41

networks:
  basilica-localnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  subtensor-data:
  postgres-data:
  validator-data:
  validator-ssh:
  miner-data:
  prometheus-data:
  grafana-data:
