groups:
  - name: basilica.telemetry.alerts
    rules:
      - alert: TelemetryServerDiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
          component: telemetry
        annotations:
          summary: "Critical disk space on telemetry server"
          description: "Only {{ $value | humanize }}% disk space available on telemetry server"

      - alert: TelemetryServerDiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
        for: 10m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "Low disk space on telemetry server"
          description: "Only {{ $value | humanize }}% disk space available on telemetry server"

      - alert: TelemetryDockerVolumesLarge
        expr: (sum(container_fs_usage_bytes) / 1024 / 1024 / 1024) > 80
        for: 1h
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "Docker volumes consuming excessive space"
          description: "Docker volumes are using {{ $value | humanize }}GB of disk space"

      - alert: TelemetryServerHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "High CPU usage on telemetry server"
          description: "CPU usage is {{ $value | humanize }}% for more than 10 minutes"

      - alert: TelemetryServerHighMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10
        for: 10m
        labels:
          severity: critical
          component: telemetry
        annotations:
          summary: "High memory usage on telemetry server"
          description: "Only {{ $value | humanize }}% memory available on telemetry server"

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          component: prometheus
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus has been down for more than 2 minutes"

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: critical
          component: grafana
        annotations:
          summary: "Grafana is down"
          description: "Grafana has been down for more than 2 minutes"

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
          component: loki
        annotations:
          summary: "Loki is down"
          description: "Loki has been down for more than 2 minutes"

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
          component: alertmanager
        annotations:
          summary: "Alertmanager is down"
          description: "Alertmanager has been down for more than 2 minutes"
