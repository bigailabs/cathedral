<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4CC9F0"/>
      <stop offset="50%" stop-color="#2222D6"/>
      <stop offset="100%" stop-color="#3A0CA3"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2222D6"/>
      <stop offset="100%" stop-color="#3A0CA3"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3A0CA3"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="48" fill="#0A0A1A"/>

  <!-- Network edges (faint connections) -->
  <line x1="250" y1="185" x2="370" y2="220" stroke="#4CC9F0" stroke-width="1.5" opacity="0.25"/>
  <line x1="370" y1="220" x2="520" y2="195" stroke="#4CC9F0" stroke-width="1.5" opacity="0.25"/>
  <line x1="370" y1="220" x2="310" y2="310" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2"/>
  <line x1="520" y1="195" x2="580" y2="280" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2"/>
  <line x1="250" y1="185" x2="180" y2="270" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2"/>
  <line x1="310" y1="310" x2="180" y2="270" stroke="#4CC9F0" stroke-width="1.5" opacity="0.2"/>
  <line x1="310" y1="310" x2="480" y2="310" stroke="#4CC9F0" stroke-width="1.5" opacity="0.15"/>
  <line x1="480" y1="310" x2="580" y2="280" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
  <line x1="250" y1="185" x2="400" y2="140" stroke="#4CC9F0" stroke-width="1" opacity="0.15"/>
  <line x1="520" y1="195" x2="400" y2="140" stroke="#4CC9F0" stroke-width="1" opacity="0.15"/>

  <!-- Network nodes -->
  <circle cx="400" cy="140" r="6" fill="#4CC9F0" opacity="0.5"/>
  <circle cx="250" cy="185" r="8" fill="#4CC9F0" opacity="0.8"/>
  <circle cx="520" cy="195" r="8" fill="#4CC9F0" opacity="0.8"/>
  <circle cx="370" cy="220" r="10" fill="#4CC9F0"/>
  <circle cx="180" cy="270" r="6" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="580" cy="280" r="6" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="310" cy="310" r="7" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="480" cy="310" r="7" fill="#8b5cf6" opacity="0.5"/>

  <!-- Node glows -->
  <circle cx="370" cy="220" r="20" fill="#4CC9F0" opacity="0.08"/>
  <circle cx="250" cy="185" r="16" fill="#4CC9F0" opacity="0.06"/>
  <circle cx="520" cy="195" r="16" fill="#4CC9F0" opacity="0.06"/>

  <!-- Compute bars -->
  <rect x="145" y="420" width="100" height="160" rx="8" fill="url(#barGrad)" opacity="0.75"/>
  <rect x="270" y="370" width="100" height="210" rx="8" fill="url(#barGrad2)" opacity="0.85"/>
  <rect x="395" y="330" width="100" height="250" rx="8" fill="#3A0CA3" opacity="0.9"/>
  <rect x="520" y="390" width="100" height="190" rx="8" fill="url(#barGrad3)" opacity="0.7"/>

  <!-- Bar highlights (top edge glow) -->
  <rect x="145" y="420" width="100" height="3" rx="1.5" fill="#4CC9F0" opacity="0.6"/>
  <rect x="270" y="370" width="100" height="3" rx="1.5" fill="#4CC9F0" opacity="0.5"/>
  <rect x="395" y="330" width="100" height="3" rx="1.5" fill="#4CC9F0" opacity="0.4"/>
  <rect x="520" y="390" width="100" height="3" rx="1.5" fill="#4CC9F0" opacity="0.5"/>

  <!-- Baseline -->
  <line x1="130" y1="585" x2="635" y2="585" stroke="#4CC9F0" stroke-width="2" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="400" y="670" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="64" font-weight="bold" fill="#FFFFFF" letter-spacing="8">SUBSTRATE</text>

  <!-- Tagline -->
  <text x="400" y="710" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="18" fill="#8b5cf6" letter-spacing="4">COMPUTE LAYER FOR BITTENSOR</text>
</svg>